    - DigiCo confirmed practical completion of SYD1's first 15 MW on 6 May 2026, but the remaining 5-MW June target lacks a later reviewed completion confirmation. The 15% yield-on-cost and approximately A$1.50-per-security NAV uplift are management targets, not realized returns.
    - BNE2 is trialling liquid cooling and DigiCo markets high-density, flexible 5-to-10-MW-plus deployment capability at SYD1. SharonAI names DigiCo among several Australian GPU hosts but allocates no site, model or count, so no DigiCo accelerator total is created.
    - DigiCo's statutory HY26 revenue was A$90.8 million and profit after tax was A$37.9 million after a A$69.7 million fair-value gain. The report provides no statutory operating-profit subtotal, so management underlying EBITDA of A$57.2 million is retained separately and not relabeled.
    - Management's A$108.3 million underlying revenue and A$57.2 million underlying EBITDA include A$18.5 million of CHI1 precompletion rent, while adjusted FFO of A$30.5 million includes A$12.9 million of precompletion interest. The bridge matters when estimating recurring post-sale earnings.
    - At 31 December 2025 DigiCo held A$4.573 billion of assets, A$1.828 billion of borrowings, A$1.512 billion of net debt and A$658 million of liquidity. Gearing was 35.8%, all debt was hedged and average debt cost was 6.0%.
    - The US$750 million CHI1 sale and conditional LAX1/LAX2 sale are signed but not confirmed closed as of 19 July 2026. Pro-forma A$0.5 billion net debt, 17% gearing and approximately A$1.0 billion liquidity after both agreements are transaction scenarios, not statutory balances.
    - FY2026 guidance remains A$125 million underlying EBITDA and A$0.12 DPS with 85 MW contracted, but it assumes a full year of CHI1. The older A$180 million annualized run-rate ambition needs rebasing for the strategic sales and post-sale property perimeter.
    - Michael Juniper stepped down as CEO effective 26 June 2026, the board is searching for a permanent replacement and the May sale release named Chris Maher interim CEO. FY2026 results are scheduled for 21 August 2026 and were not public at this review date.
    - DigiCo's contracted Australian platform, approved SYD1 expansion and deleveraging optionality are credible positives, but post-sale recurring EBITDA, site-level profit, customer economics, GPU allocation, utilization and return on incremental capex remain the decisive gaps.
    - VIRTUS's current directory contains 32 facility codes across the UK, Germany and Italy. Their 647.9-MW checksum includes operating sites, advanced developments, construction and announced projects and is not current operating, energized, leased, utilized or billed IT load.
    - The audited FY2024 portfolio contained 11 fully live UK sites, 181.8 MW contracted and 179.3 MW billable, while total design capacity was 606.3 MW. Those dated statutory measures are a better operating anchor than the newer mixed-lifecycle marketing sum but still do not disclose actual instantaneous load or site utilization.
    - Current UK code values sum to 338.3 MW, Germany's 13 development codes sum to 261.6 MW against a rounded 260-MW page claim, and MILAN1's current page says 48 MW after an older 42-MW specification. Capacity and schedule revisions are preserved rather than silently normalized.
    - Wustermark's two 185-MVA super-grid transformers, direct 380-kV connections and dedicated 500-MW substation are unusually concrete grid evidence, but they are not the same denominator as the campus's 204-MW IT-code sum or the historic 300-MW project headline.
    - LONDON14's permit and application identify 16 containerized diesel emergency generators with SCR, while a planning declaration identifies Finning/Caterpillar sets and 20 annual testing hours. Most VIRTUS sites still lack a current as-built equipment bill of materials by model, count, rating and OEM.
    - An unnamed multi-MW AI customer has operated since 2021 using direct-to-chip single-phase liquid cooling and rear-door heat exchangers at operational PUE below 1.1. The case study validates deployment capability but discloses no GPU model, count, owner, host site, utilization or economics, so no accelerator total is created.
    - VIRTUS Holdco's FY2024 consolidated revenue rose 35.45% to GBP486.246 million, but colocation revenue grew only 8.52% while recoverable power charges grew 81.47%. Headline growth therefore overstates the underlying colocation-rate signal.
