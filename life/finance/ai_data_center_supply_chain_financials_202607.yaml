purpose: >-
  Compare the revenue scale, operating economics, data-center exposure, current
  demand signals, and disclosed outlook of companies across the AI data-center
  stack without mixing incompatible accounting measures.

methodology:
  source_priority: company_filings_and_official_investor_releases
  comparison_rules:
    - Preserve each company's reporting currency, fiscal calendar, and accounting basis.
    - Treat GAAP, IFRS, K-IFRS, adjusted operating profit, EBITDA, NOI, and FFO as different measures.
    - Separate company-wide results from data-center or segment-level disclosures.
    - Label calculated margins and reconstructed operating results as derived rather than reported.
    - Do not compare raw USD, EUR, and KRW amounts without an explicit same-date FX conversion.
    - Do not infer a campus supplier relationship from general product exposure.
  monetary_unit_convention: Values use the unit named in each field, normally millions of the reporting currency.
  investment_boundary: Research input for thesis and risk review, not a direct buy or sell instruction.

