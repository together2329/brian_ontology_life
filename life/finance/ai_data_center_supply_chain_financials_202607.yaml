cross_company_read_through:
  current_signals:
    - Verizon's current colocation sheet says 200-plus global service locations, more than 300-plus U.S. locations receiving power and space expansion, and 200-plus MW of available power across 350-plus U.S. technology facilities. These service, narrative and facility scopes are not a Verizon-owned building count or current IT load.
    - Nine U.S. available-capacity city labels are published without exact addresses, physical-building counts, ownership or site-level MW. A separate on-net sheet names 12 exact Switch, QTS, DC Blox, Cologix and CyrusOne partner facilities; network connectivity does not make them Verizon assets.
    - The 2025 French regulatory disclosure identifies one exact Saint-Denis colocation structure owned by SAS Parc de la Plaine and operated by Verizon France SAS, with 763.81 kW installed IT demand split between 505.54 kW customer and 258.27 kW Verizon equipment.
    - Saint-Denis reported 10.944 GWh of facility energy, 6.691 GWh of IT energy, 237 cubic metres of potable water, 1.64 PUE, 1.00 renewable energy factor and N+1 high-voltage, low-voltage, rack-power and room-cooling redundancy. Its eight local reporting codes are not eight physical buildings.
    - Verizon sold 24 North and Latin American sites containing 29 data-center buildings to Equinix for USD3.6 billion on 1 May 2017. Verizon's continuing customer, reseller and network roles do not restore ownership of those Equinix facilities.
    - The sold portfolio's FY2016 abbreviated statement reported USD452.0 million net revenue and USD203.7 million net revenue less direct expenses, but excluded corporate overhead, interest, tax and cash flows. It is historical carve-out evidence, not current Verizon data-center operating profit.
    - AI Connect draws on thousands of distributed telco facilities, 2-10-plus MW of usable power at many sites, 100-200 acres of undeveloped land and more than 16,000 near-net enterprise locations. These are opportunity and retrofit resources rather than energized, accepted or billed AI load.
    - AI Connect's funnel increased from more than USD1 billion in January 2025 to nearly USD2 billion in July 2025. Google Cloud and Meta bought network capacity, while AWS, NVIDIA and Vultr are partners; pipeline and partnerships do not establish data-center revenue or Verizon-owned GPUs.
    - Thirteen Verizon-operator OSM objects were reviewed across eight countries. None exactly matches the current Saint-Denis record or a provider-published U.S. address, so all remain current-network or historical-facility candidates rather than a portfolio census.
    - Verizon reported USD138.191 billion FY2025 revenue and USD29.259 billion consolidated operating income; Business produced USD29.069 billion revenue and USD2.532 billion segment operating income. The figures span telecom services and cannot be allocated to data centers or AI Connect.
    - FY2025 capex was USD17.011 billion, free cash flow was USD20.126 billion and total debt was USD158.150 billion. FY2026 guidance calls for USD16.0-16.5 billion capex and at least USD21.5 billion free cash flow, but Frontier is included from 20 January 2026 and no data-center capex or return is disclosed.
    - Datacenter United's latest investor basis is 13 facilities across 11 Belgian locations with about 24 MW of built-and-secured IT capacity. Its current 14-label web directory mixes 12 operating labels with development-stage Ghent 2 and Mouscron and omits separately evidenced Hasselt 2; a separate 16-data-center/13-location article claim remains unreconciled.
    - The 2024 transaction presentation splits the portfolio into 1.7 MW built plus 7.1 MW secured expansion for legacy DCU and 4.0 MW built plus 11.3 MW secured expansion for the Proximus carve-out, totaling 24.1 MW accessible. Proximus separately called the acquired capacity approximately 11 MW, and a later 17 MW secured in Antwerp is not added without a scope-and-date bridge.
    - Datacenter United reported EUR36.1 million of revenue and EUR11.3 million of EBITDA in the first combined 2025 year, a derived 31.3% margin. A pro-forma twelve-month view was EUR41.3 million and EUR13.2 million, a derived 32.0% margin; neither EBITDA measure is accounting operating profit.
    - The audited Belgian-GAAP summary reported GBP30.9 million turnover, a GBP10.0 million pre-tax loss and GBP76.3 million net assets. Pre-tax loss is not relabeled operating loss, and no standalone operating-profit subtotal or full public cash-flow statement was disclosed.
    - Cordiant-managed interests and TINC each hold 47.5% economics, with CEO Friso Haringsma holding 5% non-voting economics. CDIL itself owns 37.4% after syndicating 10.1% to another Cordiant-managed institutional co-investor; Cordiant-managed vehicles and TINC each retain 50% voting control.
    - A EUR120 million senior package includes a EUR50 million drawn term loan, EUR50 million capex facility and EUR20 million revolving or ancillary facility, maturing in September 2030. At March 2026 DCU had EUR1.7 million cash, EUR56.5 million unused facilities and 3.9x net leverage; undrawn capacity is not cash or incurred capex.
    - The top-30-customer contracted order book was EUR83.4 million, supported by a 10-year index-linked Proximus MSA with two five-year extension options and named customers Pfizer, Telenet and Atos. Order book is not recognized revenue, billed load, collected cash or a complete concentration table.
    - Liquid cooling, high-efficiency chillers, high-density readiness and heavy-GPU-workload support are real capability signals, but no reviewed source identifies GPU model, count, owner, host site, power draw, utilization, revenue or margin. Colocation customer hardware is not assigned to the operator.
    - Cordiant reported 82% of operational electricity covered by renewable electricity through PPAs and Guarantees of Origin, while operator marketing says all data centers use 100% renewable energy and PUE below 1.2. The statements remain separate, and neither becomes a per-site measured PUE, WUE, energy or water ledger.
    - Twelve related Belgian OSM objects were crosswalked, including shared Antwerp and Evere site points, a development-stage Mouscron footprint and an unresolved Oostkamp address conflict between the current operator page and 2025 certification. Map footprints are not provider-verified building counts, floor areas or operating status.
    - UltraEdge's current provider headline says 248 owned-and-operated sites, 30-plus data centers and 200-plus telecom POPs, but its 12 region pages expose 251 mixed cards: 161 POP, 78 Data center, 11 IX Edge and one Datacenter. Neither number is a physical-building census.
    - Altice formed UltraEdge from 257 data-center-plus-office assets then operated by SFR and sold 70% to Morgan Stanley Infrastructure Partners for EUR500 million on 23 May 2024, retaining 30% and recognizing a EUR313.1 million gain. Transaction assets, current cards and current sites use different scopes.
    - The current Datapole page's six metro summaries add to 31 MW, 41,000 square metres and 31 data centers, conflicting with or using a different denominator from the 51-MW, 35,000-square-metre and 30-plus portfolio headlines. The values remain separate.
    - UltraEdge markets up to 15 kW per rack, selected-site direct liquid cooling, ISO 50001, average PUE of 1.5-1.9 and 1.2-1.3 targets for new extensions or buildings. It does not disclose per-site live load, measured PUE/WUE, equipment inventories or live liquid-cooled MW.
    - The Gcore partnership provides access to AI infrastructure with NVIDIA GPU servers, but no reviewed source establishes UltraEdge-owned GPUs or discloses model, count, host site, power draw, utilization, revenue or margin.
    - Seventeen raw SFR-operator OSM objects were reviewed. Four have high-confidence name-and-city crosswalks to current UltraEdge cards, two are Courbevoie cluster evidence and eleven remain geographic or legacy candidates; none proves current SFR ownership or a physical asset count.
    - UltraEdge's provider press page says EUR160 million of 2025 revenue, while Altice's unaudited 30%-associate note reports EUR140.4 million of revenue and EUR0.3 million net income. The EUR19.6 million gap remains unresolved, and net income is not operating profit.
    - Altice France's audited FY2025 accounting perimeter reported EUR9.3824 billion revenue, EUR3.0715 billion adjusted EBITDA, EUR820.2 million operating profit and a EUR1.5746 billion net loss. These are telecom-group figures rather than UltraEdge economics.
    - Q1 2026 investor pro-forma revenue and adjusted EBITDA declined 9.1% and 13.1%, while actual net debt was EUR15.603 billion, weighted average debt cost was 7.7% and the RCF was fully drawn. High leverage and operating contraction make transaction and cash-flow execution central.
    - Bouygues, Orange and Free/iliad propose to acquire and divide SFR at EUR20.35 billion enterprise value plus up to EUR650 million earnout, subject to an expected H2 2027 closing. UltraEdge is explicitly excluded and must remain outside the acquisition asset perimeter.
    - Bouygues Telecom's provider page names Bièvres, Saclay and Montigny-le-Bretonneux as three data centers, but it was last modified in 2021. Later asset sales mean this is historical operating evidence rather than a verified 2026 owned-building roster.
    - From 2021 through January 2025 Bouygues transferred the buildings and passive infrastructure of at least 22 MSC or data-center assets to Towerlink for EUR451 million of aggregate consideration and EUR185 million of reported disposal gains. These are transaction checksums, not a current asset count or recurring earnings.
