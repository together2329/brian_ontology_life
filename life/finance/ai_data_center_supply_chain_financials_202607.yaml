research_limits:
  - Datacenter United's 13-facility/11-location investor basis, 14-label mixed-lifecycle directory, 16-data-center/13-location article claim, shared Antwerp and Evere labels and 12 OSM objects use different denominators and are not merged into a false building count.
  - The 5.7 MW built, 18.4 MW secured expansion, 24.1 MW accessible, approximate 11 MW Proximus transaction statement and later 17 MW Antwerp secured-power claim use different scopes or dates; none is treated as current utilized or billed load.
  - EBITDA, adjusted EBITDA and Belgian-GAAP pre-tax loss are not accounting operating profit. Datacenter United does not publish a standalone operating-profit subtotal, full cash-flow statement, site economics, customer concentration or ROIC in the reviewed sources.
  - AI-ready, high-density and liquid-cooling capability does not disclose Datacenter United-owned or customer GPU models, counts, host sites, delivery state, power draw, utilization or economics, and the full as-built power and cooling equipment ledger remains unavailable.
  - The 82% measured renewable-electricity coverage and 100% operator marketing claim remain separate. The published 3500Wp solar string and sub-1.2 PUE claim are not corrected, rescaled or propagated to every site without primary measurement evidence.
  - UltraEdge's 248 current-site headline, 251 mixed directory cards, 257 source transaction assets, 30-plus data centers, 90 non-POP cards, 200-plus POPs and 17 SFR-tagged OSM objects use different unexplained denominators and are not merged into a false physical-building count.
  - The six Datapole summaries' 31-MW, 41,000-square-metre and 31-data-center arithmetic conflicts with or differs in scope from the 51-MW, 35,000-square-metre and 30-plus portfolio headlines. No value is selected as live load without a provider bridge.
  - UltraEdge's high-density, selected-site direct-liquid-cooling, ISO 50001 and PUE claims are capabilities, averages or targets rather than per-site measured load, equipment, PUE, WUE, energy or water evidence.
  - The Gcore NVIDIA GPU partnership does not disclose or prove UltraEdge-owned accelerators, model, count, host site, delivery state, power draw, utilization or economics.
  - UltraEdge's EUR160 million provider revenue headline and Altice's EUR140.4 million unaudited associate-note revenue remain separate pending a reporting-period and accounting-perimeter bridge. Neither source publishes standalone operating profit or cash flow.
  - Altice France SFR is a diversified leveraged telecom group; audited accounting, investor pro-forma restricted-group and UltraEdge associate measures use different perimeters. Group revenue, EBITDA and operating profit are not data-center-only earnings.
  - The SFR acquisition MOU is conditional and expected to close in H2 2027. UltraEdge, XP Fibre, Altice Technical Services and overseas operations are explicitly excluded and are not treated as buyer acquisition assets.
  - CDC's 30 dated facility codes, 18/5/7 map reconstruction, current location pages, later 19/6 portfolio counts and 17 OSM objects use different dates and granularities and are not merged into a false current building count.
  - CDC's 671 MW operating capacity, 220 MW contracted ICT capacity, greater-than-1-GW later contract scope and 62% rack utilization use different denominators; none is treated as actual instantaneous site load or billed utilization.
  - CDC's public financial metrics come through Infratil's associate and management reporting. Net revenue, EBITDAF and NPAT do not provide a standalone accounting operating-profit or full cash-flow bridge, and future capex and EBITDAF guidance remain execution-dependent.
  - CDC's DGX-Ready and liquid-cooling capabilities do not disclose installed GPU models, counts, owners, site allocation or utilization, and exact site-level power and cooling bills of materials remain unavailable.
  - NEXTDC's 29 current facility labels and 1.82055-GW mixed-lifecycle card checksum are not a physical-building census or current operating, energized, leased, utilized, billing or actual-load total.
  - NEXTDC's DGX-Ready certification, supported NVIDIA platforms, liquid-cooling capability and 600-kW-per-rack S6 design do not disclose installed GPU models, counts, owners, site allocation, utilization or economics.
  - NEXTDC reports audited company financials and capacity layers, but not site-level revenue, operating profit, capex, debt, customer concentration, utilization or return on capital; high funding and construction scale must convert through customer acceptance and billing.
  - DataBank is private and current standalone audited revenue, operating profit, EBITDA, cash flow, capex, debt, customer concentration and site returns were not found in reviewed primary sources.
  - DataBank's 76-card 1.023179-GW sum includes at least 634 MW across 11 explicit development or future-tense cards; it is a mixed-lifecycle marketing total, not current operating, energized, leased, utilized or billed load.
  - DataBank financing announcements include primary equity, secondary share liquidity, refinancing, construction facilities, ABS debt and a corporate revolver with overlapping uses. Gross announced amounts are not safely summed into net debt, capex, valuation or revenue.
  - DGX-Ready certification, Blackwell compatibility, rack-density ceilings and liquid-cooling capability do not disclose or prove installed GPU inventory, customer ownership, live draw, utilization or AI revenue.
  - du is a diversified listed telecom and digital-services group; group and broad ICT-segment revenue and contribution are not data-center-only earnings.
  - du's five current service locations include mixed Equinix alliance and Khazna leased-module boundaries, and public sources do not establish five wholly du-owned physical buildings.
  - DSO's 4,000-GPU/5.1-MW annual-report scope and greater-than-13-MW B300 release are separate disclosures. They are not added, and the B300 count, current total fleet, ownership, utilization and economics remain undisclosed.
  - d3's approximate AED2-billion amount is a combined operating-and-capital cost envelope, not incurred capex, revenue, enterprise value or guaranteed return. AI Park's up-to-1-GW figure is a master-plan ceiling, not live capacity.
  - Portfolio PUE and environmental practices are not mapped to every du site; per-site WUE, water, renewable matching and full power and cooling bills of materials remain unavailable.
  - DEWA is a diversified listed utility group; audited group and broad Others-segment results are not Moro or data-center-only earnings.
  - MBR Solar Park's 6.3-MW phase-one electricity capacity, ten-phase 100-MW plan, 200-rack vendor case and multiple area figures use different dates and scopes and are not added into current IT capacity.
  - Warsan's greater-than-100-MW figure is planned development capacity with an undisclosed definition, not live or energized IT load; no newer official launch confirmation was found by July 18, 2026.
  - Moro's NVIDIA agreement, Rafay GPU PaaS and AI-related MOUs do not disclose an exact physical GPU model, count, owner, host site, power draw, cooling, utilization or economics.
  - DEWA generation fleet and solar-park capacity provide utility context but are not treated as dedicated data-center supply without site-level contracts, grid topology and hourly matching evidence.
  - e& is a diversified global telecommunications and technology group; group and e& UAE segment results are not SmartHub or data-center-only earnings.
  - e& sold its entire 40% Khazna stake in March 2025. Historical Etisalat facilities, the 12 contributed Khazna assets and retained SmartHub buildings lack a complete public crosswalk, so Khazna capacity is not treated as current e& ownership.
  - SmartHub roster disclosures are inconsistent across official pages, and the Abu Dhabi expansion lacks an identified physical building. Four geographic records do not equal a confirmed four-building count.
  - e& discloses H100 clusters and a Gaudi 3 platform but not accelerator counts, owners, current host sites, power, utilization or economics; no physical GPU inventory is assigned to SmartHub.
  - SmartHub fact-sheet equipment nameplate ratings include redundancy and are not equivalent to IT load, energized capacity or utilization.
  - The July 2026 Vodafone transaction is an announced binding sale with expected liquidity and gain, not FY2025 or Q1 2026 actual data-center revenue, capex or cash flow.
  - Beyon is a diversified listed telecommunications and digital-services group; its group and Bahrain geographic results are not Batelco data-center-only earnings.
  - Hamala's 2.7-MW total-capacity figure is not explicitly IT load, and Data Oasis publishes no official MW, rack, utilization or customer ledger. Neither site has a verified public GPU inventory or complete electrical and cooling bill of materials.
  - The RJR Data Center to Beyon Data Oasis physical and certification crosswalk remains unresolved, so identities are retained without double-counting capacity or awards.
  - DAMAC Digital and QST are private and publish no reviewed standalone audited financial statements; their project values, capacity plans, financing programs and reported possible valuations are not substitutes for revenue, operating profit or cash flow.
  - DAMAC Digital's 500 MW and QST's 300 MW are dated Saudi development targets, not current operating capacity. The reviewed current evidence supports a DAMAC 15-MW operating portfolio subset and two QST 9-MW site cards without complete utilization or billing bridges.
  - Vendor cooling, BMS and EPMS case studies improve equipment visibility but do not establish full as-built bills of materials, site-wide efficiency, live IT load or operator economics.
  - Neither DAMAC Digital nor QST discloses a verified per-site GPU inventory; AI-ready claims, unnamed cloud customers and MOUs are not converted into estimated accelerator counts.
  - DataVolt is private and publishes no reviewed standalone audited financial statements; project costs, planned investment, anchor commitments and nonbinding supplier MOUs are not substitutes for revenue, operating profit or cash flow.
  - SDAIA is a government authority, and reviewed sources do not provide commercial financial statements or a project-level Hexagon budget and operating-cost ledger.
  - Supermicro's USD20-billion DataVolt figure is a nonbinding contemplated product value, while LG's DataVolt relationship is an MOU; neither is booked revenue, backlog or installed equipment in this registry.
  - Hexagon's 480 MW and Oxagon's 1.5 GW are announced development scales, not current operating IT load; both lack exact GPU inventory and complete power and cooling bills of materials.
  - Mobily data-center-only earnings, exact current physical facility roster, GPU inventory, site power and cooling equipment, live load and utilization remain undisclosed.
  - The registry is a selected financial cross-section, not yet the complete global supply chain.
  - Campus-specific revenue and profit are generally undisclosed.
  - Management outlooks are forward-looking and may change after the as-of date.
  - Market valuation, share price, and portfolio weights require a separate same-date market-data update.
