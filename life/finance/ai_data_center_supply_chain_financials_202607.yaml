    - The two-site Chartres/Val-de-Reuil DC2020 engineering scope covers 8,400 square metres of active IT rooms and 25 MW of IT equipment with direct free cooling and 1.3 design PUE. The combined value cannot be allocated between sites or treated as current energized, leased, utilized or billed load.
    - Orange's current colocation page says Chartres-Mainvilliers hosts two data centers, while its 2023-2024 white paper says one. The publication conflict remains unresolved, and gross building area, IT-room area and provider facility labels are kept separate.
    - Grenoble uses groundwater heat exchange at approximately 13°C with discharge around 17°C, a claimed WUE of zero, UPS efficiency above 95% from 25% load, very-low-loss and vegetable-oil transformers, and rack-level PDU metering. A hydrogen-fuel-cell backup discussion is not treated as installed equipment.
    - The December 2025 Cloud Avenue Dynamic service description confirms NVIDIA L4, L40 and H100 GPU service in EU/EEA data centers. It does not disclose physical counts, exact model-to-site allocation, ownership, delivery state, power draw or utilization, so no Orange GPU fleet total is calculated.
    - Orange Group reported EUR40.396 billion of FY2025 revenue, EUR12.470 billion EBITDAaL, EUR3.422 billion operating income and EUR2.793 billion free cash flow all-in. Those telecom-group measures cannot be allocated to data centers, Cloud Avenue or GPUaaS.
    - Orange Business reported EUR7.325 billion of FY2025 revenue, EUR577 million EBITDAaL and a EUR277 million operating loss after a EUR332 million goodwill impairment, EUR165 million of specific personnel charges and EUR108 million of restructuring costs. The segment spans telecom, integration, cloud, AI and cybersecurity and is not a data-center income statement.
    - Orange Business revenue fell 2.6% to EUR1.753 billion in Q1 2026, while IT and integration services grew 1.3% to EUR888 million. The moderation is encouraging but does not prove Cloud Avenue or GPUaaS growth, margin or cash conversion.
