    - Moro has an NVIDIA accelerated-computing agreement and a Rafay sovereign GPU PaaS, but no reviewed source identifies accelerator models, counts, owner, purchase, delivery, host site, power draw, cooling, utilization, customer revenue or margin. Agreements and service availability are not a physical GPU inventory.
