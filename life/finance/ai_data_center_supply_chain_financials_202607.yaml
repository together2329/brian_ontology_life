    - Khazna is one of the largest private Middle Eastern operators but publishes no audited standalone revenue or operating profit. Its $2.62 billion financing facility, more-than-1-GW expansion plan, 73% company-cited UAE market share, and per-facility economic-impact estimates describe funding, ambition and modeled impact rather than earnings or cash flow. e&'s rounded AED8.0 billion proceeds for its former 40% stake imply AED20.0 billion only under a simple pro-rata calculation, not disclosed enterprise value or current valuation.
    - NVIDIA certified Khazna's next-generation facility design for Blackwell, with future halls up to 50 MW and individual AI clusters up to 250 MW, but no current physical GPU count is disclosed. AUH6 has a 31.8 MW IT nameplate, 7 MWp solar and company-stated PUE of 1.4; QAJ01 has a 100 MW liquid-cooled design but remains operating-status unverified after a February 2026 design-document certification.
    - Gulf Data Hub's current website has three mutually inconsistent live scopes: server-rendered counters show zero facilities and zero MW because its Strapi location list is empty, client-code headline constants say five facilities and 46 MW, and the client marker roster contains six operating facilities totaling 62.2 MW. KKR and GDH's January 2025 release separately says seven owned facilities across the UAE and Saudi Arabia, leaving one owned unit unreconciled to the visible operating roster.
    - The same client bundle exposes 65 markers and 1,006.2 MW of arithmetic nameplate: six operating/62.2 MW, four under construction/64 MW and 55 pipeline/880 MW. Those markers span Dubai, Abu Dhabi, Jeddah, Dammam, Riyadh, Qatar, Bahrain, Kuwait, Oman, Egypt, Aqaba and Morocco, but they are planning artifacts rather than evidence of land control, permits, grid service, construction, energization, leasing, utilization or billing.
    - GDH's location text and client marker roster conflict at several markets. Dubai text labels DSO1-3 operating and DSO4-6 under construction while the marker roster labels DSO6 pipeline; Abu Dhabi text describes four 16 MW centers but the roster contains eight ICAD/KIZAD markers; and Dammam text says one operating plus three planned while the roster shows one operating plus four pipeline. Jeddah is the cleanest match at one operating 8 MW KAUST facility plus four planned 16 MW Thahban facilities.
    - Vertiv confirms Liebert EXL S1 UPS and Liebert CWA chilled-water air-handling equipment for a 16 MW Dubai Silicon Oasis deployment. The UPS supports up to 97% product efficiency in double-conversion mode and up to 99% in Dynamic Online mode, but those are equipment specifications rather than measured facility PUE. Exact unit counts, energy-storage chemistry, generator and transformer topology, PUE, WUE and site allocation remain undisclosed, as do all operator or customer GPU models and counts.
    - GDH publishes no audited standalone revenue, operating profit, EBITDA, cash flow, capex or balance sheet. Its AED530 million 2022 syndicated facility funded a described 12 MW ICAD project, while KKR and GDH committed to support more than $5 billion of future total investment after their transaction; neither amount is current revenue, profit, acquisition price, drawn debt or incurred capex. KKR's Q1 2026 results likewise cannot be used as GDH earnings.
    - Africa Data Centres' current directory exposes five core facility cards across South Africa, Kenya and Nigeria. Their published power fields sum arithmetically to 92.15 MW, but mix upon-completion, available and critical-load definitions, while JHB1, JHB2 and CPT1 contain conflicting dated scopes; the total is therefore not treated as operating, energized, leased, utilized or billed capacity.
    - Africa Data Centres Holdings generated USD61.8 million of FY2024 revenue and USD4.1 million of operating profit, but USD42.0 million of finance costs drove a USD36.5 million loss. Colocation revenue grew 6.2% while energy-usage revenue fell 30.1%; the accounts were overdue as of July 18, 2026, so FY2024 is a stale audited baseline rather than a current run rate.
    - The operator generated USD30.6 million of net operating cash but paid USD61.7 million for property, plant and equipment, almost 100% of revenue. DFC's up-to-USD300-million loan supports expansion, yet management also reported customer equipment-deployment delays, finance and covenant pressure, and a material going-concern uncertainty; capacity delivery and billing are the central conversion tests.
    - Cassava confirms an NVIDIA-powered South Africa AI-factory deployment, but neither Cassava nor Africa Data Centres identifies JHB1, JHB2 or CPT1 as the host or discloses GPU model, count, rack allocation, power draw, utilization or program revenue. Country-level AI announcements are therefore not assigned to specific facilities.
    - ODATA's 12 current detailed facility cards sum to 602.62 MW of published IT-power nameplates; adding current-directory BG02 yields 626.62 MW, and retaining announcement-only BG03 yields 746.62 MW. These figures mix operating, available, contracted, first-phase, under-development and full-build scopes, so none is treated as current utilized capacity.
    - QR03 is the clearest ODATA power-chain case: a 300 MW five-building campus, a launched 72 MW first building, 200 MW of energized power infrastructure and a path to 400 MW. These four figures describe different scopes and are not added; ODATA also discloses no exact customer GPU model, count, rack allocation or utilization despite three committed hyperscale anchors.
    - Aligned's own pages conflict on the same July 18, 2026 access date: the homepage says 87 data centers under management and future development, 6.4 GW operational plus planned and 51 campuses; the hyperscale page says 87 facilities and over 6.4 GW committed power but also separately says over 5 GW; the about page says 50 campuses and 5 GW; and the gigascale page says 82 data centers across 50 campuses and 5 GW plus. These scopes cannot be ranked as clean current capacity without lifecycle and denominator reconciliation.
    - The public location cards expose 27 North American identifiers and 12 Latin American identifiers, or 39 versus the 87-unit headline. Adding ODATA BG02 from the current master directory and announcement-only BG03 reaches 41, still leaving 46 units unexplained. Repeated addresses reduce the North American list to 21 public address clusters, but identifiers, clusters, campuses, buildings and managed or future assets remain different measures.
    - Aligned and ODATA now provide useful module-level power evidence even though exact bills of materials remain hidden. Most North American market pages list 3 MW generator modules, 2 MW UPS lineups, 500 kVA PDUs and 415 V A+B rack distribution; ODATA's site or country pages show generator-module ratings from 1.65 to 3 MW, UPS lineups from 0.8 to 2.4 MW and PDUs from 200 to 530 kVA. SP03 explicitly gives two 800 kVA UPS lineups, but other unit counts, aggregate installed MVA, OEMs and live utilization remain undisclosed.
    - DFW-04 has an announced Lambda tenancy and design compatibility with NVIDIA Blackwell and Blackwell Ultra, but no disclosed GPU count or live status. The Texas accessibility record gives 425,500 square feet, a US$161 million estimated project cost and an October 1, 2026 scheduled completion while also saying inspection complete; those fields do not prove commercial opening or total project capex.
    - Project Caprock is a 540 MW, 313-acre, six-facility development with 1.65 million square feet and a Q1 2027 LBB-01 target. Aligned will build and fund dedicated electrical infrastructure with Xcel Energy and use DeltaFlow plus closed-loop cooling, but the source does not define 540 MW as IT load or disclose GPU inventory, equipment counts, grid voltage or incurred capex; the US$5 billion figure is a regional economic-infusion envelope.
    - Aligned added a US$2.58 billion three-year Devco revolver in March 2026 after more-than-US$1 billion of BXCI commitments and ODATA's US$1.02 billion green financing in 2025. These dated facilities may overlap the more-than-US$7 billion of debt commitments in the January 2025 capital raise, so none is added mechanically; audited revenue, operating profit and dollar NOI remain private, and the approximately US$40 billion enterprise value measures valuation rather than earnings.
    - The agreement for AIP, MGX and BlackRock GIP to acquire 100% of Aligned equity had an original first-half-2026 target but remains pending in this record because no primary completion announcement was located by July 18, 2026. Closing, financing and post-close ownership therefore remain explicit watch items rather than current facts.
    - Ascenty's audited Brazil-and-Chile issuer generated BRL1.714 billion of FY2025 net revenue and BRL508.4 million of operating profit, up 10.7% and 79.8% respectively, and swung from a BRL855.6 million net loss to BRL298.9 million of net profit. A BRL1.273 billion favorable year-on-year change in the foreign-exchange result explains much of the net-income swing, so it is not treated as purely operating improvement.
    - Ascenty ended FY2025 with BRL6.154 billion of borrowings against BRL90.2 million cash and BRL895.9 million of current plus restricted financial investments. It generated BRL544.1 million of operating cash after interest and tax and paid BRL492.0 million for PP&E, making refinancing, interest, FX and preleased-capacity delivery central conversion risks.
    - The current Ascenty city rows sum to 703 MW of marketed total power and 464,500 square meters across 40 operating or development data centers, while the FY2025 ESG report says 350 MW across a 38-site Brazil-Chile-Mexico snapshot. Neither measure is identified as IT load, and the later current platform adds Colombia; the values are not added or ranked as equivalent capacity.
    - Ascenty's 150 MW of new long-term AI agreements is fully preleased and tied to US$1.2 billion of announced investment, but customer names, lease economics, revenue commencement and hardware are undisclosed. Sumare 3's 90 MW initial plus 90 MW expansion and Vinhedo 3's 90 MW do not reconcile mechanically to the four-site 150 MW contract total, so no project allocation is inferred.
    - The only exact named Ascenty accelerator evidence is a Dell AI Factory test environment at Vinhedo using Dell PowerEdge XE7745 servers and NVIDIA RTX PRO 6000 Blackwell Server Edition GPUs. Server and GPU counts, rack power and utilization are undisclosed, and this POC environment is not hyperscale customer inventory.
    - Ascenty's 2025 ESG snapshot reports 943,548 MWh of electricity consumption, 1.40 PUE, WUE zero and 100% renewable electricity associated with I-RECs. Its 110-average-MW Casa dos Ventos self-production contract is scheduled for 2028-2042; the underlying more-than-1.5-GW renewable projects are generation nameplate, not campus IT capacity.
    - Scala Data Centers' audited Brazilian issuer generated BRL916.4 million of FY2025 net revenue, BRL123.5 million of profit before net finance and taxes, and BRL428.1 million of company-reconciled EBITDA, but still recorded a BRL21.0 million net loss. The issuer spent BRL1.823 billion on property, plant, equipment and intangibles and ended with BRL4.355 billion of net debt, so rapid capacity growth is already visible in revenue and EBITDA alongside a heavy financing and cash-conversion burden.
    - Scala's current 13 operating cards sum to 123.1 MW and eight construction cards with exact capacity sum to 182 MW; a ninth construction card has no MW. These card sums do not reconcile the operator's more-than-900-MW construction-and-future headline, and the audited report distinguishes 11 Brazilian operating sites from two foreign sites run by related group entities.
    - Tambore's current cards show 84 MW operating and 120 MW under construction against a dated 450 MW, 17-building full-development plan. Two 60 MW operating substations plus a 560 MW third substation yield 680 MW of published electrical nameplate, not IT load; the current page still says the third unit is under construction while FY2025 management says it was energized in 2025.
    - Scala discloses no exact installed GPU models, counts, racks, ownership, utilization or site allocation. Tambore's 24-100 kW rack range and AI City's planned greater-than-150-kW racks are design accommodations only and cannot be converted into accelerator inventory.
    - Scala AI City's first 54 MW and theoretical 4.75 GW buildout remain a land-and-master-plan-stage development. Its USD500 million first-phase and governor-stated USD90 billion full-realization potential are prospective envelopes, not current capex, revenue, profit, financed load or energized capacity.
    - DATA4's latest exact operator disclosure says 38 data centers and 1.5 GW across six European countries, while the six current city pages sum to 1,252 MW and named subcampus components sum to 1,205 MW. The full 47 MW city-to-component gap is in Milan, and the remaining gap to 1.5 GW is not assigned because the figures use different power, reserve, IT-power, lifecycle and date scopes.
    - PAR03's 250 MW design could house nearly 200,000 unspecified GPUs and four million petaFLOPS, but this is a design accommodation ceiling rather than procured, installed or operating hardware. Escaudain's planned 700 MW and four buildings likewise establish development scale without revealing accelerator models, counts, customers or delivery.
    - DATA4's 2024 Marcoussis assurance report gives unusually detailed physical infrastructure evidence: dual 90 kV feeds stepped to 20 kV loops, ten minutes of full-load UPS battery autonomy, 72-94 hours of fuel, and four building designs with 2N or shared redundant power plus free cooling. Internal generator-count and category-label conflicts in the same report prevent those equipment rows from being summed into a clean current fleet total.
    - DATA4's current standalone revenue, operating profit, capex, debt and cash flow remain undisclosed. Brookfield's acquisition note provided only a historical FY2023 pro-forma $364 million revenue and $47 million net loss, while BIP's FY2025 $1.129 billion Data-segment revenue and $324 million Data Storage adjusted EBITDA include multiple businesses and cannot be attributed to DATA4.
    - DATA4 plans more than EUR20 billion of European investment through 2030, including EUR5 billion at Escaudain, while PAR03 and Hanau each carry EUR2 billion announcements and Warsaw is planned to reach about EUR600 million. These project values overlap broader plans and remain different from incurred capex, revenue or profit; power delivery, construction, leasing and utilization are the conversion tests.
    - American Tower's CoreSite Data Centers segment generated $1.053 billion of FY2025 revenue and $562.2 million of company-defined segment operating profit, then $288.9 million and $152.3 million respectively in Q1 2026. The segment operating-profit metric aligns with Adjusted EBITDA and excludes depreciation, corporate expense and other GAAP items, so it is not comparable with consolidated operating income.
    - CoreSite's real-estate depreciation, amortization and accretion was $604.3 million in FY2025, reducing the filing's Data Centers segment gross margin from $650.7 million before that charge to $46.4 million after it. Q1 2026 shows the same boundary at $176.8 million versus $27.2 million. This exposes the large depreciation burden even though GAAP segment operating income remains undisclosed.
    - Q1 2026 CoreSite revenue grew 18.4% and segment operating profit grew 24.9%, while segment capex rose 74.8% to $226.0 million and represented 49.1% of American Tower's consolidated capex. FY2026 guidance calls for $1.175-$1.195 billion of Data Centers property revenue and $695 million of development spend, making lease commencement, power delivery, depreciation and capital returns the conversion tests.
    - CoreSite is a rare colocation operator with an exact named customer accelerator disclosure: STN's GPU One deployment at CH2 contains 1,536 NVIDIA B200 GPUs across 24 racks and 2.4 MW of infrastructure with direct-to-chip liquid cooling. It is customer infrastructure, not CoreSite-owned GPU inventory, and no other site or portfolio total is inferred.
    - CoreSite's latest SEC ledger reports 30 operating facilities in 11 U.S. markets and 3.773 million NRSF, while current marketing says 4.8 million-plus square feet. The 11 rounded market headlines sum to about 4.821 million square feet, but visible facility cards excluding planned DE3 sum to only about 4.245 million because three of nine Silicon Valley facilities are uncarded. Gross area, NRSF and visible-card area remain separate.
    - GDS and VNET provide unusually useful but non-comparable operating ledgers. At Q1 2026 GDS reported 1,538 MW in service and 77.3% utilized area, while VNET reported 907 wholesale MW in service and 75.7% utilized MW plus a separate 50,170-cabinet retail fleet. GDS area utilization and VNET wholesale power utilization must not be ranked as the same denominator.
    - GDS FY2025 revenue was CNY11.43 billion and its GAAP continuing-operations result was a CNY55.8 million loss after a CNY1.56 billion impairment, despite CNY5.40 billion adjusted EBITDA. VNET reported CNY9.95 billion revenue and CNY780.3 million operating profit. The adjusted metrics, transaction effects, impairments, and different retail-wholesale mixes prevent a simple EBITDA comparison.
    - VNET's 1.056 GW future-development resource and GDS's 3.7 GW powered land and reservations show substantial option value, but neither is current energized or utilized load. Their FY2026 capex guidance of CNY10-CNY12 billion and CNY9 billion respectively makes delivery, funding, customer ramp, and power availability the key conversion variables.
    - Chindata's latest portfolio snapshots use 1.64 GW of operating-plus-construction IT capacity in Q2 2024 and 1,355 MVA of operating substation capacity across named clusters in July 2024. IT MW and MVA are not interchangeable, both are dated, and the 2026 HEC-led acquisition changed the China-business ownership scope.
    - Chindata provides deep power-architecture evidence despite current financial opacity: Lingqiu uses a proprietary 220 kV-to-10 kV transformer path, while Sangyuan's commercial solid-state transformer converts 10 kV AC directly to 800 V DC at up to 98.5% conversion efficiency. Neither disclosure reveals live GPU inventory, served IT MW, storage MWh, or full backup-chain equipment.
    - Hyperscale buyers are funding the demand wave directly: Meta raised its 2026 capex range, Amazon's free cash flow fell as AI property investment rose, and Oracle is financing rapid OCI expansion against a very large AI-heavy RPO.
    - Apple owns eight disclosed data centers and used about 2.041 TWh at those sites plus 0.544 TWh of metered colocation electricity in 2025. Its Private Cloud Compute fleet uses custom Apple-silicon inference servers, but Apple discloses no chip model, server, node, chassis, rack, GPU, IT-MW, or site-allocation count. The colocation figure excludes cooling and building-operation energy, so it is not directly comparable with owned-facility consumption.
    - Apple's FY2025 revenue was $416.2 billion and operating income $133.1 billion, while Services revenue was $109.2 billion. Services is the monetization layer supported by the infrastructure but is not data-center revenue; the $600 billion four-year US commitment is likewise broad manufacturing and supplier spend rather than a data-center capex forecast.
    - AWS currently reports 39 Regions and 123 Availability Zones, Microsoft more than 500 datacenters in 34 countries, and Google a static 30-active-location/11-country sidebar. Google's 59-row official roster reconciles instead to 31 active and 28 development labels after correcting Canelones from its FAQ and detail page; excluding Waltham Cross, opened in 2025, exactly restores 30/11, strongly suggesting but not proving that the sidebar predates that opening. These disclosures use different physical and logical scopes, so fleet size cannot be ranked safely without building, ownership, and lifecycle reconciliation.
    - Amazon, Microsoft, and Alphabet all show strong current cloud earnings while accelerating infrastructure: AWS produced $14.16 billion of Q1 2026 operating income, Microsoft Intelligent Cloud $13.75 billion, and Google Cloud $6.60 billion. These segment results include services beyond physical data centers and do not reveal campus-level return on capital.
    - Meta's current public roster reaches 33 data-center locations, but its 2024 Environmental Data Index individually reported only 18 owned online sites plus aggregated leased facilities. The 33-location page mixes operating and future projects, so it is not a current operating-building count. Meta's FY2026 capex outlook of $125-$145 billion is a derived 73%-101% increase over FY2025 and makes delivery, utilization, and depreciation central return-on-capital variables.
    - Meta engineering provides unusually concrete accelerator milestones: two 24,000-H100 clusters, a later 129,000-H100 cluster spanning five emptied production data centers, and a Blackwell pod example with 72 GPUs drawing about 140 kW across two GPU racks plus four air-assisted liquid-cooling racks. Its current fleet is described only as hundreds of thousands of GPUs; these milestones cannot be summed into an exact live global inventory.
    - Public accelerator figures remain asymmetric. Amazon disclosed more than 2.1 million accelerated chips landed over 12 months, Microsoft hundreds of thousands of liquid-cooled Grace Blackwell GPUs deployed in under a year, and Google network capability beyond one million TPUs or up to 960,000 Vera Rubin GPUs. The Amazon and Microsoft figures are deployment-flow statements; Google's are architecture or logical-cluster ceilings, and none is an exact live global site inventory.
    - Google provides unusually deep power and cooling architecture evidence: more than 100 million rack-battery cells, distributed 48 VDC BBUs, more than 2,000 liquid-cooled TPU Pods at gigawatt scale, and a next-generation plus-or-minus-400 VDC path to 1 MW racks. These fleet and design disclosures still do not identify per-site grid capacity, UPS/generator counts, or equipment suppliers.
    - Oracle's five disclosed US OpenAI campuses now have different power paths: ERCOT plus GE Vernova backup turbines in Abilene, a VoltaGrid reciprocating-engine microgrid block at Frontier, Bloom fuel cells at Project Jupiter, WEC grid expansion at Lighthouse, and DTE grid plus matching storage at The Barn. Their IT, generation, grid-demand, and storage figures are intentionally kept separate.
    - Frontier's 1.4 GW critical-IT design is larger than the currently documented 709 MW VoltaGrid permit block, while Lighthouse's 902 MW critical-IT design sits inside WEC's 1.3 GW through-2030 demand forecast and up-to-3.5 GW long-term potential. These gaps are evidence of phased infrastructure, losses, and possible expansion, not grounds for GPU-count inference.
    - DTE's FY2025 revenue was $15.8 billion and operating income $2.37 billion; its 1,383 MW Saline contract and matching storage obligation create a large regulated growth project, but delivery, cost recovery, and the remaining 751 MW of storage procurement are material execution risks.
    - WEC's FY2025 revenue was $9.80 billion and operating income $2.24 billion; Lighthouse supports its large-load thesis, but WEC's broader generation and storage capital plan cannot be attributed wholly to one campus.
    - STACK's current homepage markets more than 8.5 GW built or under development plus more than 8.5 GW planned and potential, but the current regional headlines and market cards do not reconcile. Its latest disclosed more-than-$36.1-billion capital-raised figure is financing, not revenue; audited standalone revenue, operating profit, debt, utilization, and customer concentration remain undisclosed.
    - Stafford pairs a published 1.1 GW campus figure with six 300 MW Dominion substations. The 1.8 GW substation-nameplate sum reflects grid infrastructure and likely phasing or redundancy, not an additional 1.8 GW of IT load; neither STACK nor Dominion discloses the live GPU fleet or campus revenue.
    - TNB's FY2025 revenue was RM67.7 billion and operating profit RM8.53 billion. By March 2026 it supplied 36 operating data centers with approximately 4.5 GW of planned supply capacity and had 23 more projects under construction with 3.8 GW of maximum demand, but these portfolio figures cannot be assigned to STACK's 216-220 MW Johor development.
    - Dominion's FY2025 revenue was $16.5 billion and income from operations $4.41 billion. Its Stafford role is confirmed at the substation level, while campus-specific rate base, revenue, energized load, and customer economics remain undisclosed.
    - NextEra's FY2025 revenue was $27.4 billion and operating income $8.28 billion, and its large-load strategy spans more than 30 data-center hubs. Its proposed Dominion combination remains pending as of July 18, 2026, so the combined 110 GW generation base, more-than-130-GW large-load pipeline, and 9%+ adjusted-EPS growth targets are forward-looking rather than current Stafford ownership or earnings.
    - Crusoe, Vantage Data Centers, VoltaGrid, and Related Digital disclose large project and financing figures but no reviewed public audited consolidated revenue or operating profit. Their project investment, funding, and pipeline values are kept out of earnings comparisons.
    - AirTrunk, Firmus, and DayOne are also private and do not publish reviewed audited standalone revenue or operating profit. AirTrunk's A$24 billion transaction value, Firmus's US$10 billion debt facility and US$25-$30 billion expected Batam offtake receipts, and DayOne's US$4.5 billion Series C are respectively valuation, financing, commercial expectation, and equity funding measures rather than current earnings.
    - Firmus provides unusually specific planned hardware counts: about 54,000 GB300s across initial Australian stages and up to 170,000 NVIDIA accelerators at a 360 MW Batam campus. No reviewed official source confirms those fleets are physically live, and the exact CDC Melbourne building and Batam power chain remain undisclosed.
    - CDC's 568 MW operating-capacity snapshot at December 2025 increased to 671 MW by March 2026, while invoiced ICT capacity was only 220 MW at FY2026 year-end. That gap illustrates why built, contracted, invoiced, and utilized capacity must remain separate.
    - Oracle's Project Jupiter revised its onsite power plan to as much as 2.45 GW of Bloom solid-oxide fuel cells, making onsite generation a direct AI-campus value pool; nameplate generation includes redundancy and is not disclosed IT load.
    - Bloom Energy's Q1 2026 revenue grew 130.4% and its Oracle master agreement covers up to 2.8 GW, but deployment concentration, natural-gas dependence, and backlog conversion remain central risks.
    - Alibaba Cloud grew FY2026 revenue 34% and adjusted EBITA 35% while Alibaba spent RMB126.1 billion of capex and committed at least RMB380 billion to AI and cloud infrastructure; the capex and investment figures include more than data-center buildings.
    - Tencent generated much stronger consolidated operating margins than Alibaba and described Q1 capex payments as primarily AI-related, but it does not disclose standalone cloud revenue or operating profit. ByteDance is even less comparable because no reviewed public audited consolidated baseline exists.
    - Huawei Cloud reported 34 regions and 101 availability zones at 2025 year-end, but an AZ may contain one or more physical data centers and the company provides no building-level fleet ledger. Its Atlas 900 A3 architecture supports 384 Ascend 910C NPUs across 12 compute and four bus cabinets; the more-than-300-system deployment disclosure spans external customers and cannot be multiplied into a Huawei Cloud inventory.
    - Huawei's FY2025 revenue was CNY880.9 billion and operating profit CNY96.9 billion. The Cloud Computing segment reported CNY32.2 billion of revenue, down 3.5%, while a separate broader cloud-business measure including revenue from other Huawei segments was CNY72.1 billion; neither Cloud nor Digital Power operating profit is separately disclosed, so the two cloud measures cannot be added or used to infer data-center returns.
    - Huawei's Gui'an AZ3 permit exposes a rare physical power-chain denominator: a 220 kV substation with eight planned 100 MVA transformers and three in phase one. The derived 800 MVA and 300 MVA sums are apparent-power nameplate, not IT load; redundancy, power factor, energization, accelerators, and equipment vendors remain unknown.
    - Baidu disclosed a 32,000-card Kunlunxin P800 cluster in scaled use with effective training above 98%, but no campus, rack count, measured MW, or utilization ledger. Its later Tianchi rack design supports 64 cards, 33-120 kW of rack power, 10+2 PSU redundancy, and hybrid liquid-air cooling; the reviewed evidence does not establish that the 32,000-card cluster uses this exact rack.
    - Baidu's Yangquan first phase supports a published 160,000-server design scale, while the 2019 second-phase plan added more than 80,000 high-performance AI servers and the 2025 D15 plan about 5,000 racks. Those are different lifecycle measures. The site's 1.12 campus PUE, 1.08 module metric, and below-1.15 phase-two target are also kept separate, and the company-wide P800 fleet is not assigned to Yangquan.
    - Baidu FY2025 AI Cloud Infra revenue reached CNY19.8 billion, up 34%, while consolidated GAAP operating loss was CNY5.8 billion after a CNY16.2 billion long-lived-asset impairment; operating income excluding that impairment was about CNY10.4 billion. AI Cloud Infra operating profit and capex remain undisclosed, and the proposed Kunlunxin spin-off is a possible valuation catalyst rather than a completed transaction.
    - China Telecom reported CNY34.5 billion of FY2025 AIDC revenue, 46 EFLOPS of proprietary intelligent compute, more than 3.2 GW of rack-power scale, and 15 100-MW-scale AIDC hub parks. Its separate 7 GW resource-capacity and 1.2 GW high-power-project figures use different scopes and are not added; AIDC operating profit remains undisclosed.
    - China Mobile reported 92.5 FP16 EFLOPS across self-built and rented intelligent compute and more than 1.5 million 2.5-kW-equivalent racks for external IDC service. Hohhot and Harbin disclose about 20,000 and 18,000 AI accelerator cards respectively, but neither exact models nor campus IT MW are public. Its CNY148.9 billion operating profit covers the whole telecom group, not data centers.
    - China Unicom generated CNY28.1 billion of FY2025 data-center revenue, operated more than 1.1 million 2.5-kW-equivalent cabinets at more than 72% utilization, and reported 45 EFLOPS plus seven 100-MW-grade AIDC campuses. The exact seven-campus roster, physical cabinet count, accelerator allocation, and data-center operating profit remain undisclosed.
    - Alphabet's latest $180-$190 billion 2026 capex range, with the overwhelming majority for technical infrastructure, makes it one of the largest current demand sources; rising Cloud operating profit shows monetization is already visible even though campus economics remain undisclosed.
    - NVIDIA's latest Data Center revenue shows that accelerator and network spending remains the largest disclosed value pool in this set.
    - AMD's multi-year Meta agreement and latest Data Center segment growth show a second merchant-GPU path, but planned gigawatts are not current shipments.
    - Broadcom's custom AI silicon growth indicates that hyperscaler-specific accelerators are expanding alongside merchant GPUs.
    - TSMC's Q2 2026 HPC mix reached 66% and its full-year capital budget rose to $60-$64 billion, showing foundry and advanced-packaging capacity scaling with AI demand; customer and campus attribution remains undisclosed.
    - SK hynix's HBM-led results show memory is a core accelerator-system bottleneck, but its earnings remain highly cycle-sensitive.
    - Micron's Cloud Memory and Core Data Center units produced a derived 61% of Q3 FY2026 revenue, while its extraordinary margin expansion and Q4 guidance show both strong AI-memory value capture and unusually high cycle-reversal risk.
    - Coherent generated about 75% of Q3 FY2026 revenue from Datacenter & Communications and is scaling 6-inch indium-phosphide output, showing that optical components are becoming a major AI-cluster value pool even though the segment is broader than AI.
    - Corning's Optical Communications sales rose 36% in Q1 2026 and its up-to-$6 billion Meta agreement plus two unnamed comparable hyperscaler agreements show multi-year fiber demand moving into contracted manufacturing expansion; maximum contract descriptions are not recognized revenue.
    - Vertiv, Eaton, Schneider Electric, GE Vernova, Caterpillar, and Cummins all report strong data-center-driven demand or order signals across cooling, electrical infrastructure, grid equipment, and onsite generation.
    - Cummins' Q1 Power Systems sales rose 19% and segment EBITDA margin reached 29.5% on power-generation demand led by data centers, but data-center revenue remains embedded with other end markets.
    - Modine's Q4 data-center sales rose 158%, and an unnamed customer reserved more than $4 billion of Airedale capacity for 2027-2029 with a $165 million advance; this is unusually concrete cooling demand but remains a concentrated capacity commitment rather than recognized revenue.
    - Trane's Q1 Americas applied-equipment bookings rose more than 160% and total backlog reached $10.7 billion, while Johnson Controls' backlog reached $20.0 billion with Americas orders up 40%; both signals include non-data-center markets and should not be counted as pure AI revenue.
    - Prysmian's North American Industrial & Construction growth was driven by data centers while Digital Solutions grew on fiber demand, adding cable and optical infrastructure as a distinct earnings layer beyond chips and cooling.
    - Nexans adds a second European cable exposure: FY2025 PWR-Connect deliveries included large data-center projects, but neither data-center revenue nor customer concentration is disclosed.
    - LS Electric's Q1 operating profit rose 45% as it named data centers the primary Electric-business earnings driver; HD Hyundai Electric's Q1 backlog reached $7.9 billion on record orders including North American data-center and grid demand. These are visible earnings and backlog signals, not confirmed supplier awards at named campuses.
    - AdaniConneX had 55+ MW operational across four data centers at FY2026 year-end against 560+ MW tied-up, 2,033 MW of potential across five current site cards, and multi-gigawatt platform ambitions. Operating, tied-up, site-potential, platform, and target capacity are different scopes; none establishes utilized load or revenue.
    - Chennai 1 provides unusually detailed Indian power-chain evidence: 33 MW total IT design with 17 MW live in Building 1, 110 kV onsite GIS fed from two independent substations, 50 MVA N+N transformers, N+N UPS and PDU, N+1 generators, 560,000 liters of diesel, and 48 hours of backup. AdaniConneX still does not disclose site revenue, operating profit, GPU inventory, equipment counts, or OEMs.
    - Nxtra's standalone FY2026 revenue was INR24.3 billion and derived operating result was INR3.84 billion. Its public physical scales do not reconcile: the current homepage says 15 hyperscale sites and 230+ MW, the March 2026 funding release says 14 core sites and about 300 MW, FY2025 sustainability reporting says 220 MW, and current market-page rows sum to 275.2 MW. These are retained as separate date and scope measures rather than one live-capacity answer.
    - EdgeConneX is the private global partner behind the 50:50 AdaniConneX venture. It markets 90+ data centers built or in development in 60+ markets, while its global map says 80+; regional rosters mix direct sites, affiliates, joint ventures, and coming markets. Current standalone revenue, operating profit, capex, debt, live MW, utilization, and GPU inventory are undisclosed.
    - STT GDC India's current 34 marketed site rows sum to a derived 613.5 MW, reconciling to the rounded 613 MW page counter, but explicit development rows are included and the same page still says 30 facilities. The February 2026 release separately described 30 facilities including development and more than 400 MW, so neither figure is promoted as current energized or utilized load.
    - STT GDC India generated INR2,747.46 crore of FY2026 income from operations and INR126.03 crore of profit for the year in Tata Communications' equity-method note, derived growth of 17.8% and a 4.6% profit margin. Operating profit, EBITDA, capex, debt, cash flow, utilization, and site-level returns remain undisclosed; the INR7,640.37 crore sum of liabilities is not relabeled as debt.
    - CtrlS generated INR1,562 crore of audited FY2025 operating income and INR248 crore of PAT in ICRA's consolidated scope. Applying the reported 49.6% OPBDITA margin gives a derived INR774.75 crore, but this is not accounting EBIT. ICRA's May 2026 baseline of 17 operating centers and 150 MW conflicts with CtrlS's June headline of 19 live centers and more than 370 MW, so neither is used as a utilization denominator without reconciliation.
    - CtrlS plans INR13,000-INR13,500 crore of FY2027-FY2028 capex and ICRA expects 950-1,000 MW operational by FY2029, supported by preleasing to one hyperscaler and a CPP Investments commitment of up to INR7,000 crore. This creates visible funding and demand support but also concentrated-customer, execution, leverage, and bullet-refinancing risk; the INR44,824 crore pre-money valuation is not an earnings measure.
    - Nidar Infrastructure Group, the parent of Yotta, generated $95.1 million of FY2025 revenue but an EBIT loss of $13.4 million and PAT loss of $67.3 million. The preferred appendix-reconciled EBITDA was $24.1 million, while the summary table's differently constructed EBITDA was $31.0 million; neither resolves the large finance-cost burden or provides standalone Yotta economics.
    - Yotta's newest exact site-specific live disclosure is 8,192 H100 plus 1,024 L40S GPUs at NM1. It does not reconcile to the October 2025 disclosure of 13,312 H100/H200/B200 GPUs operating and generating revenue or February 2026's more-than-10,000 live portfolio headline, so the records are not summed and current H200/B200 status remains open.
    - Yotta's later plan calls for 30,000 B300 Ultra GPUs at a 60 MW D2 facility and 36,000 GB300 or Vera Rubin GPUs at a 75 MW NM2 facility. The more-than-$2-billion investment, more-than-$1-billion NVIDIA engagement, and approximately $2.8-billion Gorilla framework overlap and are not current revenue; delivery, power, liquid cooling, utilization, and financing remain the conversion tests.
    - Nidar and Cartica terminated their proposed business combination on January 7, 2026 and withdrew the registration statement without selling securities. Consequently, the transaction-era enterprise value, cash injection, ownership, debt-at-closing, and FY2026-FY2027 projections are not current public-company facts or achieved results.
    - Sify's audited FY2026 group revenue was INR44.88 billion, IFRS operating profit INR3.01 billion, and management-defined EBITDA INR9.87 billion, but INR3.96 billion of finance expense drove a INR1.37 billion net loss. The earnings signal is therefore strong operating growth alongside a still-heavy financing and depreciation burden.
    - Sify's data-center segment generated INR17.52 billion of external revenue and INR8.06 billion of pre-unallocated segment result. Subtracting identified data-center D&A gives a derived INR3.59 billion, but this remains before central support allocations and is not reported segment EBIT. Site-level revenue, profit, debt, and return on capital remain undisclosed.
    - Sify's capacity ledger separates 188 MW of marketed live facilities, approximately 132 MW installed, 114 MW revenue-generating in June 2025, and 129 MW cumulatively sold by March 2026. The additional 81 MW contracted for FY2027 delivery supports growth visibility but requires construction, equipment, power, customer acceptance, and billing before it becomes revenue.
    - SISL's FY2025 standalone revenue was INR1,428.37 crore, company-described EBITDA INR634.29 crore, and PAT INR126.41 crore. CRISIL expects about 20% revenue CAGR over three to five years and INR4,000-INR4,500 crore of capex over three to four fiscals, making customer concentration, debt, utilization, and IPO execution the main conversion risks.
    - Sify offers H100, L40S, and L4 GPUaaS and has three NVIDIA-certified AI-ready campuses, but discloses no GPU count, ownership split, site allocation, utilization, power draw, or GPU-service revenue. Certification and liquid-cooling density are therefore not treated as installed accelerator inventory.
    - Chennai 7 provides a useful Indian engineering denominator: 7.2 MW phase-one IT load against about 12.3 MW total facility power, dual 110 kV utility sources, seven 2 MW diesel generators, 240 KL of derived fuel storage for up to 48 hours, and five 430 TR air-cooled chillers. Generator and cooling nameplate sums include redundancy and are not IT capacity or evidence of installed GPUs.
    - Tata Communications' FY2026 revenue from operations was INR24,802.72 crore, reported EBITDA about INR4,822 crore, and derived EBIT before exceptional items and associate share INR2,297.45 crore. Its 26% equity-method interest means these consolidated figures cannot be used as STT GDC India revenue or operating profit; only INR32.77 crore of associate profit entered the relevant consolidated line.
    - KKR and Singtel signed to acquire the remaining 82% of STT GDC at an implied S$13.8 billion enterprise value, with announced post-close ownership of 75% and 25%. Singtel's May 2026 results still described completion as due in the second half, so the transaction remains pending in this dataset; enterprise value includes leverage and committed-project capex and is not current revenue or profit.
    - Blackstone's data-center exposure is a capital-and-platform layer rather than equipment revenue: it described a $165 billion current global platform plus an approximately $160 billion future pipeline and expects roughly $100 billion of investment or commitments by end-2026, but private AirTrunk and QTS standalone operating profit remains undisclosed.
    - Infratil provides unusually detailed look-through economics for CDC: FY2026 net revenue was A$533.9 million and EBITDAF A$392.5 million against A$2.1 billion of annual capex and A$4.9 billion of net debt. The new 555 MW contract could lift EBITDAF above A$1 billion in FY2028, but only after a large construction and financing step-up.
    - ABB's Q2 Electrification data-center orders grew at a triple-digit rate, while Siemens Energy booked about EUR2 billion of Grid Technologies data-center orders in the first half; electrical equipment demand is visible before many announced campuses become energized.
    - GE Vernova's Q1 2026 data-center equipment orders exceeded its full-year 2025 amount, showing the demand wave is reaching grid-scale equipment.
    - Equinix ended 2025 with 280 data centers, 392,300 consolidated cabinets, and 51,900 sellable cabinets in significant IBX projects under construction against an estimated $6.55 billion of capex. Digital Realty ended 2025 with 310 data centers, about 2.9 GW of in-place IT capacity, and 769 MW of projects underway, 64% preleased. Their high leasing and backlog demand must therefore be read together with the capital and power required to deliver capacity.
    - Digital Realty's Astra site has a utility-service path from 600 MW by early 2028 toward 2 GW at full delivery, and De Soto identifies Evergy as the utility coordinating customer-funded transmission and substation work. The site remains in planning and permitting, so service MW is not energized IT load or GPU inventory.
    - NTT DATA's data-center business generated ¥520.3 billion of FY2025 sales and ¥209.0 billion of operating profit before common head-office costs, but the latter includes a data-center transfer gain and is not directly comparable with consolidated IFRS operating profit. Dated current capacity was approximately 1,630 MW with 770 MW planned, while the current website markets more than 2,000 MW; that scope and timing gap remains unresolved.
    - CyrusOne publishes 66 current site identifiers and reports more than 1 GW of worldwide critical-load capacity, but the roster mixes operating and future facilities such as OSK1. Its current standalone revenue and operating profit remain undisclosed because it is private, so its $9.7 billion debt raise, roughly $15 billion acquisition value, capacity, and owner-platform earnings are not substitutes for CyrusOne earnings.
    - OSK1 separates three commonly conflated power measures: 48 MW of planned IT capacity, a 70 MVA utility supply at 77 kV, and a 900 MW ten-year CyrusOne KEP business target. Freestone likewise has a 380 MW first-phase power agreement plus an exclusive 380 MW second phase, but no disclosed IT load, customer, GPU fleet, or equipment bill of materials.
    - KKR-managed and GIP-managed funds co-own CyrusOne, and GIP has been part of BlackRock since October 2024. KKR's Q1 2026 $1.325 billion of non-GAAP Total Operating Earnings and BlackRock's $2.814 billion of GAAP operating income describe the asset-manager platforms, not look-through CyrusOne profit.
    - Evergy's FY2025 revenue was $5.96 billion and operating income $1.53 billion. Its signed large-load portfolio reaches about 2.5 GW of steady-state peak load and supports a $21.6 billion 2026-2030 capital plan, but no reviewed official source identifies Digital Realty as the anonymous fifth ESA customer; load, rate-base, and adjusted-EPS forecasts remain prospective.
    - HPE's Q2 FY2026 Cloud & AI segment generated $7.71 billion of revenue and $954 million of operating income, while Data Center Networking revenue reached $320 million. Its planned role in HK6 demonstrates direct product exposure, but company and segment results cannot be attributed to the site and the installed GPU inventory remains undisclosed.
    - Mitsubishi Corporation provides a diversified 50% ownership route into MC Digital Realty and the approaching-100-MW NRT campus, but its ¥18.9 trillion consolidated revenue spans a global trading and investment portfolio; the joint venture's revenue, operating profit, capex, and site returns are not separately disclosed.
    - Entergy links AI-campus demand directly to multi-gigawatt generation and transmission expansion, subject to regulation and construction execution.
    - Constellation's 20-year agreements with Microsoft and Meta and 380 MW CyrusOne agreement show generation owners converting AI-load growth into long-duration contracts; pricing is undisclosed and plant capacity must not be treated as dedicated campus load.
    - CoreWeave passed 1 GW of active power and reported $99.4 billion of revenue backlog in Q1 2026, but its GAAP operating loss and heavy interest burden show that contracted demand does not remove financing and depreciation risk.
    - Galaxy's July 2026 delivery of 133 MW of critical IT load at Helios is a rare conversion of an announced multi-hundred-megawatt project into operating capacity; the projected $1 billion-plus annual revenue still depends on completing and utilizing all three phases.
