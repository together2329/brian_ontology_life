    - The FY2025 filing identifies 31 directly held datacenters and an arithmetic remainder of 13 shared or not directly operated facilities. The current Milan row increased from one directly held datacenter at FY2025 to three current datacenters, but the ownership of the two incremental facilities is not assigned without an asset-level source.
