    - FY2025 directly held datacenters consumed 516 GWh, reported 1.24 PUE, 0.34 L/kWh WUE and 100% renewable-source energy, with 128,522 cubic metres of water withdrawal. Nine site rows expose wide variation, including 1.19-1.36 PUE and 0.18-1.32 WUE, and Beauharnois uses extrapolation and exclusion boundaries.
    - OVHcloud generated EUR1,084.6 million of FY2025 revenue, EUR437.8 million adjusted EBITDA and EUR69.4 million accounting EBIT. EUR354.4 million of depreciation, amortisation and impairment explains much of the gap, so adjusted EBITDA alone overstates earnings available after capital consumption.
