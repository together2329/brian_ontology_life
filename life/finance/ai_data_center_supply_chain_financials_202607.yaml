    - Ark's GBP7.5 billion UK roadmap, contracted-power runway and more-than-EUR600-million Barcelona investment signal strong expansion, but group consolidated debt, capex, customer concentration, project returns and current ownership economics remain undisclosed. A reported strategic sale review is not a completed transaction or valuation.
