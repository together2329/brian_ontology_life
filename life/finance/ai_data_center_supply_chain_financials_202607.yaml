cross_company_read_through:
  current_signals:
    - H5 Data Centers' current directory contains 32 facility labels and 31 listed addresses, while the corporate headline is 25 US markets and more than 4 million square feet under management. Directory labels, addresses, markets, buildings and managed area are different denominators.
    - Hyscale and HyscaleIX each contain four facilities. Shared-address, multi-building, directly operated, managed and joint-venture scopes are preserved rather than collapsed into a single owned-building count.
    - Nine reviewed OSM objects relate to H5 facilities, but only seven carry H5 operator labels routed by the coverage audit. The Quincy object's legacy Intuit operator tag is preserved and is not silently aliased to H5.
    - Selected H5 pages publish meaningful power envelopes, including Ashburn's 42MW ultimate critical design, Buffalo I and II's combined 44MVA, Chicago's 18MW first phase and 36MW ultimate, Phoenix's current 26MW page and Quincy's 40MW full buildout. These labels are non-additive and do not establish current energized, sold or utilized IT load.
    - H5 advertises air-, water- and liquid-cooled high-density AI clusters, but no exact physical GPU model, unit count, owner, site, delivery, network fabric, utilization or economics was established.
    - H5 and both joint ventures are private. Novacap's more-than-US$1-billion Digital Infrastructure Fund I close is sponsor-level capital and is not H5 revenue, valuation, capex or facility investment.
    - No audited standalone H5 revenue, operating profit, net income, cash flow, debt, capex, backlog or valuation was established. Conflicting commercial-database revenue estimates are excluded, leaving H5 as indirect power, cooling, interconnection and construction demand evidence rather than a directly purchasable pure-play security.
    - nLighten France currently markets eight sites, while the 2023 Euclyde acquisition covered six. PAR2 came through the 2024 EXA-related transaction and PAR3 through the 2026 oXya acquisition; the legacy six-site roster is not frozen as current.
    - Legacy Euclyde DC1, DC2, DC3, DC5, DC6 and DC7 map to NCE1, MLH1, NCE2, LYS1, PAR1 and SXB1. No DC4 appears in the acquired sequence and no missing facility is invented.
    - Seven current numeric cards sum to 8,760 square metres and 20.2MW of end-state site capacity. PAR3 has no numeric disclosure, and the checksum is not operating, energized, sold, utilized, billed or IT load.
    - Five OSM objects under Euclyde or Euclyde Datacenters labels map to NCE1, NCE2, LYS1, PAR1 and SXB1. MLH1, PAR2 and PAR3 are absent from the reviewed operator sample, and OSM footprints are not provider floor area.
    - Current provider pages publish independent A/B cabinet feeds, 1.29 design PUE, Tier III design targets, ASHRAE A1 cooling and 15-150+kW AI-ready density. These do not establish Uptime awards, measured PUE, complete equipment BOM or liquid-cooled load.
    - Older provider material showed NCE1 at 800kW and NCE2 at 900kW versus current 6,000kW pages, while MLH1 has appeared at 1,200kW and 1,500kW. Dated end-state changes are preserved rather than silently normalized.
    - No nLighten- or customer-owned physical GPU model, count, owner, site, delivery, fabric, power, utilization or margin was established. AI-ready density is not accelerator inventory.
    - nLighten UK TopCo's audited 2024 group revenue was EUR59.963 million, operating loss EUR31.957 million and net loss EUR39.837 million. Rest-of-Europe revenue was EUR29.993 million but is not a France segment.
    - The group used EUR19.647 million of operating cash and purchased EUR74.596 million of property, plant and equipment in 2024. Loans and borrowings including leases were EUR189.705 million at year-end.
    - A GBP78.684 million ICG-Longbow facility was due in March 2026; the February 2026 accounts said replacement financing was being negotiated but was not certain. Reviewed evidence does not establish the current refinancing outcome, so this is a conversion test rather than a default claim.
    - nLighten France is private and sponsor-backed. Its investment value is European edge, sovereign-hosting, power, cooling and interconnection demand evidence, not a directly purchasable pure-play security.
    - Aruba reports seven owned data centers but five site codes. Current ISO 22237 evidence for IT3 DC-A/B/C and IT4, plus IT1, IT2 and CZ2, reconciles seven physical facilities; partner sites and four future IT4 buildings remain separate.
    - Aruba's detailed current facility sheets provide 37.5MW explicitly labelled IT power and another 2.5MW under IT2 and CZ2 unspecified power labels, a 40MW arithmetic bridge rather than current live IT load. The separate 80MW portfolio headline is achievable capacity.
    - IT4 currently has one 6MW IT data center inaugurated in October 2024. The 30MW figure is the ultimate five-building campus envelope, so the four future buildings are not counted as operating facilities.
    - Two adjacent Aruba-tagged Rome OSM ways are grouped into current IT4 DC-A; their exact data-hall-versus-power-center roles are unverified. IT1 and IT2 are exact named OSM buildings, while IT3 A/B/C and CZ2 are absent from the reviewed OSM operator sample.
    - IT3 A/B/C publish 29MW IT in aggregate with 2N power, 2N+1 UPS, 2N generation, groundwater primary cooling and emergency chillers. IT4 DC-A publishes 6MW IT, 14-40kW racks and indirect free cooling. These are design and nameplate values, not utilization.
    - Xference began an IT3 production beta requiring more than 20kW per rack, with Aruba procuring and deploying Hardware-as-a-Service servers and managing networking and security. GPU model, count, ownership, utilization and economics remain undisclosed.
    - Aruba's FY2024 legal-entity revenue of EUR300.407 million and net profit of EUR22.340 million come from a secondary Companies Register transcription. Net profit is not operating profit, the original filing was not reviewed, and the results are not data-center-only.
    - Aruba is private and not directly exchange-listed. Its value in this investment map is European sovereign-cloud, high-density colocation, interconnection, electrical and cooling demand evidence rather than a purchasable pure-play security.
    - UCBL and INSA Lyon's CCDD maps as five adjacent identically named OSM ways, but they form one facility group: one 561.998-square-metre main geometry and four small support or technical structures whose exact roles are unverified. The 862.953-square-metre footprint sum is not five data centers.
    - Official project disclosure gives 3,280 square metres, 150 racks in the first tranche and 300 ultimate racks across two tranches. These are floor-area and design envelopes, not current accepted, occupied or utilized capacity, and they are not reconciled to the OSM footprint or three-level tag.
    - Planned production dates moved from summer or October 2024 to early 2025, while the current P2CHPD page says resources migrate in 2025 and 2026. The facility is therefore recorded as physical and in a migration window, without claiming completed acceptance or full rack fill.
    - CCDD publishes redundant electrical architecture, dual high-voltage and telecommunications adduction and central or remote supervision, but no current grid capacity, IT MW, UPS, battery, generator, transformer, switchgear or PDU bill of materials. An unsupported third-party 5MW directory claim is excluded.
    - The design targets PUE 1.30 and 7.6GWh per year versus a 2.15 PUE and 12.6GWh dispersed-estate baseline, implying planned savings of 5GWh and 418tCO2e. These are project targets, not current measured CCDD performance.
    - Cooling design uses high-temperature chilled water, adiabatic free cooling, airflow containment, variable flow and possible secondary-loop heat recovery. Current PUE, WUE, energy, water, heat reuse, live liquid-cooled MW and equipment counts remain undisclosed.
    - A dated 2021 P2CHPD manual lists eight GPU-partition servers and A100, unresolved C6000 and RTX3090 labels, plus legacy K20m and K80 models in another partition. It gives no GPU-unit count and does not establish current CCDD placement after migration.
    - ISO27001, HDS, DGRI labelling and ZRR appeared as planned or in-progress states in 2024. No current certificate identifier, scope, award date or expiry was established, so the project is not marked certified.
    - The first-phase project cost is EUR11.1 million. It is not annual university capex, vendor revenue, enterprise value or current facility valuation.
    - UCBL's FY2023 public-university budget execution exceeded EUR500 million, with a EUR0.3 million accounting deficit, EUR16.7 million self-financing capacity, more than EUR102 million of own-source resources and EUR47 million of investment expenditure. These public-accounting measures are not commercial revenue, EBIT or EBITDA and are not allocated to CCDD.
    - An official 2025 presentation places UCBL's current budget above EUR420 million. UCBL is not directly investable; CCDD provides supplier-demand evidence rather than data-center pure-play earnings.
    - SRCE reported six current data centers at FY2025 year-end; all five HR-ZOO sites exactly match OSM, while the sixth, Srce ZG3, is absent from the reviewed operator sample.
    - The six-site engineering ledger sums to 1.875MW of designed DC power, 2,768.56 square metres gross, 688.73 square metres of computer halls and 135 ICT racks. These are design and physical measures, not live utilized IT load.
    - Installed nameplates sum to 2.312MW of diesel generation, 2.020MW of UPS and 1.592MW of general cooling, with a separately reported 334kW ZG2 DLC system. Different redundancy and engineering denominators are not added into capacity.
    - SRCE's rack power uses separate A/B branches and metered intelligent PDUs, UPS autonomy is at least six minutes at full load, and the cooling design uses separate water circuits, 2N+1 chillers and winter free cooling. Current measured site PUE, WUE, energy and water remain undisclosed.
    - Supek at ZG2 contains 81 NVIDIA A100 40GB GPUs: 80 across 20 compute nodes plus one access-node GPU. Vrančić adds 16 separate A100s, establishing a current exact site GPU floor of 97 rather than 81 plus 80 plus 16.
    - In 2025, Supek recorded 482,826 GPU-hours and Vrančić 93,846 vGPU-hours across an advanced-computing service used by 490 projects from 110 institutions, showing real academic AI and HPC demand.
    - SRCE FY2025 public-budget operating revenue was EUR10.730 million and operating expenditure EUR10.598 million, a derived EUR131,966 surplus. This is not EBIT; after nonfinancial-asset spending, the current-period deficit was EUR338,272.
    - The 2026 plan includes a second ZG2 diesel generator for 2N backup, ZG1 chiller work and ZG1/ZG2 monitoring and ventilation upgrades, while a new AI supercomputer is contemplated for 2027 without disclosed model, GPU count, funding award or delivery date.
    - SRCE is an unlisted University of Zagreb public academic infrastructure institution. It is investment demand evidence for HPE, NVIDIA, power and cooling suppliers, not a directly investable data-center company.
    - Vodafone's current exact provider- or certifier-listed direct-site evidence floor is two: Rehhecke in Ratingen and TIA-942 Rated-3-certified Esenyurt. This is not the complete current global fleet count.
    - Vodafone's ESG methodology supports owned or managed centralized hosting in the UK, Germany and Ireland, but it does not publish the current exact site roster or building count for those countries.
    - The current colocation page advertises more than 800,000 square metres globally and access to more than 165 Equinix and Digital Realty partner data centers. The area denominator is unallocated and partner facilities are not Vodafone physical inventory.
    - Seven UK sites come from a December 2020 climate-change agreement and 18 data centers from FY2015 history. Neither dated count is substituted for a current 2026 fleet count.
    - Seven of 16 related OSM objects are submarine cable landing stations and are excluded from compute-facility counts. Dublin's two geometries are one candidate site group, while Berlin, Docklands and other labels remain unverified current candidates.
    - Cable & Wireless Worldwide was acquired by Vodafone in 2012, but Cable & Wireless Communications was a separate demerged company acquired by Liberty Global in 2016. C&W Panama therefore cannot be treated as Vodafone inventory.
    - Former Vodafone New Zealand is now One NZ and 99.9% owned by Infratil. Its separate standard and premium service rosters are not summed, and the legacy Manukau OSM label is absent from both reviewed current rosters.
    - Vodafone PNG is operated by ATH- and Austel-owned Digitec Communications under a brand and management relationship; it is not Vodafone Group physical-site ownership evidence.
    - Turkey reports 1,100MWh of annual VFD savings across four data centers and up to 30% cooling-energy savings from AI thermal control. These measures do not disclose current site IT load, baseline PUE, complete equipment BOM or GPU inventory.
    - Vodafone FY2026 revenue was EUR40.461 billion, operating profit EUR2.844 billion and adjusted EBITDAaL EUR11.351 billion. Adjusted free cash flow was EUR2.621 billion, capital additions EUR7.291 billion and net debt EUR25.411 billion.
    - FY2027 guidance calls for EUR11.9-12.2 billion of adjusted EBITDAaL and EUR2.6-2.9 billion of adjusted free cash flow, but no data-center segment revenue, profit, capex, utilization or return is disclosed.
    - Vodafone is directly listed in London, yet it is a diversified telecom and network investment rather than a data-center pure play. Direct facility capacity is much less transparent than its broad partner and connectivity reach.
    - BNP Paribas has a current evidence-backed minimum of five directly operated site groups: Marne Est, Marne Nord and Marne Sud in France plus Bastogne and Vaux-sur-Sure in Belgium. This is not a complete global building census.
    - Three Marne Est OSM geometries represent one campus: MAE1 is the current JRC-listed site representative, MAE2 is a constructed second building whose current production acceptance was not established, and the Hello Bank relation is a site umbrella. They are not counted as three facilities.
    - The Val-de-Reuil OSM row is a legacy BNP label. Municipal evidence says BNP sold the property in 2021, and the former banking data center is now being redeveloped as Nation Data Center's 1.8MW, 2,000-square-metre NDC Rouen with a 1.2 PUE target.
    - MAE2's 2021 plan specified six 6.3MW generators, 32 UPS or battery banks, 16 rooftop chillers, five heat pumps and three additional 100-cubic-metre fuel tanks. These design nameplates are not current IT load, and the MRAe explicitly requested clarification of the electrical figures.
    - The two Belgian sites were planned around 30MW of electrical availability per site, Tier 3+ design, free cooling and 1.3 PUE. Contractor area and capex disclosures cover different phases and are retained as non-additive scopes.
    - BNP's Iceland and SWE01 HPC deployments are hosted by atNorth. SWE01 provider metrics of 12MW and 6,400 square metres are not BNP-owned or fully contracted capacity, and no physical BNP GPU count is disclosed.
    - IBM Cloud has been hosted inside BNP data centers since 2019, with a new dedicated area targeted for 2028 under a ten-year partnership. GPUs-as-a-service is a capability statement, not an installed model or unit inventory.
    - BNP FY2025 revenue was EUR51.223 billion, operating income EUR16.296 billion and net income group share EUR12.225 billion. These are diversified banking results and no data-center segment or site economics are disclosed.
    - BNP is directly listed on Euronext Paris, but it is a banking investment rather than a data-center pure play. Its raised 2028 return and efficiency targets cannot be assigned to internal infrastructure.
    - EDF's 2024 AFNOR certificate names two current internal data-center sites, NOE at Val-de-Reuil and Pacy-sur-Eure. Five OSM geometries reconcile to those two site groups; a sixth Saint-Ouen point beside RTE's national control centre lacks current official corroboration and is excluded.
    - NOE hosts CRONOS and SELENA, giving EDF more than 15 petaflops of current disclosed HPC capability. SELENA uses direct liquid cooling and reduced system PUE from 1.4 to approximately 1.04.
    - EDF's 2019 GAIA system disclosed 64 NVIDIA V100 GPUs across 32 GPU nodes, but SELENA replaced GAIA in 2025. That historical count is not current installed inventory, and no current GPU floor is inferred.
    - EDF FY2025 sales were EUR113.266 billion, EBITDA EUR29.256 billion and operating profit EUR13.104 billion, down from FY2024. Operating cash flow was EUR9.6 billion and net financial debt fell to EUR51.5 billion, but these are group energy and network results rather than data-center earnings.
    - EDF's Data4 contract allocates 40MW of nuclear production for 12 years with approximately 230GWh of annual delivery expected from 2026. Bouchain's 400MW SoftBank project and Creys-Mepieu call remain pre-operating, with contract economics and EDF returns undisclosed.
