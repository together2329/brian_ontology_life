    - Three customers generated GBP407.8 million or 83% of revenue. GBP1.291 billion of remaining performance obligations and 98% contracted live-site capacity provide visibility, but concentration and customer-acceptance timing remain central risks.
    - VIRTUS ended FY2024 with GBP1.257 billion of net debt including leases, GBP481.865 million of investing cash outflow and GBP335.081 million of contracted but unprovided capex. Undrawn debt and shareholder equity support improve runway without proving future project returns.
    - STT GDC owns 60% and Macquarie's MEIF7 owns 40%, with Temasek as ultimate controlling party. The private platform's audited accounts support company-level analysis, but no per-site revenue, operating profit, capex, utilization, GPU economics or ROIC is public.
