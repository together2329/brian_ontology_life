purpose: >-
  Connect the existing memory-company research to disclosed front-end fabs,
  foundry portfolios, internal assembly/test sites and independent OSAT/test
  companies. Keep revenue, operating profit, physical capacity, shipments,
  utilization, floor area, capex and management plans in their original units
  so that unlike denominators are never added together.

