executive_findings:
  - >-
    Public capacity transparency is strongest at the portfolio level for pure-play
    foundries and weakest for leading memory fabs and OSAT physical throughput.
    Therefore the registry can compare disclosed metrics without producing a false
    single global wafer or package total.
  - >-
    TSMC, Samsung and Intel connect front-end logic to advanced packaging, while
    ASE, Amkor, JCET and the specialist test houses provide broad backend capability.
    HBM remains more vertically integrated at the memory IDMs than conventional
    DRAM or NAND, so generic OSAT capability must not be read as confirmed HBM volume.
  - >-
    Samsung Q1 2026 DS operating profit was KRW 53.7 trillion, but it cannot be
    partitioned into memory and foundry from the public release. Intel Foundry's
    Q1 USD 5.4 billion revenue likewise includes about USD 5.2 billion intersegment.
  - >-
    Comparable pure-play foundry disclosures span different denominators: UMC's
    more-than-400,000 monthly 12-inch-equivalent installed capacity, SMIC's
    1,078,250 monthly 8-inch-equivalent capacity, and GlobalFoundries' 579,000
    quarterly 300mm-equivalent shipments are intentionally not added.
  - >-
    Backend production disclosure is heterogeneous: ChipMOS provides utilization,
    Amkor provides floor area, LB Semicon provides bump and COF outputs, and Doosan
    Tesna provides value-based equipment proxies. Missing physical throughput is
    recorded as a disclosure gap rather than estimated.

disclosure_gaps:
  - id: gap_memory_site_capacity
    priority: high
    companies: [memory_company_samsung, memory_company_sk_hynix, memory_company_micron, memory_company_kioxia, memory_company_sandisk, memory_company_cxmt, memory_company_ymtc]
    missing: Current site-level wafer starts and product allocation.
    handling: Keep capacity null; use only official portfolio or plan disclosures.
  - id: gap_foundry_segment_boundary
    priority: high
    companies: [memory_company_samsung, foundry_intel]
    missing: Standalone third-party foundry economics directly comparable with pure-play foundries.
    handling: Retain DS and intersegment boundaries.
  - id: gap_osat_physical_throughput
    priority: high
    companies: [backend_ase, backend_amkor, backend_jcet, backend_pti, backend_kyec, backend_tongfu, backend_hana_micron, backend_sfa_semicon, backend_nepes_ark]
    missing: Comparable physical packages, tested dies or test-hours by site.
    handling: Use disclosed service mix, utilization, area or capex without converting them into units.
  - id: gap_china_private_memory_financials
    priority: medium
    companies: [memory_company_cxmt, memory_company_ymtc]
    missing: Audited public revenue, operating profit and site capacity.
    handling: Preserve private-company disclosure gap and do not substitute market estimates for company financials.
  - id: gap_named_customer_flows
    priority: high
    companies: [backend_ase, backend_amkor, backend_jcet, backend_pti, backend_chipmos, backend_kyec]
    missing: Product-specific customer volume and revenue allocation.
    handling: Record only explicit named relationships; all other routes are capability maps.

retrieval_examples:
  - question: Which facilities have directly disclosed current installed wafer capacity?
    query_hint: Filter facility records where a capacity measure has metric_type installed_capacity and status reported.
  - question: Which companies have latest operating losses?
    query_hint: Filter company financial records where latest_financial_snapshot operating_profit is below zero while preserving period and currency.
  - question: How does an HBM package move across the network?
    query_hint: Read route_HBM together with explicit_relationships; do not treat capability-stage membership as a customer allocation.
  - question: Where is backend throughput unknown?
    query_hint: Filter facility records by capacity_disclosure undisclosed, floor_area_only, utilization_only or value_proxy_only.
