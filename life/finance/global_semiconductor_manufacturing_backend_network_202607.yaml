      - {sequence: 2, stage: advanced_logic_base_die, company_ids: [memory_company_tsmc, memory_company_samsung], boundary: Capability list; only named relationships above are confirmed allocations.}
      - {sequence: 3, stage: thinning_TSV_bonding_and_stack_assembly, company_ids: [memory_company_samsung, memory_company_sk_hynix, memory_company_micron], boundary: Primarily internal HBM integration; no independent OSAT allocation inferred.}
      - {sequence: 4, stage: known_good_die_and_stack_test, company_ids: [memory_company_samsung, memory_company_sk_hynix, memory_company_micron, external_advantest], boundary: The existing linked supply-chain artifact identifies test-equipment exposure; this is not a test-house customer allocation.}
      - {sequence: 5, stage: accelerator_package_integration, company_ids: [memory_company_tsmc, memory_company_samsung, backend_ase, backend_amkor], boundary: Foundry and OSAT capability map only; product-specific customer flows require separate evidence.}
    not_customer_allocation: true

