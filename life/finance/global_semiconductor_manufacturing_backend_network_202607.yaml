comparison_contracts:
  financial:
    - Preserve reporting period, currency, accounting perimeter and reported, preliminary or derived status.
    - Samsung Foundry is not reported as a standalone profit center; the DS segment includes Memory, Foundry and System LSI.
    - Intel Foundry revenue is predominantly intersegment; external revenue and the segment operating loss remain visible.
    - ASE consolidated revenue includes EMS; its ATM segment is the closer packaging-and-test comparison boundary.
    - Do not compare one quarter with a fiscal year without labeling the period.
  production:
    - Installed wafer capacity, actual wafer shipments, utilization, floor area, capex and value-based equipment capacity are separate measures.
    - Never sum 8-inch-equivalent, 12-inch-equivalent, native-wafer, package, test-hour, square-foot or currency-denominated capacity.
    - Planned, under-construction and target capacity is not current production.
    - An undisclosed physical throughput remains null even when revenue or factory floor area is known.
  facilities:
    - A campus, fab building, cleanroom line and company portfolio can overlap; each record retains its scope.
    - Kioxia and Sandisk share Yokkaichi and Kitakami through Flash Ventures; those fab records have one non-additive joint-venture group.
    - Site lists do not imply that all products, nodes or customers run at every listed building.
  relationships:
    - Category capability is not a named customer relationship.
    - Research, qualification, MOU, order, shipment and recognized revenue are distinct states.
    - Internal vertical integration is kept separate from an arm's-length supplier relationship.

