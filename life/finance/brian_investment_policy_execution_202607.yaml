    display_name: South Korea
    regime: AI-export acceleration with inflation, household-debt and housing risks forcing renewed tightening.
    policy_rate:
      value_percent: 2.75
      previous_percent: 2.5
      decision_date: '2026-07-16'
      stance: Raised unanimously; the Bank of Korea signaled that further increases may be needed.
      source_ref: bok_20260716_monetary_policy_decision
    growth:
      latest_read: Exports and facilities investment have strengthened, led by AI-related semiconductors.
      forecast_read: The Bank of Korea expects 2026 growth to considerably exceed its May forecast of 2.6 percent.
      basis: central_bank_directional_assessment_not_a_new_point_forecast
      source_ref: bok_20260716_monetary_policy_decision
    inflation:
      headline_yoy_percent: 3.2
      core_ex_food_and_energy_yoy_percent: 2.5
      period: 2026-06
      source_ref: korea_statistics_202606_cpi
    labor:
      unemployment_percent: 2.8
      employment_million: 29.12
      period: 2026-05
      nuance: Manufacturing employment is declining while services employment is growing.
      source_refs:
      - korea_statistics_key_indicators_202607
      - bok_20260716_monetary_policy_decision
    fx:
      pair: USD/KRW
      reference_value: 1485.32
      date: '2026-07-17'
      method: Derived as ECB EUR/KRW 1698.46 divided by ECB EUR/USD 1.1435.
      interpretation: The won strengthened from the mid-1500s noted around the policy period, but remains a volatile household
        and import-cost channel.
      source_refs:
      - ecb_fx_usd_20260717
      - ecb_fx_krw_20260717
      - bok_20260716_monetary_policy_decision
    credit_and_financial_stability:
      read: Seoul housing prices and household debt remain upside financial-stability risks; treasury yields rose around the
        decision.
      source_ref: bok_20260716_monetary_policy_decision
    brian_transmission:
    - Salary, bonus, severance expectations and direct SK hynix ownership share the same Korean memory cycle.
    - KRW liabilities and essential spending make household liquidity a liability-matching problem, not an FX speculation
      problem.
    - A strong Korean AI boom can increase both portfolio concentration and lifestyle confidence before the cycle turns.
    portfolio_rule: 'Keep the emergency reserve and money needed within three years in KRW-matched safe assets; do not add
      Korean memory or AI concentration merely because near-term growth is strong.

