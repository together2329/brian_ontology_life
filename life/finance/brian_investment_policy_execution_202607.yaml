decision_tree:
- gate: 1
  question: Is monthly cashflow positive and measured?
  if_no: No new discretionary investment; close spending and fixed costs.
- gate: 2
  question: Is the liquid reserve at least three months of essential spending?
  if_no: Send one hundred percent of new surplus to liquidity.
- gate: 3
  question: Is the liquid reserve at the nine-month target?
  if_no: Use the policy's seventy-percent reserve and thirty-percent global-core rule.
- gate: 4
  question: Are employer stock and explicit AI inside their transition bands?
  if_no: Send no new money to AI; use global core, safe assets and non-AI diversifiers.
- gate: 5
  question: Are exact ETF holdings, valuation, taxes and household overlap known?
  if_no: Research only; do not add the position.
- gate: 6
  question: Does the investment score at least eighty with written falsifiers?
  if_no: Reject or watchlist.
- gate: 7
  question: Does the initial size remain inside every cap after a fifty-percent loss?
  if_no: Reduce size or do not buy.
- gate: 8
  question: Has operating evidence improved after the initial position?
  if_yes: Scale only if valuation remains attractive; otherwise hold or exit.
