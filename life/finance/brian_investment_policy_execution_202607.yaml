country_macro_execution_overlay:
  source_as_of: '2026-07-19'
  coverage_boundary: 'This is not a literal survey of every sovereign economy. It is the smallest decision-complete set for
    Brian''s current portfolio and expands through the documented trigger rule.

    '
  comparability_boundary:
  - Growth figures retain their published basis; year-over-year, quarter-over-quarter and annualized rates are not compared
    as if identical.
  - Inflation is a twelve-month change unless another basis is stated.
  - Labor indicators use each authority's published concepts and are directional rather than perfectly cross-country comparable.
  - Policy rates have different operating frameworks and cannot be ranked as simple measures of tightness.
  - ECB-derived USD crosses are arithmetic reference values, not transaction prices or forecasts.
  - Taiwan's FX observation is a June monthly average and is not same-date comparable with the 2026-07-17 ECB reference rates.
  cross_economy_summary: 'The AI investment cycle remains stronger than broad global demand, while energy and imported inflation
    have pushed the United States, Korea and euro area toward restrictive or renewed tightening. China combines strong supply
    and exports with weak domestic demand and property investment. Taiwan is in an exceptional AI-export boom with ample liquidity,
    while Japan is gradually normalizing policy from still-accommodative real rates. Brian therefore faces both an earnings
    opportunity and unusually correlated valuation, financing, FX and employment risk.

    '
  economies:
