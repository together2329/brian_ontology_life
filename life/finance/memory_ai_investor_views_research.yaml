research_limitations:
  - Few famous investors have published a current, detailed, memory-specific thesis; direct statements were prioritized over inferred views from holdings.
  - Public holdings show what was owned at a reporting date, not the investor's full reasoning, hedge, cost basis, or current position.
  - Company and industry sources can validate memory demand mechanics but are not independent investor opinions.
  - This research does not determine whether SK hynix is fairly valued on 2026-07-15.
