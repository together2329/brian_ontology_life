    both contain semiconductor exposure.
  household_correlation: Employment income, expected bonus, direct SK hynix, memory and semiconductor ETFs, spouse-reported
    Korean semiconductor holdings and KOSPI exposure can respond to the same cycle.
  conclusion: Brian is diversified across several AI infrastructure layers, but not yet proven diversified across
    underlying companies, the semiconductor cycle, employer income or household liquidity.
layer_comparison:
- layer: compute_memory_network
  evidence_state: Strong current revenue and order evidence exists for leading semiconductor, memory and networking
    companies, while cyclicality, valuation and customer concentration remain material.
  brian_exposure_state: Very high by direct SK hynix, memory/HBM, broad semiconductor, NVIDIA value-chain and employment
    links.
  incremental_cash_view: Not the default destination for new salary cash until household look-through concentration
    and liquidity are measured.
- layer: hyperscale_buyers_and_cloud
  evidence_state: Official region registries and financial profiles show broad buildout, but service Regions, AZs
    and architecture maxima do not equal physical buildings or returns.
  brian_exposure_state: Present through Google and global-AI wrappers, with exact weights unknown.
  incremental_cash_view: Compare valuation, capex burden and current constituent overlap before adding another platform
    wrapper.
- layer: power_cooling_electrical
  evidence_state: Backlog, orders and data-center demand are visible across electrical and cooling suppliers, but
    data-center-only revenue and margins are rarely disclosed.
  brian_exposure_state: Explicitly present through AI power and grid wrappers and indirectly through value-chain
    funds; primary-mandate value is much smaller than chips.
  incremental_cash_view: Best candidate for further comparison inside the AI thesis, but only after exact holdings
    and valuation show that it is genuinely different exposure.
- layer: utilities_and_generation
  evidence_state: Large-load agreements and generation needs are real, while permits, interconnection, cost recovery
    and energization create long execution paths.
  brian_exposure_state: Present through power/grid and global nuclear wrappers.
  incremental_cash_view: Treat as regulated or project-risk diversification, not a simple leveraged proxy for data-center
    MW headlines.
- layer: physical_data_center_operators
  evidence_state: 81 operators have a scope-preserving crosswalk, but site economics, utilization and return on
    capital remain limited, especially for private firms.
  brian_exposure_state: Possible indirect exposure through value-chain funds; exact weights are unknown.
  incremental_cash_view: Do not rank by facility or GW headlines; require reporting boundary, leverage, utilization
    and valuation first.
- layer: neoclouds
  evidence_state: Demand and contracted pipelines are strong, but financing, depreciation, customer concentration
    and installed-versus-ordered GPU ambiguity are high.
  brian_exposure_state: Possible indirect exposure through active AI or value-chain wrappers; exact weights are
    unknown.
  incremental_cash_view: Not a core allocation candidate until ownership, cash generation, leverage and customer
    concentration pass a stricter gate.
cashflow_first_decision:
  current_state: Brian reported near-zero monthly savings flow, no current deficit pressure and no need to sell
    immediately, with a future bonus expected.
  sequence:
  - Complete the 2026-07-31 GPT/Codex tier and mobile-plan reductions and record actual recurring savings.
  - Close July spending and set a sustainable August automatic-savings candidate before increasing investment risk.
  - Define a liquid emergency reserve target separately from securities, pension, severance and home equity.
  - Capture current underlying holdings and weights for all owned ETFs plus the spouse portfolio before claiming
    household diversification.
  - Only then compare valuation and incremental exposure; inside the AI thesis, test whether power, grid and cooling
    add genuinely different earnings exposure versus existing chip-heavy wrappers.
  default_for_new_salary_cash_now: Preserve monthly surplus and liquidity rather than automatically adding another
    AI or semiconductor ticker.
  existing_holdings_boundary: No forced-sale conclusion follows from this review; future buy, hold, rebalance or
    sell decisions require tax, valuation, liquidity and concentration thresholds.
candidate_order_after_gates:
- priority: 1
  candidate: cash_and_liquidity_buffer
  reason: Restores optionality and breaks the current near-zero salary-surplus pattern.
- priority: 2
  candidate: existing_broad_or_non_AI_diversifier
  reason: Reduces dependence on employer, memory and AI-capex outcomes if look-through evidence confirms genuine
    diversification.
- priority: 3
  candidate: power_grid_cooling_value_pool
  reason: Research shows real bottlenecks and order growth, while Brian's primary-mandate weight is smaller than
    chips; valuation and constituent overlap remain required.
- priority: 4
  candidate: additional_compute_memory_or_neocloud_risk
  reason: Already highly represented or financially riskier; require unusually strong valuation, cash-flow and concentration
    evidence.
decision_boundary: This is a personalized research and sequencing record, not an instruction to buy, sell or change
