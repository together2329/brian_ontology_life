research_limits:
  - Official releases have different publication lags and can be revised.
  - No probability is assigned to the scenarios.
  - Revenue geography, supply-chain geography, listing venue and currency exposure must be captured separately at holding level.
  - Fiscal policy, trade policy and geopolitics are included only where material to current AI or household transmission; each requires event-driven refresh.
  - The overlay does not yet contain current same-date ETF look-through or company-level sensitivity coefficients.
