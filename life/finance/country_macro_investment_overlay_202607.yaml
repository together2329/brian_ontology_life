currency_role_policy:
  principle: Match the currency policy to the asset's job, not to a forecast about the next FX move.
  emergency_reserve_and_under_three_year_money:
    default: KRW-denominated or KRW-matched insured and high-quality short-duration assets.
    reason: Brian's essential spending, debt service and near-term obligations are primarily KRW liabilities.
  global_equity_core:
    default: Allow ordinary unhedged global-currency exposure as part of long-horizon diversification and invest on a schedule.
    reason: Waiting for a perfect USD/KRW entry can become market timing and leave the global core permanently underfunded.
  safe_bond_bucket:
    default: Prefer KRW or KRW-hedged high-quality short-duration exposure.
    reason: The bucket's job is stability and opportunity capital, not currency return.
  thematic_equity:
    default: Select on business evidence, valuation and portfolio correlation; do not make tactical FX direction the primary thesis.
  recording_rule: Record hedged and unhedged wrappers as distinct roles, including hedge cost, benchmark and intended holding horizon.

macro_decision_gates:
  - gate_id: macro_01_household_liability_match
    question: Are emergency money and spending within three years matched to KRW obligations?
    if_no: Correct the liquidity role before adding risk assets.
  - gate_id: macro_02_country_exposure_map
    question: Are revenue, cost, funding, listing currency and geopolitical exposure separated rather than inferred from listing country?
    if_no: Research only; country labels are not sufficient evidence.
  - gate_id: macro_03_rate_and_financing_survival
    question: Can the business or project survive current rates, refinancing needs and a delay in AI demand?
    if_no: Reject or reduce the proposed risk budget.
  - gate_id: macro_04_fx_role
    question: Is the FX exposure consistent with the asset's documented job and time horizon?
    if_no: Change the wrapper or hedge design before deciding on size.
  - gate_id: macro_05_labor_and_demand
    question: Do employment, wage, consumption and order data support the revenue assumption?
    if_no: Lower the base case and require stronger company evidence.
  - gate_id: macro_06_brian_correlation
    question: Does the position increase correlation with Brian's employer, bonus, KRW economy or existing AI wrappers?
    if_yes: Count it inside the explicit AI and employer-linked limits; do not call it diversification.

scenario_map:
  - scenario_id: sticky_inflation_and_higher_for_longer
    evidence_to_watch: Fed, BOK and ECB decisions; energy inflation; US long yields; KRW import prices.
    vulnerable_exposures: Leveraged neoclouds, speculative generation, long-duration growth and unfunded data-center pipelines.
    resilient_evidence_required: Positive free cash flow, fixed-rate funding, contractual pass-through and near-term energized capacity.
  - scenario_id: global_ai_capex_reversal
    evidence_to_watch: Hyperscaler returns, accelerator and HBM orders, foundry utilization, power reservations and optical lead times.
    vulnerable_exposures: Brian's employer income, direct SK hynix, overlapping semiconductor funds, power, optical and data-center options.
    response_rule: Use the existing deterministic stress ledger and liquidity floor; do not improvise leverage or average down automatically.
  - scenario_id: china_domestic_demand_and_property_drag
    evidence_to_watch: Retail sales, private investment, property investment, PMI employment, credit growth and memory pricing.
    vulnerable_exposures: Broad China demand, commodity cyclicals and suppliers relying on a rapid household-demand recovery.
    resilient_evidence_required: Export demand, market share, pricing, receivable quality and balance-sheet strength.
  - scenario_id: taiwan_geopolitical_or_supply_disruption
    evidence_to_watch: Official security developments, customer diversification, inventory, alternative capacity and logistics.
    vulnerable_exposures: Foundry, packaging, semiconductor equipment, servers and all dependent AI layers.
    response_rule: Treat it as a portfolio-wide tail risk; GDP growth and position count do not diversify it.
  - scenario_id: synchronized_soft_labor_and_demand
    evidence_to_watch: US payrolls and participation, Korea manufacturing employment, China PMI employment and euro-area unemployment.
    vulnerable_exposures: Consumer-sensitive end demand, cyclical industrial orders and earnings forecasts that assume broad spillover from AI.
    resilient_evidence_required: Contracted demand, recurring revenue, replacement demand and conservative working capital.

review_cadence:
  monthly:
    - Update policy-rate changes, material FX moves, inflation surprises and employment direction only when new official data are published.
    - Record whether any change affects liquidity, position size, financing survival or thesis evidence; do not create activity from unchanged data.
  quarterly:
    - Refresh all six tier-1 profiles and the AI-capex transmission map.
    - Reconcile country exposures with current ETF look-through weights and employer-linked household risk.
    - Review hedged and unhedged wrapper roles and costs.
  event_driven:
    - Central-bank regime change or emergency liquidity action
    - Material currency dislocation affecting Brian's liabilities or a portfolio company's solvency
    - Employment or bonus shock at Brian's employer
    - Trade controls, sanctions, tariffs or cross-strait escalation that changes a supply-chain thesis

