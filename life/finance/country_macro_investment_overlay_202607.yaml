  original_date: '2026-07-19'
  imported_at: '2026-07-19'
  raw_text: 각나라의 경제 상황도 고려해줘. 금리 환율 고용 등등 모든 상황
  interpretation: Brian asked to add country-level rates, currencies, employment and the wider macro regime to the investment strategy.
  confidence: high
  needs_user_review: false

coverage:
  tier_1_full_profiles:
    - korea
    - united_states
    - china
    - taiwan
    - japan
    - euro_area
  tier_1_reason: >
    These economies cover Brian's KRW household liabilities and employer risk, the largest AI
    buyers and capital markets, and the central semiconductor, memory and equipment nodes in the
    saved portfolio and supply-chain research.
  tier_2_trigger_watch:
    - economy: germany_and_netherlands
      reason: European industrial, semiconductor-equipment, electrical-equipment and grid exposure.
    - economy: united_kingdom
      reason: Data-center finance, power constraints and optical-network exposure.
    - economy: india
      reason: Large demand base and rapidly growing data-center and power buildout.
    - economy: singapore
      reason: Regional capital, cloud and data-center hub with power and land constraints.
  tier_2_escalation_rule: >
    Build a full profile when Brian owns or considers a material country position, when a thesis
    depends on that economy, or when its macro or policy shock can move a material supplier.
  boundary: >
    This is not a literal survey of every sovereign economy. It is the smallest decision-complete
    set for Brian's current portfolio and expands through the documented trigger rule.

comparability_boundary:
  - Growth figures retain their published basis; year-over-year, quarter-over-quarter and annualized rates are not compared as if identical.
  - Inflation is a twelve-month change unless another basis is stated.
  - Labor indicators use each authority's published concepts and are directional rather than perfectly cross-country comparable.
  - Policy rates have different operating frameworks and cannot be ranked as simple measures of tightness.
  - ECB-derived USD crosses are arithmetic reference values, not transaction prices or forecasts.
  - Taiwan's FX observation is a June monthly average and is not same-date comparable with the 2026-07-17 ECB reference rates.

cross_economy_regime:
  summary: >
    The AI investment cycle remains stronger than broad global demand, while energy and imported
    inflation have pushed the United States, Korea and euro area toward restrictive or renewed
    tightening. China combines strong supply and exports with weak domestic demand and property
    investment. Taiwan is in an exceptional AI-export boom with ample liquidity, while Japan is
    gradually normalizing policy from still-accommodative real rates. Brian therefore faces both
    an earnings opportunity and unusually correlated valuation, financing, FX and employment risk.
  common_positive_for_ai:
    - Strong AI server, advanced-memory, foundry, equipment, power and network investment remains visible in Korea, Taiwan, Japan and the United States.
    - High-tech manufacturing and exports remain materially stronger than domestic demand in several Asian economies.
  common_risks:
    - Higher policy rates, long yields and energy costs can reduce the present value and financeability of long-duration infrastructure projects.
    - AI strength can conceal weak household consumption, property or non-AI industrial demand.
    - Brian's salary, expected bonus, direct employer stock, Korean equity and several global wrappers can still respond to one memory and AI-capex cycle.
    - Currency moves can dominate short-period KRW returns without changing the underlying business thesis.

