title: Country macroeconomic overlay for Brian's AI-cycle investment policy
purpose: >
  Normalize current growth, inflation, labor, policy-rate, foreign-exchange, credit and
  financial-stability evidence for the economies that most directly drive Brian's income,
  liabilities and AI-infrastructure portfolio. Translate the evidence into review gates rather
  than short-term market forecasts or automatic trades.
privacy: This artifact contains public macro evidence and local policy links; Brian's private household records remain local.
decision_boundary: >
  This is a research overlay, not a timing model or trade instruction. Macro data are revised,
  exchange rates move continuously, and a country's economy is not identical to the return of
  its stock market. Company economics, valuation, taxes, account rules and Brian's household
  risk still govern every decision.

