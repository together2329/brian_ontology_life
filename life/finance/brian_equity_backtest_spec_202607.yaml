profile_ref: person_brian
title: Brian equity-policy backtest specification
goal: >
  Test whether keeping the existing AI-heavy portfolio without selling while routing new monthly
  surplus and a one-time bonus to a global core, KRW safe assets and gold would have improved
  drawdown, recovery time and concentration without destroying long-run compounding.
decision_boundary: >
  This is a counterfactual policy test, not a reconstruction of Brian's realized return and not a
  trade instruction. The saved records do not contain transaction dates, and several owned ETFs
  did not exist through the full test period. Current holding amounts seed every test window and
  explicit long-history proxies supply returns.
privacy: >
  Public ticker and macro series are fetched externally. Brian's quantities, account data and
  household cashflow remain local and are joined only after public data are saved.

source_records:
  - id: source_finance_equity_backtest_goal_20260720
