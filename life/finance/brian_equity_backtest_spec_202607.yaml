test_design:
  base_currency: KRW
  source_portfolio_as_of: '2026-07-15'
  source_portfolio_initial_value_krw: 123448709
  price_frequency: monthly_adjusted_close
  start_months:
    - '2016-01'
    - '2020-01'
    - '2023-01'
  end_month: '2026-06'
  contribution_timing: End of month after the month's market return.
  bonus_timing: One time at the end of month 12 in each counterfactual window.
  contribution_purchase_cost_bps: 10
  sale_cost_bps: 10
  tax_basis: excluded_first_milestone_because_no_strategy_sells
  distribution_tax_boundary: Proxy adjusted-close distributions are reinvested before Brian-specific withholding and account tax.
  inflation_adjustment: excluded_first_milestone
  rebalance_policy: Existing holdings are never sold or rebalanced in the first milestone.
  default_cashflow_case:
    monthly_contribution_krw: 1000000
    one_time_bonus_krw: 20000000
  sensitivity_grid:
    monthly_contribution_krw: [500000, 1000000, 2000000]
    one_time_bonus_krw: [0, 20000000, 100000000]

strategy_definitions:
  - strategy_id: current_style_continue
    label_ko: 현재 집중형 계속 적립
    existing_holdings: Never sell.
    new_money_rule: Allocate every contribution and bonus pro rata to the 2026-07-15 product weights.
    interpretation: Counterfactual baseline for continuing to reinforce the current portfolio style.
  - strategy_id: no_sale_dilution_80_15_5
    label_ko: 무매도 글로벌 코어 희석
    existing_holdings: Never sell.
    new_money_rule:
      global_equity_core_percent: 80
      krw_safe_short_duration_percent: 15
      gold_percent: 5
      explicit_ai_percent: 0
    interpretation: First-milestone implementation of the current policy while concentration remains above its transition band.
  - strategy_id: no_sale_global_core_only
    label_ko: 무매도 글로벌 코어 100%
    existing_holdings: Never sell.
    new_money_rule:
      global_equity_core_percent: 100
      explicit_ai_percent: 0
    interpretation: Isolate the effect of pure global-core dilution from the safe-asset and gold sleeves.

market_series:
  yahoo_chart_endpoint_template: https://query1.finance.yahoo.com/v8/finance/chart/{symbol}
  yahoo_query:
    interval: 1mo
    events: div,splits
    price_lookback_start: '2015-12-01'
    required_return_start: '2016-01'
    period_end_exclusive: '2026-07-01'
  usdkrw_primary:
    provider: Federal Reserve Bank of St. Louis FRED
    series_id: DEXKOUS
    label: South Korean Won to U.S. Dollar Spot Exchange Rate
    url: https://fred.stlouisfed.org/graph/fredgraph.csv?id=DEXKOUS&cosd=2015-11-01&coed=2026-06-30
    monthly_aggregation: last_non_missing_daily_observation
    unit: KRW_per_USD
  usdkrw_validation_symbol: KRW=X
  krw_cash_rate:
    provider: Federal Reserve Bank of St. Louis FRED
    series_id: IR3TIB01KRM156N
    label: 3-Month or 90-day Rates and Yields - Interbank Rates for the Republic of Korea
    url: https://fred.stlouisfed.org/graph/fredgraph.csv?id=IR3TIB01KRM156N&cosd=2016-01-01&coed=2026-06-30
    conversion_to_monthly_return: (1 + annual_percent / 100) ** (1 / 12) - 1
  symbols:
    - {symbol: 000660.KS, label: SK hynix, currency: KRW, role: direct_employer_stock_proxy}
    - {symbol: 005930.KS, label: Samsung Electronics, currency: KRW, role: Korean_memory_peer_proxy}
    - {symbol: 069500.KS, label: KODEX 200, currency: KRW, role: broad_Korea_equity_proxy}
    - {symbol: VT, label: Vanguard Total World Stock ETF, currency: USD, role: global_equity_core_proxy}
    - {symbol: SOXX, label: iShares Semiconductor ETF, currency: USD, role: semiconductor_and_memory_proxy}
    - {symbol: QQQ, label: Invesco QQQ Trust, currency: USD, role: AI_value_chain_and_platform_proxy}
    - {symbol: GRID, label: First Trust NASDAQ Clean Edge Smart Grid Infrastructure Index Fund, currency: USD, role: power_grid_proxy}
    - {symbol: CIEN, label: Ciena, currency: USD, role: optical_current_top_three_component}
    - {symbol: COHR, label: Coherent, currency: USD, role: optical_current_top_three_component}
    - {symbol: LITE, label: Lumentum, currency: USD, role: optical_current_top_three_component}
    - {symbol: URA, label: Global X Uranium ETF, currency: USD, role: nuclear_proxy}
    - {symbol: IAU, label: iShares Gold Trust, currency: USD, role: gold_proxy}
    - {symbol: KRW=X, label: US dollar to Korean won, currency: KRW_per_USD, role: FX_validation_only}

proxy_definitions:
  direct_sk_hynix:
    components: [{series: 000660.KS, weight: 1.0, currency_mode: native_krw}]
  korea_memory_equity_bond_mix:
    components:
      - {series: 000660.KS, weight: 0.25, currency_mode: native_krw}
      - {series: 005930.KS, weight: 0.25, currency_mode: native_krw}
      - {series: KRW_CASH, weight: 0.50, currency_mode: native_krw}
    rebalance: monthly_constant_weight_proxy
    boundary: The exact historical equity and bond sleeve weights were not captured; 25/25/50 is a name-based approximation.
  broad_korea_equity:
    components: [{series: 069500.KS, weight: 1.0, currency_mode: native_krw}]
  memory_hbm_unhedged:
    components: [{series: SOXX, weight: 1.0, currency_mode: unhedged_usd_to_krw}]
    boundary: SOXX is a broad semiconductor proxy and does not isolate HBM or reproduce a Korean ETF's holdings.
  semiconductor_unhedged:
    components: [{series: SOXX, weight: 1.0, currency_mode: unhedged_usd_to_krw}]
  semiconductor_hedged:
    components: [{series: SOXX, weight: 1.0, currency_mode: hedged_usd_local_return}]
    boundary: Local USD total return approximates a KRW-hedged wrapper; hedge cost and basis are excluded.
  ai_value_chain_unhedged:
    components: [{series: QQQ, weight: 1.0, currency_mode: unhedged_usd_to_krw}]
    boundary: QQQ is a long-history platform and growth proxy, not an exact reconstruction of the active Korean funds.
  power_grid_unhedged:
    components: [{series: GRID, weight: 1.0, currency_mode: unhedged_usd_to_krw}]
  optical_current_top_three_backcast:
    components:
      - {series: CIEN, weight: 0.350410179139461, currency_mode: unhedged_usd_to_krw}
      - {series: COHR, weight: 0.330654612422568, currency_mode: unhedged_usd_to_krw}
      - {series: LITE, weight: 0.318935208437971, currency_mode: unhedged_usd_to_krw}
    rebalance: monthly_constant_weight_proxy
    boundary: >
      Backcasts the 2026-05-31 top three constituents, normalized from 20.93, 19.75 and 19.05 percent.
      This intentionally matches the current economic exposure but contains survivor and constituent-selection bias.
  nuclear_unhedged:
    components: [{series: URA, weight: 1.0, currency_mode: unhedged_usd_to_krw}]
  gold_unhedged:
    components: [{series: IAU, weight: 1.0, currency_mode: unhedged_usd_to_krw}]
  global_core_unhedged:
    components: [{series: VT, weight: 1.0, currency_mode: unhedged_usd_to_krw}]
  krw_safe_short_duration:
    components: [{series: KRW_CASH, weight: 1.0, currency_mode: native_krw}]

