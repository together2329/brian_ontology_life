quality_gates:
  - Every required market series covers each configured start month through the end month without a missing monthly observation.
  - Product IDs and initial values reconcile exactly to the saved 2026-07-15 securities and gold total.
  - Proxy component weights sum to one within numerical tolerance.
  - All strategies begin with identical holdings and differ only in documented new-money rules.
  - No strategy sells or rebalances existing holdings in milestone one.
  - USD assets are reported in KRW with same-month USD/KRW conversion except the explicitly hedged semiconductor proxy.
  - Cashflows occur after monthly returns and are not given the same month's return.
  - Backtest outputs retain source hashes and the specification hash.

known_biases_and_limits:
  - Current holdings and current optical constituents are backcast, creating selection and survivor bias.
  - Proxy ETF histories do not reconstruct the exact Korean ETF NAV, expenses, tracking error, holdings or hedge execution.
  - The exercise does not reconstruct Brian's actual purchase dates, realized tax, dividends received or account cashflows.
  - The first milestone excludes spouse assets, salary loss and bonus reduction from the return path; those remain separate stress overlays.
  - Yahoo chart adjusted-close data are a convenient public research source, not the official exchange record, and require sample cross-checks before stronger conclusions.
  - Yahoo's monthly KRW=X series contained three approximately 10,000-fold unit anomalies, so it is retained only as validation evidence; FRED DEXKOUS daily observations aggregated to month-end are the conversion source.
  - A successful historical policy does not establish future expected return.

next_milestones_after_first_result:
  - Replace proxy returns with exact Korean ETF NAV or total-return histories where trustworthy same-date data exist.
  - Add SK hynix position-cap strategies at 40, 30, 20 and 10 percent with tax and trading-rule boundaries.
  - Add point-in-time macro gates using publication-date or vintage data rather than revised hindsight values.
  - Add household income and bonus shocks to the securities return path.
  - Add walk-forward and parameter-stability tests before using any tactical signal.
