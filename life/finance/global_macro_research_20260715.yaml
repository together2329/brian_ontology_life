executive_conclusion:
  regime: lower_growth_stickier_inflation_with_ai_capex_divergence
  summary: >
    세계경제는 깨끗한 연착륙보다 낮은 성장, 에너지·관세발 물가 압력, 높은 금리,
    지정학적 분절이 함께 나타나는 방향으로 이동 중이다. 동시에 AI 인프라 투자는
    전자부품·메모리·전력 수요를 밀어 올려 전통 경기와 다른 강한 축을 만들고 있다.
  key_uncertainty: 중동 충돌과 에너지 공급 차질의 지속 기간

macro_signals:
  - id: global_growth_slowdown_2026
    signal: 세계 성장 둔화
    evidence:
      - IMF는 제한적 분쟁을 가정해 2026년 3.1%, 2027년 3.2% 성장을 전망했다.
      - 세계은행은 더 강한 에너지 충격을 반영해 2026년 2.5%, 2027년 2.8%를 전망했다.
    interpretation: 전망치 수준보다 성장률 하향과 하방 위험 우세라는 공통 방향이 중요하다.

  - id: inflation_and_rates_higher_for_longer_2026
    signal: 물가 재상승과 금리 인하 지연 또는 재인상
    evidence:
      - 미 연준의 2026년 PCE 물가 중간값은 3.6%, 연말 정책금리는 3.8%다.
      - ECB는 에너지 충격을 이유로 2026-06-11 정책금리를 0.25%포인트 인상했다.
      - ECB의 2026년 물가 전망은 3.0%다.
    interpretation: 장기채와 고평가 성장주의 할인율 부담이 쉽게 사라지지 않는 환경이다.

  - id: trade_fragmentation_and_ai_divergence_2026
    signal: 상품무역 둔화 속 AI 관련 교역만 상대적 강세
    evidence:
      - WTO는 상품무역 증가율이 2025년 4.6%에서 2026년 1.9%로 둔화할 것으로 본다.
      - 지속적인 고유가는 이를 약 1.4%까지 낮출 수 있다.
      - 2026년 6월 전자부품 지수는 105.5로 추세를 웃돌았고 AI 투자가 교역을 지지했다.
    interpretation: 세계화가 끝난다기보다 관세·안보 블록 중심으로 재편되고 AI 공급망에 성장이 집중된다.

  - id: china_slowing_but_export_industry_strong_2026
    signal: 중국 내수 둔화와 첨단 제조·수출 중심 성장의 병존
    evidence:
      - 중국 국가통계국 기준 성장률은 2026년 1분기 5.0%에서 2분기 4.3%로 둔화했다.
    interpretation: 중국 내수 회복보다 제조 경쟁과 수출 압력, 무역 갈등을 함께 관찰해야 한다.

  - id: energy_geopolitics_return_2026
    signal: 에너지가 다시 성장·물가·금리의 공통 변수로 부상
    evidence:
      - 세계은행은 2026년 Brent 평균을 배럴당 94달러로 가정했다.
      - 심한 공급 차질과 금융 스트레스가 겹치면 세계 성장률이 1.3%까지 낮아질 수 있다고 봤다.
    interpretation: 유가 상승은 한국처럼 에너지 수입 의존도가 높은 제조·수출국에 이중 부담이다.

brian_implications:
  current_exposure: >
    Brian은 SK하이닉스 근로소득·성과급·직접주식과 가구 내 반도체 및 한국주식 보유가 겹쳐
    인적자본과 금융자본이 동일한 AI 메모리 사이클에 집중되어 있다.
  positive_case:
    - AI 설비투자 지속은 HBM·DRAM·전자부품 수요를 지지한다.
    - WTO 자료상 AI 관련 전자부품은 전통 상품 교역보다 강하다.
  main_risks:
    - 에너지발 금리 상승으로 주가 멀티플이 낮아질 위험
    - AI 투자 둔화 또는 메모리 증설 후 공급과잉 위험
    - 수출 통제·관세·중국 성장 둔화 위험
    - 회사 실적 악화가 급여·성과급·주가에 동시에 반영되는 집중 위험
  operating_rule: >
    메모리 투자 논리는 유지하되 성과급과 신규 현금은 동일 테마 추가매수보다 비상자금,
    단기 안전자산, 글로벌 분산자산으로 가구 전체 노출을 균형화하는 후보로 우선 검토한다.

