scenarios:
  - id: base_case_2026
    description: 저성장·끈적한 물가 속 AI 투자는 지속
    implication: 메모리 실적은 강할 수 있으나 주가는 높은 변동성을 보일 수 있다.
  - id: upside_case_2026
    description: 분쟁 완화, 유가 하락, 금리 부담 완화와 AI 투자 지속
    implication: 반도체와 위험자산에 가장 우호적이다.
  - id: downside_case_2026
    description: 에너지 충격 장기화와 금리 상승, AI 투자 또는 메모리 가격 둔화
    implication: 이익 전망과 밸류에이션이 동시에 낮아질 수 있다.

