concentrated_position_glide_path:
  current_direct_sk_hynix_percent: 55.36
  current_action: Freeze additions and keep the business thesis under quarterly review.
  first_transition_checkpoint_percent: 45
  second_transition_checkpoint_percent: 40
  destination_ceiling_percent: 10
  decision_gate: >
    Once the emergency reserve, tax basis, employer trading rules and full household exposure
    are known, compare the time required to dilute below 40 percent with realistic savings and
    bonus inflows. If the path is unreasonably long, prepare a four-quarter tax-aware reduction
    schedule for the amount above the agreed transition ceiling.
  do_not_sell_only_because:
    - The share price rose.
    - A short-term headline or normal semiconductor volatility appeared.
    - The portfolio would look cosmetically cleaner afterward.
  review_or_reduce_if:
    - HBM qualification, yield, technology lead or customer position deteriorates materially.
    - DRAM supply discipline breaks and inventory, capacity or contract pricing signals a damaging downcycle.
    - Capital spending rises without acceptable free-cash-flow conversion or return on capital.
    - Management candor, accounting quality or capital allocation deteriorates.
    - The position exceeds the agreed band after a price surge.
    - Household income, bonus and spouse exposure make the same downside larger than previously measured.
  compliance_rule: Use public information only and follow all employer trading windows and restrictions.

new_investment_scorecard:
  total_points: 100
  categories:
    - category: circle_of_competence_and_evidence_quality
      points: 10
      question: Can Brian explain the business, value chain and key evidence without relying on an ETF label or confidential information?
    - category: structural_growth_and_value_pool
      points: 10
      question: Is demand durable, and which layer retains the economics after competition and customer bargaining?
    - category: moat_or_bottleneck
      points: 12
      question: Are technology, qualification, switching costs, scale, regulation or supply constraints durable?
    - category: returns_on_capital_and_owner_earnings
      points: 12
      question: Does growth convert to free cash after required maintenance and expansion capital?
    - category: management_incentives_and_candor
      points: 10
      question: Are incentives aligned and disclosures balanced about risks, dilution and capital allocation?
    - category: balance_sheet_and_downside_survival
      points: 10
      question: Can the company and Brian survive a demand delay, refinancing shock or fifty-percent drawdown?
    - category: valuation_and_embedded_expectations
      points: 15
      question: What growth, margins and capital intensity are already required by the price in bear, base and bull cases?
    - category: forward_catalyst_and_confirmation
      points: 8
      question: What should become visible in the next six, twelve and twenty-four months if the thesis is right?
    - category: reflexivity_crowding_and_financing
      points: 5
      question: Are rising prices enabling capex and supply that can later destroy the original scarcity?
    - category: portfolio_correlation_and_opportunity_cost
      points: 8
      question: Does this improve the household portfolio more than cash, a broad core or an existing holding?
  thresholds:
    below_70: Reject or continue research; no position.
    from_70_to_79: Watchlist only while any portfolio or liquidity gate is breached; otherwise maximum 0.5 percent research position.
    from_80_to_89: Initial position up to 1 percent and evidence-confirmed ceiling of 3 percent, subject to all bucket caps.
    from_90_to_100: Initial position of 1 to 2 percent and exceptional ceiling of 5 percent, subject to all household caps.
  hard_vetoes:
    - Emergency-reserve gate not met
    - Borrowed money or money needed within three years
    - Material non-public or employer-confidential information is needed for the thesis
    - No written falsifier or downside case
    - Household, single-name or theme cap would be breached
    - Liquidity, financing or counterparty risk cannot be described
    - ETF holdings, fees or top-position concentration are unknown

thesis_card_required_fields:
  - One-sentence reason this business or fund should outperform what the market already expects
  - Business-owner case and owner-earnings bridge
  - Fisher-style public evidence from customers, competitors and suppliers
  - Bear, base and bull valuation with required assumptions
  - Six, twelve and twenty-four-month confirmation signals
  - Three specific falsifiers and the action attached to each
  - Initial size, maximum size and funding source
  - Look-through overlap with employer, spouse and existing funds
  - Expected holding mode: long-duration compounder, eighteen-month-to-three-year trend or small option
  - Tax and employer-compliance checks

buy_scale_hold_exit_rules:
  buy:
    - A passing scorecard and completed thesis card are necessary but not sufficient.
    - Initial position size must remain small enough that a fifty-percent decline does not change family plans or behavior.
    - Prefer limit-sized tranches tied to evidence rather than a single all-in purchase.
  scale:
    - Add only when operating evidence improves, expected value remains attractive and the price has not absorbed all upside.
    - Never average down solely to lower the average purchase price.
    - A price decline is useful only when the business thesis and balance sheet remain intact.
  hold:
    - Long-duration compounders are reviewed for economics, reinvestment and management, not daily price movement.
    - Trend positions are reviewed against their six, twelve and twenty-four-month evidence path.
  trim_or_exit:
    - Exit or reduce when a written falsifier occurs, management integrity fails or financing threatens survival.
    - Trim when a position exceeds its band or when valuation leaves little return under the base case.
    - Replace a holding only when the after-tax expected advantage of the alternative is material.
    - Price action is evidence to investigate, not an automatic command.

ai_reflexivity_dashboard:
  purpose: Separate genuine end-user economics from a self-reinforcing capital-spending narrative.
  monitor_quarterly:
    end_demand:
      - Paid inference use and application revenue
      - Customer retention and willingness to pay
      - Productivity or cost savings captured by end users
    hyperscaler_economics:
      - AI revenue relative to capital expenditure
      - Depreciation life assumptions and free-cash-flow conversion
      - Concentration of purchases among related AI companies
    semiconductor_and_memory:
      - HBM qualification, yield, mix and customer concentration
      - DRAM inventory, contract price, capacity and supplier discipline
      - Packaging, foundry and substrate bottlenecks
    power_and_data_centers:
      - Energized megawatts versus announced pipelines
      - Interconnection delays, transformer and switchgear lead times
      - Contracted utilization, financing cost and customer credit quality
    optical_and_network:
      - Port-speed transition, orders, lead times and gross-margin capture
      - New capacity and component commoditization
    market_feedback:
      - Equity issuance, debt financing and capex enabled by rising valuations
      - Multiple expansion unsupported by owner-earnings revisions
      - Reactions to good and bad news and changes in market leadership
  warning_pattern: >
    The technology can remain real while investment returns deteriorate if high prices fund
    excessive capacity, supply arrives after the shortage, pricing falls and leverage forces a
    rapid reversal.

research_to_action_priority:
  - priority: 1
    area: Household cashflow and balance-sheet completion
    action: Measure before buying anything new.
    reason: It determines survival boundaries and makes every later position-size decision more accurate.
  - priority: 2
    area: Broad global core implementation
    action: Compare low-cost total-market candidates, taxes, account eligibility and currency exposure.
    reason: This is the primary destination for new long-term money while AI exposure is excessive.
  - priority: 3
    area: Power, grid, cooling and electrical value pool
    action: Continue valuation and constituent-level comparison without buying yet.
    reason: The research shows real bottlenecks and Brian's explicit weight is smaller than chips, but the existing ETF top holdings are concentrated.
  - priority: 4
    area: Optical network
    action: Monitor economics and owned-fund concentration.
    reason: The bottleneck is real, but the owned ETF's top three were 59.73 percent in the saved review.
  - priority: 5
    area: Memory, HBM and semiconductors
    action: Maintain the thesis dashboard and stop incremental exposure.
    reason: This is Brian's strongest knowledge area and largest existing household risk.
  - priority: 6
    area: Data-center operators, neoclouds and speculative generation
    action: Treat as optionality only after financing, utilization, leverage and customer concentration pass the hard gates.
    reason: Announced gigawatts, GPUs or backlog do not by themselves establish owner earnings.

review_cadence:
  monthly:
    - Close spending and record savings rate.
    - Transfer the planned amount before discretionary spending.
    - Record contributions and verify that no thematic purchase bypassed the gates.
  quarterly:
    - Update all position weights and look-through ETF constituents.
    - Review SK hynix and the AI reflexivity dashboard.
    - Rescore only material thesis changes; do not manufacture activity.
    - Compare direct employer stock and explicit AI exposure with transition checkpoints.
  annually:
    - Recalculate household net worth, income correlation, emergency months and destination bands.
    - Rebalance using new cash first and sales second, after tax and account review.
    - Review whether Brian's domain edge remains real and whether the active satellite earned its complexity.
  event_driven:
    - Job change, bonus change or employer equity event
    - Debt, housing, family or health obligation change
    - Thesis falsifier, accounting or management-integrity event
    - Position or bucket exceeds its hard ceiling

