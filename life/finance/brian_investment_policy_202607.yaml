policy_hierarchy:
  - priority: 1
    objective: Prevent forced selling and protect essential life obligations.
  - priority: 2
    objective: Restore a positive, repeatable monthly savings flow.
  - priority: 3
    objective: Build a globally diversified low-cost compounding core.
  - priority: 4
    objective: Keep a bounded AI-infrastructure satellite where Brian has evidence and domain edge.
  - priority: 5
    objective: Pursue tactical or asymmetric ideas only after the first four priorities are funded.

liquidity_policy:
  operating_cash_target: One month of normal bills in the transaction account.
  emergency_reserve_minimum: Six months of essential household spending.
  emergency_reserve_target: Nine months of essential household spending.
  extension_to_twelve_months_if:
    - A single employer supplies most household income.
    - Bonus and equity compensation remain highly cyclical.
    - Debt, housing or family obligations make income interruption unusually costly.
  eligible_assets:
    - Insured bank deposits
    - Money-market or short-duration government instruments appropriate to the account and currency
  excluded_assets:
    - Stocks and thematic ETFs
    - Pension, severance estimates and home equity
    - Assets that can suffer a large mark-to-market loss when cash is needed
  rationale: Brian's human capital and current portfolio are correlated, so the reserve should exceed a generic three-month rule.

destination_allocation_after_emergency_reserve:
  status: provisional_until_household_balance_sheet_is_complete
  scope: Investable financial assets excluding the emergency reserve and near-term known spending.
  target_percentages:
    broad_global_equity_core:
      target: 55
      band: [50, 60]
      definition: Low-cost, broad, market-cap-weighted global equity exposure; no narrow country, sector or AI label.
    safe_short_duration_assets:
      target: 15
      band: [10, 20]
      definition: KRW or liability-matched high-quality short-duration assets for stability and opportunity capital.
    explicit_ai_infrastructure_satellite:
      target: 20
      band: [15, 25]
      definition: All direct employer stock plus AI, memory, semiconductor, power, optical, nuclear, operator and neocloud thematic positions.
    gold_and_real_asset_diversifier:
      target: 5
      band: [3, 7]
      definition: A diversifier rather than an AI return engine.
    other_non_ai_diversifiers:
      target: 5
      band: [0, 10]
      definition: Broad non-AI exposures selected only after fees, taxes and correlation are checked.
  notes:
    - Broad global funds will still contain AI leaders; the 20 percent satellite cap covers only explicit, intentional theme exposure.
    - These bands are a destination, not an instruction to force the current portfolio into shape in one trade.

explicit_ai_satellite_design:
  total_target_percent_of_investable_assets: 20
  sleeves:
    - sleeve: compute_memory_semiconductors
      target_percent: 8
      band: [6, 10]
      includes: Direct SK hynix, memory/HBM funds, semiconductor funds and accelerator value-chain exposure.
      current_view: Highest knowledge and strongest thesis, but no new cash while personal correlation is extreme.
    - sleeve: power_grid_cooling_electrical
      target_percent: 5
      band: [3, 6]
      includes: Transformers, switchgear, UPS, busway, cooling, grid equipment, EPC and related utilities.
      current_view: Best next research area for distinct earnings exposure; valuation and ETF constituent overlap remain gates.
    - sleeve: hyperscalers_platforms_and_applications
      target_percent: 3
      band: [2, 4]
      includes: Cloud buyers, AI platforms and application value capture.
      current_view: Require evidence that revenue and cash returns justify capex and that active wrappers do not duplicate the core.
    - sleeve: optical_and_network
      target_percent: 2
      band: [1, 3]
      includes: Optical components, transceivers, switching, fiber and connectivity.
      current_view: Real bottleneck, but the owned optical ETF is itself concentrated and belongs in a small satellite sleeve.
    - sleeve: operators_generation_and_optional_asymmetry
      target_percent: 2
      band: [0, 3]
      includes: Data-center operators, nuclear generation, neoclouds and pre-profit infrastructure options.
      current_view: Use only when leverage, contracts, utilization, customer concentration and dilution risks are explicit.
  sublimits:
    direct_employer_stock_long_run_target_percent: 5
    direct_employer_stock_long_run_ceiling_percent: 10
    narrow_thematic_etf_ceiling_percent: 5
    pre_revenue_or_high_financing_risk_single_name_initial_percent: 0.25
    pre_revenue_or_high_financing_risk_single_name_ceiling_percent: 1
    pre_revenue_or_high_financing_risk_total_ceiling_percent: 2
  overriding_rule: No sleeve may be funded merely because another AI sleeve has a lower current weight; expected return after valuation and household correlation still governs.

transition_plan:
  principle: Use cashflow and new contributions first, then consider gradual tax-aware sales if inflows cannot reach the agreed concentration path.
  phase_0_through_2026_07_31:
    actions:
      - Change the GPT/Codex and mobile plans as already committed and record actual monthly savings.
      - Close July spending and calculate verified essential monthly spending.
      - Make no new discretionary AI-theme purchase.
      - Route one hundred percent of newly freed recurring cash to the reserve account.
  phase_1_reserve_below_three_months:
    new_surplus_rule:
      liquidity_reserve_percent: 100
      new_thematic_investment_percent: 0
    exception: Continue only mandatory or already automated retirement contributions that would be costly to interrupt.
  phase_2_reserve_between_three_and_nine_months:
    new_surplus_rule:
      liquidity_reserve_percent: 70
      broad_global_core_percent: 30
      new_explicit_ai_percent: 0
  phase_3_reserve_at_or_above_nine_months_and_ai_above_target:
    new_long_term_money_rule:
      broad_global_core_percent: 80
      safe_short_duration_percent: 15
      gold_or_other_non_ai_diversifier_percent: 5
      new_explicit_ai_percent: 0
    continue_until: Explicit AI exposure is inside its transition band and employer-stock risk has an agreed glide path.
  phase_4_portfolio_inside_destination_bands:
    rule: Allocate new money to the most underweight destination bucket; do not mechanically buy every bucket each month.
  bonus_waterfall:
    - Pay known tax and near-term obligations.
    - Fill the nine-month emergency-reserve target.
    - Allocate the remainder using the phase 3 rule while AI concentration is above target.
    - Add to AI only after all hard gates pass and the explicit AI bucket is below its upper band.

