evidence_boundary:
  portfolio_snapshot_as_of: '2026-07-15'
  known_securities_and_gold_only: true
  missing_or_incomplete:
    - Liquid cash and deposits available for emergencies
    - Monthly essential spending and verified take-home income
    - Debt balances, rates and repayment dates
    - Pension, severance, insurance and housing assets
    - Tax lots and account-specific tax treatment
    - Current full constituents of every owned ETF
    - Complete spouse holdings and household income correlation
    - Brian's maximum tolerable drawdown in KRW and percent
  implication: >
    Destination percentages are provisional bands. They become a confirmed household policy
    only after the missing balance-sheet and cashflow fields are captured.

executive_decision:
  one_sentence: >
    Keep the long-run AI thesis, stop increasing the already dominant exposure, rebuild monthly
    surplus and a nine-month liquidity reserve, route new money toward a low-cost global core,
    and manage concentrated positions with written evidence, valuation, size and invalidation rules.
  why_this_fits_brian:
    - Brian has unusually strong domain knowledge in memory and AI infrastructure, so the thesis deserves a bounded satellite rather than a blanket ban.
    - Employment income, expected bonus, direct SK hynix ownership and semiconductor funds can all weaken in the same cycle.
    - Monthly salary cashflow is currently near zero, so optionality is more scarce than another AI ticker.
    - No current deficit pressure or forced-sale need has been reported, allowing an orderly transition rather than an emotional liquidation.
    - The existing research is deep enough to improve selection, but research depth does not by itself reduce portfolio correlation.
  current_default_actions:
    - Do not add new salary cash to SK hynix, memory, semiconductor, AI value-chain, optical, power, nuclear or neocloud positions yet.
    - Continue existing holdings only under the thesis and risk-review rules below; no automatic sell follows from concentration alone.
    - Direct all recurring-cost savings created in July to the liquidity reserve until the first reserve gate is met.
    - Complete household look-through exposure and tax-lot capture before setting a dated sale schedule.

investor_synthesis:
  - investor: Warren Buffett
    useful_principle: Own understandable businesses with durable economics and trustworthy managers; avoid leverage and permanent loss; let compounding work.
    brian_rule: Treat every holding as a business and require owner-earnings, reinvestment and balance-sheet evidence rather than buying an AI label.
    failure_if_used_alone: Long holding periods can become an excuse to ignore technological or thesis deterioration.
  - investor: Charlie Munger
    useful_principle: Invert, respect incentives and opportunity cost, use multiple mental models and avoid major errors.
    brian_rule: Ask how the thesis can fail, what management and customers are incentivized to do, and what a new purchase displaces in the portfolio.
    failure_if_used_alone: Concentration in a great business is unsafe when the investor's job, bonus and household assets share the same risk.
  - investor: Philip Fisher
    useful_principle: Investigate customers, competitors, suppliers, employees, R&D, margins, management depth and growth runway before holding for years.
    brian_rule: Use public filings, calls, supplier and customer disclosures to triangulate the AI value pool; never use employer-confidential information.
    failure_if_used_alone: A superb company can still be a poor investment when expectations and price are extreme.
  - investor: Stanley Druckenmiller
    useful_principle: Look eighteen months to three years ahead, start with a survivable position, add when evidence confirms, and reverse when the thesis changes.
    brian_rule: Separate research positions from full positions and scale only after forward evidence improves.
    failure_if_used_alone: Fast-changing concentrated trading is unsuitable for emergency money or for a portfolio already dominated by one correlated theme.
  - investor: George Soros
    useful_principle: Investors are fallible, and beliefs, prices, financing, capacity and fundamentals can reinforce one another before reversing.
    brian_rule: Track the AI feedback loop from demand to orders, capex, financing, new supply, pricing and customer returns; write disconfirming evidence in advance.
    failure_if_used_alone: Reflexivity can encourage overtrading if every price move is mistaken for a regime change.
  - investor: Howard Marks
    useful_principle: A real transformative technology can still be a bad investment if too much success is already priced or if capital floods the sector.
    brian_rule: Compare expectations embedded in price with bear, base and bull cashflow cases; keep the AI position moderate and selective.
    failure_if_used_alone: Excessive defensiveness can leave the portfolio outside a genuine long-duration change.
  - investor: John Bogle
    useful_principle: Broad diversification, low cost and discipline provide the default core for investors who do not have a repeatable edge everywhere.
    brian_rule: Put most new long-term money into a broad global market core rather than adding more overlapping thematic wrappers.
    failure_if_used_alone: A pure market portfolio does not make use of Brian's real industry knowledge, so a bounded active satellite remains appropriate.

