title: Brian investment policy synthesis for the AI infrastructure cycle
purpose: >
  Convert Brian's saved cashflow, portfolio, AI data-center, semiconductor, optical-network
  and power-infrastructure research into a repeatable investment policy. The policy combines
  the business-owner discipline of Warren Buffett, the error avoidance and opportunity-cost
  discipline of Charlie Munger, Philip Fisher's qualitative investigation, Stanley
  Druckenmiller's forward-looking sizing and flexibility, George Soros's fallibility and
  reflexivity, Howard Marks's price and cycle discipline, and John Bogle's low-cost diversified
  core.
privacy: Personal holdings, cashflow and household-risk observations remain local in this repository.
decision_boundary: >
  This is a personalized research framework and proposed policy, not authorization to trade.
  Tax basis, account type, emergency cash, debt, pension assets, spouse holdings, employer
  restrictions and material non-public information boundaries must be checked before an
  external buy, sale or rebalance.

