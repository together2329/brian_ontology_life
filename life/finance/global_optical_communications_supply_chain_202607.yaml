id: global_optical_communications_supply_chain_202607
object_type: FinancialResearchArtifact
title: Global optical communications companies and supply chain
version: 1
status: active_research
as_of: 2026-07-19
timezone: Asia/Seoul
language: mixed_English_schema_with_Korean_interpretation

research_scope:
  primary_question: >-
    Map the globally significant companies that manufacture or enable optical
    communications, from glass, compound-semiconductor substrates and fiber to
    lasers, DSPs, modules, switches, transport systems, test equipment and
    submarine networks, with special attention to AI data centers.
  roster_boundary: >-
    "모두"는 상장된 주요 기업, AI 데이터센터의 확인된 공급망 참여자,
    핵심 비상장 기술기업, 중국·일본·한국의 전략적 공급자를 포함한다는 뜻이다.
    모든 지역의 소규모 설치업체·통신사·유통사까지 문자 그대로 전수 집계한
    명부는 아니다. 누락 가능성이 큰 한국 중소형주는 별도 watchlist로 남겼다.
  evidence_policy:
    - Prefer filings, investor relations, official product pages and named ecosystem announcements.
    - Keep product-category exposure separate from a named customer allocation.
    - Keep design, sample, qualification, purchase commitment, capacity right, shipment and recognized revenue separate.
    - Keep group, segment and optical-product revenue boundaries separate; do not add currencies.
    - Treat announced factory capacity as a plan until ramp or production is explicitly evidenced.
    - Consolidate acquired companies under their current parent and retain the former name only as lineage.
  investment_boundary: >-
    This is an evidence ledger for portfolio review, not a buy, sell or target-price instruction.

comparison_contracts:
  financial: >-
    Preserve currency, period and GAAP, IFRS, K-IFRS or derived status. Group
    revenue is not optical revenue unless the company reports that segment boundary.
  capacity: >-
    Wafer diameter, wafer starts, floor area, cable-kilometres, module units,
    revenue capacity and employee count are different denominators and are never summed.
  commercial: >-
    Partnership, investment, multiyear purchase commitment, capacity access right,
    framework order, shipment and recognized revenue remain different lifecycle states.
  architecture: >-
    Pluggable optics, linear pluggable optics, near-package optics, co-packaged optics,
    optical I/O and coherent transport can coexist; a roadmap is not market-wide replacement.
  duplication: >-
    Acacia is inside Cisco, Infinera inside Nokia, Juniper inside HPE, Celestial AI
    inside Marvell, CommScope CCS inside Amphenol and II-VI/Finisar inside Coherent.
  customer_allocation: >-
    A supplier's technical ability to serve hyperscalers, telecom operators or NVIDIA
    platforms is not converted to customer revenue without primary named evidence.

executive_findings:
  - >-
    AI optical demand is not one market. Scale-up links inside a rack or pod, scale-out
    Ethernet/InfiniBand, campus DCI, metro or long-haul transport and subsea systems use
    different reach, power, modulation, packaging and qualification requirements.
  - >-
    The most constrained layers are high-power reliable InP lasers, advanced photonic
    packaging and module yield, 200G-per-lane DSP/SerDes, high-density fiber and connector
    assemblies, and automated test. Revenue can migrate between pluggable modules and CPO,
    but these physical capabilities remain necessary.
  - >-
    NVIDIA's named 2025 silicon-photonics ecosystem linked TSMC, Browave, Coherent,
    Corning, Fabrinet, Foxconn, Lumentum, SENKO, SPIL, Sumitomo Electric and TFC; it also
    named Coherent, Eoptolink, Fabrinet and InnoLight for pluggable transceivers. This is
    ecosystem evidence, not a bill of materials or revenue allocation.
  - >-
    NVIDIA's 2026 nonexclusive agreements with both Coherent and Lumentum each included
    a $2 billion investment plus multibillion-dollar purchase commitments and capacity
    rights. That validates laser scarcity while also showing deliberate dual sourcing.
  - >-
    Corning's 2026 NVIDIA plan calls for 10x U.S. optical-connectivity capacity, more
    than 50% more U.S. fiber capacity and three plants. Separate Meta and Amazon agreements
    show that high-density fiber and connectivity are hyperscaler-scale constraints too.
  - >-
    Chinese module makers InnoLight and Eoptolink already operate at revenue scale and
    are central to pluggable optics, while U.S. and allied-country policy is encouraging
    domestic laser, fiber and silicon-photonics capacity. Export controls and customer
    geography therefore matter as much as headline AI demand.
  - >-
    Brian's KODEX 미국AI광통신네트워크 ETF is concentrated rather than whole-chain:
    its 2026-05-31 sheet had 59.73% in Ciena, Coherent and Lumentum, and 73.98% in the
    top five. It gives useful optical exposure but little direct ownership of Chinese
    module leaders, private optical-I/O firms, Japanese fiber specialists or test vendors.

architecture_routes:
  - id: route_scale_up_optical_io
    use_case: GPU_or_XPU_to_GPU_or_XPU_within_rack_or_pod
    typical_reach: centimetres_to_tens_of_metres
    competing_forms: [electrical_copper, active_electrical_cable, NPO, CPO, optical_IO_chiplet]
    critical_layers: [SerDes, photonic_engine, external_laser, advanced_packaging, fiber_connector]
  - id: route_scale_out_datacenter
    use_case: switch_to_switch_and_server_to_switch_AI_fabric
    typical_reach: metres_to_two_kilometres
    competing_forms: [AEC, 400G_pluggable, 800G_pluggable, 1.6T_pluggable, LPO, CPO]
    critical_layers: [switch_ASIC, DSP, laser, module_assembly, MPO_or_VSFF_connectivity, test]
  - id: route_DCI_metro_longhaul
    use_case: campus_to_campus_metro_and_backbone
    typical_reach: kilometres_to_thousands_of_kilometres
    competing_forms: [coherent_pluggable, transponder, packet_optical_transport]
    critical_layers: [coherent_DSP, tunable_laser, modulator, amplifier, ROADM, line_system]
  - id: route_access_and_telecom
    use_case: PON_mobile_fronthaul_backhaul_enterprise_and_carrier
    typical_reach: access_to_metro
    competing_forms: [PON, coherent_access, Ethernet_optics, microwave_or_copper_at_edges]
    critical_layers: [fiber_cable, splitters, transceivers, OLT_ONU, transport_system]
  - id: route_subsea
    use_case: intercontinental_backbone
    typical_reach: thousands_of_kilometres
    competing_forms: [repeatered_submarine_cable, unrepeatered_regional_links]
    critical_layers: [submarine_fiber, repeaters, branching_units, cable_ship, landing_station, coherent_terminal]

