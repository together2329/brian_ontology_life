supply_chain_stages:
  - id: stage_compound_materials
    stage: compound_semiconductor_substrates_and_epiwafers
    bottleneck: >-
      High-quality InP substrate and epitaxy, defect control and the move from smaller
      wafers to 6-inch production constrain reliable high-power lasers.
    supplier_refs: [optical_company_axt, optical_company_iqe, optical_company_sumitomo_electric, optical_company_coherent]
  - id: stage_fiber_preform_cable
    stage: glass_preform_fiber_and_cable
    bottleneck: >-
      AI clusters need unusually dense, bend-tolerant and quickly installable fiber;
      preform, draw, ribbon, connectorization and domestic capacity must ramp together.
    supplier_refs: [optical_company_corning, optical_company_prysmian, optical_company_furukawa_electric, optical_company_fujikura, optical_company_sumitomo_electric, optical_company_yofc, optical_company_ztt, optical_company_hengtong, optical_company_stl, optical_company_taihan_fiberoptics, optical_company_ls_cable]
  - id: stage_connectivity
    stage: connectors_ferrules_and_cable_assemblies
    bottleneck: >-
      Fiber count, insertion loss, cleaning, field installation and front-panel density
      become system-level availability constraints at 800G, 1.6T and CPO scale.
    supplier_refs: [optical_company_corning, optical_company_amphenol, optical_company_te_connectivity, optical_company_senko, optical_company_us_conec, optical_company_sumitomo_electric, optical_company_furukawa_electric, optical_company_foxconn_fit]
  - id: stage_lasers_photodetectors
    stage: lasers_modulators_photodiodes_drivers_and_TIAs
    bottleneck: >-
      Laser power, lifetime, thermal drift and packaging yield determine module and CPO
      capacity; an external-laser architecture changes placement but not the need for lasers.
    supplier_refs: [optical_company_coherent, optical_company_lumentum, optical_company_macom, optical_company_aoi, optical_company_accelink, optical_company_oe_solutions, optical_company_wooriro]
  - id: stage_DSP_SerDes_switch_silicon
    stage: DSP_SerDes_PHY_and_switch_ASIC
    bottleneck: >-
      200G-per-lane signal integrity, power and interoperability control how quickly
      1.6T pluggables and 102.4T switches move from samples to deployable systems.
    supplier_refs: [optical_company_broadcom, optical_company_marvell, optical_company_credo, optical_company_semtech, optical_company_maxlinear, optical_company_cisco, optical_company_nvidia]
  - id: stage_photonic_foundry_packaging
    stage: silicon_photonics_foundry_advanced_packaging_and_optical_IO
    bottleneck: >-
      Electronic-photonic co-design, laser attach, fiber alignment, thermal control,
      known-good-die and high-volume test are a combined manufacturing problem.
    supplier_refs: [optical_company_tsmc, optical_company_globalfoundries, optical_company_tower, optical_company_ase_spil, optical_company_amkor, optical_company_ayar_labs, optical_company_lightmatter, optical_company_ranovus, optical_company_xscape, optical_company_poet]
  - id: stage_transceivers_modules
    stage: transceiver_and_optical_engine_design_and_manufacturing
    bottleneck: >-
      Module makers must secure lasers, DSPs and connectors while maintaining assembly
      yield and reliability under rapid 400G to 800G to 1.6T transitions.
    supplier_refs: [optical_company_coherent, optical_company_innolight, optical_company_eoptolink, optical_company_accelink, optical_company_aoi, optical_company_fabrinet, optical_company_foxconn_fit, optical_company_source_photonics, optical_company_hisense_broadband, optical_company_oe_solutions, optical_company_opticore]
  - id: stage_switches_transport_access
    stage: switches_routers_packet_optical_transport_and_access_systems
    bottleneck: >-
      Customers buy validated systems, not isolated components; software, telemetry,
      routing, optics interoperability and operational support determine deployment.
    supplier_refs: [optical_company_nvidia, optical_company_arista, optical_company_cisco, optical_company_ciena, optical_company_nokia, optical_company_hpe, optical_company_adtran, optical_company_huawei, optical_company_zte, optical_company_celestica]
  - id: stage_test_measurement
    stage: laboratory_production_and_field_test
    bottleneck: >-
      High-speed BERT, optical modulation analysis, wafer and module test, fiber inspection
      and field certification can become hidden throughput and warranty constraints.
    supplier_refs: [optical_company_viavi, optical_company_keysight, optical_company_anritsu, optical_company_exfo, optical_company_fabrinet, optical_company_ase_spil, optical_company_amkor]
  - id: stage_subsea
    stage: submarine_system_design_cable_repeaters_and_marine_installation
    bottleneck: >-
      Factory throughput, repeater reliability, cable-ship availability, permits and
      landing routes create multiyear lead times independent of data-center optics cycles.
    supplier_refs: [optical_company_asn, optical_company_nec, optical_company_subcom, optical_company_hmn, optical_company_prysmian, optical_company_hengtong]

