  - id: stage_generation_and_nuclear
    stage: central_and_distributed_generation
    bottleneck: licensed_firm_capacity_turbine_slots_reactor_schedule_and_offtake_bankability
    supplier_refs: [power_company_ge_vernova, power_company_siemens_energy, power_company_constellation, power_company_vistra, power_company_talen, power_company_edf, power_company_khnp, power_company_southern, power_company_nextera, power_company_doosan_enerbility, power_company_westinghouse, power_company_oklo, power_company_nuscale, power_company_terrapower]
