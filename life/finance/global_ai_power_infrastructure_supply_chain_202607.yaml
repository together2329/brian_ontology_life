id: global_ai_power_infrastructure_supply_chain_202607
object_type: FinancialResearchArtifact
title: Global AI data-center power infrastructure supply chain
version: 1
status: active_research
as_of: 2026-07-19
timezone: Asia/Seoul
language: mixed_English_schema_with_Korean_interpretation

research_scope:
  primary_question: >-
    AI 데이터센터에 실제 전력을 전달하는 전체 체인을 연료와 발전부터
    송전·HVDC, 변압기, 변전소, 배전·UPS·버스웨이, 현장발전, ESS,
    전력반도체, EPC와 계통연결까지 연결하고 주요 기업과 병목을 구분한다.
  roster_boundary: >-
    '모두'는 전 세계의 주요 상장사, 국가·규제 유틸리티, 핵심 비상장 원전·전력
    기술기업과 Brian의 ETF에 포함된 전략적 공급자를 뜻한다. 모든 지역 배전사,
    소형 전기공사업체와 부품 유통사를 문자 그대로 전수 집계한 명부는 아니다.
  evidence_policy:
    - Prefer filings, investor relations, regulator, government, product and named-project sources.
    - Preserve signed, permitted, under-construction, energized, billed and recognized-revenue states.
    - Preserve IT MW, utility MW, generator MW, transformer MVA and battery MW/MWh as different denominators.
    - Group revenue is not AI or data-center revenue without an explicit segment or customer boundary.
    - A product qualification, partnership, framework or master agreement is not booked revenue.
    - Consolidate subsidiaries under the economic parent while retaining operating-company lineage.
  investment_boundary: >-
    공급망 원장과 보유 ETF 중복을 점검하기 위한 자료이며 매수·매도·목표가 지시가 아니다.

comparison_contracts:
  lifecycle: >-
    Planned, requested, contracted, permitted, under construction, energized, ramped and billed load remain separate.
  power: >-
    IT load, campus utility allocation, substation rating, generation nameplate and average energy consumption are not interchangeable.
  storage: >-
    Battery power in MW and energy in MWh or GWh are retained separately; neither equals annual generation.
  financial: >-
    Preserve currency, reporting period and group or segment boundary; do not add currencies or infer AI revenue.
  backlog: >-
    Backlog, remaining performance obligation, order, framework and prospective pipeline are different measures.
  ownership: >-
    Hitachi Energy is consolidated under Hitachi, Westinghouse is private under Brookfield Renewable and Cameco,
    and Piller is part of Langley Holdings; subsidiary and parent are not double-counted as independent revenue pools.

executive_findings:
  - >-
    AI 전력의 첫 병목은 발전기 부족 하나가 아니라 계통연결 승인, 대형 변압기와 HVDC,
    변전·개폐기, 현장 배전, 시공 인력의 연속된 리드타임이다. 한 구간이 늦으면 GPU 설치도 늦어진다.
  - >-
    IEA는 데이터센터 전력수요가 2025년 약 485TWh에서 2030년 약 950TWh로 늘고,
    계획된 프로젝트의 약 20%가 계통 위험으로 지연될 수 있다고 본다. 미국에서는 2030년까지
    데이터센터가 전력수요 증가분의 약 절반을 차지하는 경로다.
  - >-
    NERC의 2025 장기 신뢰도 전망은 북미 여름 피크가 2025~2035년 224GW, 24% 늘며
    데이터센터를 핵심 원인으로 지목한다. FERC는 2026년 6월 여섯 RTO에 대규모 부하
    계통연결 규정의 정당화 또는 개정을 요구했다.
  - >-
    DOE가 인용한 미국 배전용 변압기 리드타임은 2019년 3~6개월에서 2023년 12~30개월로
    늘었다. 대형 변압기·HVDC 케이블·고압 개폐기의 공장 증설은 수요 확신의 증거지만
    완공 전 생산능력과 현재 매출로 계산하면 안 된다.
  - >-
    데이터센터 내부에서는 UPS·PDU·버스웨이·스위치기어와 800VDC 전력변환이 랙 전력밀도에
    직접 연결된다. Vertiv, Schneider, Eaton, ABB, nVent, Legrand와 Delta는 같은 시장에
    노출돼도 제품 범위와 회계 세그먼트가 다르다.
  - >-
    원전과 가스·연료전지·엔진은 기저·브리지·현장전력 역할이 다르다. 장기 PPA나 마스터
    계약의 MW를 현재 IT부하 또는 인식매출로 바꾸지 않는다. Oklo와 NuScale은 특히
    상업화 단계와 현재 손익을 분리해 봐야 한다.
  - >-
    Brian의 KODEX 미국AI전력핵심인프라는 2026-05-31 기준 GE Vernova, Vertiv,
    Comfort Systems 상위 3개가 47.51%, 상위 5개가 71.57%다. 발전·현장전력·설비·시공에
    강하지만 규제 유틸리티, 변압기와 글로벌 HVDC, 배터리 셀에는 직접 노출이 제한적이다.
  - >-
    Brian의 KIWOOM 글로벌전력GRID인프라는 전력기기·그리드·케이블을 보완하고,
    RISE 글로벌원자력은 Constellation·Cameco·원전 기자재를 보완한다. 세 ETF는 분산처럼
    보여도 GE Vernova·ABB·Eaton·Schneider·HD현대일렉트릭 같은 설비 축에서 경제적 요인이 겹친다.

system_routes:
  - id: route_grid_supplied_hyperscale
    use_case: utility_grid_to_hyperscale_campus
    sequence: [generation, transmission_HVDC, substation, transformer, switchgear, UPS_or_DC_bus, rack]
    critical_boundaries: [interconnection_queue, firm_capacity, transformer_MVA, energized_date, billed_load]
  - id: route_onsite_bridge_power
    use_case: gas_turbine_engine_fuel_cell_or_microgrid_before_or_alongside_grid
    sequence: [fuel_supply, onsite_generation, synchronization, switchgear, UPS, rack]
    critical_boundaries: [air_permit, fuel_pipeline, redundancy, emissions, contracted_vs_operating_MW]
  - id: route_nuclear_long_duration
    use_case: existing_nuclear_PPA_uprate_or_new_large_and_small_reactor
    sequence: [fuel_cycle, reactor_vendor, EPC, grid_or_campus_interconnect, long_term_offtake]
    critical_boundaries: [license, construction, fuel, COD, PPA_term, sponsor_credit]
  - id: route_storage_and_power_quality
    use_case: battery_ride_through_peak_shaving_grid_services_and_renewable_firming
    sequence: [cell, pack, PCS_inverter, BMS_EMS, switchgear, campus_or_grid]
    critical_boundaries: [MW, MWh, duration, warranty, fire_safety, contracted_vs_deployed]
  - id: route_high_density_rack
    use_case: AC_grid_to_800VDC_or_low_voltage_high_current_AI_rack
    sequence: [medium_voltage, transformer, switchgear, UPS, busway_or_800VDC, rack_power_shelf, accelerator]
    critical_boundaries: [conversion_efficiency, fault_isolation, copper_content, thermal_density, qualification]

