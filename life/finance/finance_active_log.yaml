investment_theses:
  - id: investment_thesis_brian_memory_structural_advantage_20260715
    object_type: Thesis
    date: 2026-07-15
    owner_ref: person_brian
    status: active_user_stated_thesis
    title: AI-era memory market structural advantage
    raw_user_text: "투자 이유는 요즘 메모리가 너무 너무 우위 시장이라서 :)"
    thesis: Brian believes memory suppliers currently hold unusually strong market power and that this advantage supports his semiconductor and SK hynix exposure.
    supporting_user_statement: "AI에서 이게 너무나 중요해서."
    causal_chain_as_understood:
      - AI workloads require rapidly increasing movement and storage of data.
      - Compute performance can be constrained when memory bandwidth and capacity do not keep pace.
      - HBM and other advanced-memory products therefore become critical AI-system components rather than interchangeable supporting parts.
      - Brian expects this importance to support durable demand and stronger economics for leading memory suppliers.
    linked_exposures:
      - SK하이닉스 direct shares
      - memory and HBM semiconductor ETFs
      - broader semiconductor ETFs
    thesis_review_questions:
      - Is HBM and advanced-memory demand still growing faster than effective supply?
      - Are pricing power, margins, and customer commitments remaining durable?
      - Is new capacity likely to weaken the supply-demand balance?
      - Does the market price already assume an unusually optimistic outcome?
      - Has household exposure become too large even if the thesis remains correct?
    interpretation: A strong industry thesis can justify holding exposure, but it does not by itself determine valuation, position size, or household concentration limits.
    confidence: high_for_user_belief_unreviewed_for_market_conclusion
    needs_user_review: false

