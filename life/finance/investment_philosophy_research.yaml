  - id: investor_research_john_bogle_20260719
    investor_name: John Bogle
    research_status: reviewed
    core_philosophy: >
      Most investors are best served by owning the broad market at low cost, minimizing
      unnecessary turnover and keeping a disciplined long-term plan.
    verified_principles:
      - Broad-market ownership reduces dependence on selecting a few winners.
      - Costs compound against the investor and are among the most controllable variables.
      - A simple diversified core reduces decision burden and behavioral error.
      - Active ideas should not displace the core unless there is a genuine, repeatable edge.
    brian_relevance: >
      A low-cost global core is the cleanest destination for new money while Brian's employer,
      memory and AI exposure exceeds the proposed household risk boundary.
    sources:
