working_synthesis:
  id: brian_investment_philosophy_candidate_v0_2
  status: candidate_not_confirmed
  title: Brian investment philosophy candidate v0.2
  role_mapping:
    trend_and_timing: Stanley Druckenmiller
    qualitative_growth_research: Philip Fisher
    business_quality_and_compounding: Warren Buffett
    valuation_psychology_and_error_avoidance: Charlie Munger
  candidate_rules:
    - Invest in large long-run changes, but do not buy merely because an asset carries an AI label.
    - Treat every stock as a fractional business ownership interest.
    - Start new trend ideas with a limited research position; scale only after evidence improves.
    - Aggregate household AI exposure across employment, bonus, direct stocks, ETFs, spouse holdings, and index overlap.
    - Write the thesis, evidence, valuation assumptions, and invalidation conditions before assigning material size.
    - Allow meaningful concentration only inside a pre-defined household survival boundary.
    - Do not use leverage or money needed within three years for conviction investments.
    - Separate long-duration compounders from two-to-four-year trend positions and use different review and exit rules.
    - Use only public information and comply with employer trading and information-handling rules.
    - Preserve liquidity so a wrong thesis never forces harm to housing, family, or companion-animal care.
  proposed_structure_not_yet_confirmed:
    cash_bonds_deposits_percent: 25
    global_core_compounders_percent: 35
    ai_conviction_total_percent: 35
    gold_and_other_percent: 5
  status_note: These percentages and rules remain research-derived candidates until Brian explicitly confirms them.

