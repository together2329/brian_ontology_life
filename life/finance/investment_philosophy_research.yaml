  - id: investor_research_philip_fisher_20260715
    investor_name: Philip Fisher
    research_status: reviewed_with_secondary_source_support
    core_philosophy: Find a small number of exceptional growth businesses through deep qualitative investigation of customers, competitors, suppliers, employees, management, R&D, margins, and growth runway, then hold while the business quality remains exceptional.
    verified_principles:
      - Long-term sales runway must be supported by products, research, and organizational capacity.
      - Management quality, candor, talent depth, and capital allocation matter alongside reported numbers.
      - Scuttlebutt means triangulating claims through the company's ecosystem, not following rumors.
      - Growth without durable margins or shareholder economics is insufficient.
    sources:
      - title: Common Stocks and Uncommon Profits
        author: Philip A. Fisher
        source_type: original_book
        first_published: 1958
      - title: "Philip Fisher: Growth Stock Investigator"
        publisher: Forbes
        source_type: secondary_summary
        url: https://www.forbes.com/2009/02/23/philip-fisher-growth-personal-finance_philip_fisher.html
        accessed_at: 2026-07-15

  - id: investor_research_charlie_munger_20260715
    investor_name: Charlie Munger
    research_status: reviewed
    core_philosophy: Use a latticework of multidisciplinary mental models, respect incentives and psychology, seek quality at a rational price with a margin of safety, avoid leverage and stupidity, and let a few great decisions compound.
    verified_principles:
      - Facts need to be connected through multiple mental models rather than forced into one favored explanation.
      - Incentives, competitive position, accounting limitations, technology, and psychology must be analyzed together.
      - A wonderful business can still be a bad investment at an extreme price.
      - Long holding periods can improve compounding by reducing taxes, costs, and decision errors.
      - Avoiding major mistakes is at least as important as finding brilliance.
    sources:
      - title: A Lesson on Elementary, Worldly Wisdom as It Relates to Investment Management and Business
