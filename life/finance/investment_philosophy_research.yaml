  - id: investor_research_warren_buffett_20260715
    investor_name: Warren Buffett
    research_status: reviewed
    core_philosophy: Treat shares as ownership in businesses, prefer durable high-return businesses at rational prices, allow compounding time to work, use little debt, and retain ample liquidity.
    verified_principles:
      - Think and measure like a business owner rather than a trader in price movements.
      - Prefer businesses that can consistently earn above-average returns on capital.
      - Short-term price declines can be opportunities when long-term business expectations remain intact.
      - Avoid leverage that can cause permanent loss or forced action.
      - Maintain more liquidity than conventional optimization might suggest.
    sources:
