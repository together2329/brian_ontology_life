  - id: investor_research_george_soros_20260719
    investor_name: George Soros
    research_status: reviewed
    core_philosophy: >
      Begin with fallibility: an investor's model is always incomplete. In reflexive markets,
      beliefs influence prices and financing, those changes influence fundamentals, and the
      resulting feedback can strengthen a boom before reversing suddenly.
    verified_principles:
      - Participant views and the situation can affect each other through a feedback loop.
      - A bubble can combine a real trend with a biased interpretation of that trend.
      - Rising prices and easier financing can change the fundamentals rather than merely reflect them.
      - Leverage and forced liquidation can make the reversal faster and more damaging than the buildup.
      - The timing and magnitude of a reflexive process are not reliably predictable.
    brian_relevance: >
      AI demand is real, but high valuations can finance more chips, power, data centers and
      optical capacity. The same positive feedback that validates the thesis can eventually
      create excess supply, lower returns and a rapid reversal. Brian therefore needs written
      falsifiers and size limits even when the secular trend remains intact.
    sources:
      - source_id: source_soros_inet_2012_reflexivity
        title: Remarks delivered at the INET Annual Plenary Conference
        source_type: primary_speech_transcript
        url: https://www.georgesoros.com/2012/04/12/george_soros_remarks_at_the_institute_for_new_economic_thinking_annual_plen/
        published_at: 2012-04-12
        accessed_at: 2026-07-19
        access_verification: insane_search_engine_weak_ok

  - id: investor_research_howard_marks_20260719
    investor_name: Howard Marks
    research_status: reviewed
    core_philosophy: >
      Focus on risk, cycles, market expectations and price rather than assuming that a correct
      forecast of the future automatically produces a good investment.
    verified_principles:
      - Investors usually cannot make repeatably superior short-term macro forecasts.
      - Security prices reflect events relative to expectations, not events alone.
      - A transformative technology can be genuine while its securities are overpriced.
      - AI infrastructure can run ahead of end demand, and circular revenue can obscure ultimate value capture.
      - Uncertainty argues for a moderate, selective and prudent position rather than all-in or all-out.
    brian_relevance: >
      Brian's research validates the AI buildout but does not by itself establish expected return.
      Each layer must pass valuation, owner-earnings, financing and portfolio-correlation tests.
    sources:
