research_profiles:
  - id: investor_research_stanley_druckenmiller_20260715
    investor_name: Stanley Druckenmiller
    research_status: reviewed
    core_philosophy: >
      Look ahead to large two-to-four-year changes, take meaningful size when conviction
      and asymmetry are unusually strong, preserve liquidity, and change course quickly
      when the thesis or market evidence changes.
    verified_principles:
      - id: druck_principle_forward_change
        principle: Focus on what will change and how market perception may change, rather than extrapolating today's visible results.
      - id: druck_principle_sizing
        principle: Results depend not only on being right, but on position size when right and loss size when wrong.
      - id: druck_principle_concentration
        principle: A small number of exceptional opportunities can justify concentration when they are understood and watched closely.
      - id: druck_principle_invest_then_investigate
        principle: A meaningful but non-fatal initial position can focus research; add after confirmation or exit after disconfirmation.
      - id: druck_principle_liquidity
        principle: Liquidity matters because it preserves the ability to change one's mind when wrong.
      - id: druck_principle_thesis_over_cost
        principle: If the original reason for owning an asset disappears, the purchase price should not anchor the decision.
      - id: druck_principle_price_as_information
        principle: Price action and reactions to news are evidence to investigate, not noise to dismiss automatically.
      - id: druck_principle_contrarianism
        principle: Being contrary is not inherently valuable; an out-of-consensus position matters only with unusually strong evidence and conviction.
      - id: druck_principle_humility
        principle: Mistakes and emotion are unavoidable; recover, update, and avoid turning a mistake into permanent damage.
    ai_view:
      summary: >
        Druckenmiller has expressed strong belief in AI's long-run importance while also
        expressing uncertainty about which layer and which firms are the best current way
        to capture the economics. Belief in a technology does not automatically validate
        every current technology holding or valuation.
      observed_chain:
        - talent migration toward AI was treated as an early signal
        - initial picks-and-shovels exposure led to research across power and uranium
        - large model-provider capital spending raised questions about winner economics
        - future applications may capture value that current infrastructure leaders do not
      brian_relevance: >
        Brian's AI thesis can justify a meaningful conviction allocation, but the household
        must aggregate employer income, expected bonus, direct SK hynix, semiconductor/HBM/AI
        ETFs, spouse holdings, and broad-index embedded exposure before sizing it.
