decisions:
  - id: decision_finance_20260715_july_month_end_fixed_cost_reset
    object_type: Decision
    date: 2026-07-15
    title: Reset selected fixed costs at the end of July
    decision:
      - Change the personal GPT/Codex subscription to a lower-cost tier by 2026-07-31.
      - Change the mobile phone plan to a lower-cost tier by 2026-07-31.
      - Review actual July spending before deciding the August savings baseline.
    rationale:
      - Monthly salary is currently almost fully consumed.
      - The paid AI-tool trial has already produced useful learning and reusable assets.
      - Lower recurring costs create monthly margin without requiring repeated willpower.
    alternatives:
      - Keep the current GPT/Codex tier only if measured personal usage justifies it.
      - Use a middle GPT/Codex tier temporarily if the lower tier creates repeated material limits.
    consequences:
      - Record the actual new plans, effective dates, and recurring fees after each change.
      - Keep personal records on the personal/local side rather than moving them to a company account.
      - Review savings capacity after the July ledger is complete.
    source_refs:
      - source_finance_conversation_20260715_cashflow_normalization_commitment

