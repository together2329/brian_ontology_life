title: Global memory semiconductor manufacturers and enabling supply chain
version: 1
status: active_research
as_of: 2026-07-19
timezone: Asia/Seoul
language: mixed_English_schema_with_Korean_interpretation

research_scope:
  primary_question: >-
    Compare TSMC, Samsung Electronics, SK hynix and the major global suppliers
    of DRAM, HBM, NAND and strategic specialty memory, then connect them to the
    equipment, materials, packaging, test and controller value chain.
  core_manufacturer_boundary: >-
    The manufacturer registry covers the globally significant commodity-memory
    IDMs, the strategically relevant Taiwanese and Chinese memory producers, and
    TSMC as a foundry and advanced-packaging enabler. It is not a literal list of
    every EEPROM, module, controller or small specialty-memory vendor.
  evidence_policy:
    - Prefer company filings, investor relations and official product or fab disclosures.
    - Use market-research estimates only for cross-company market share and pricing.
    - Preserve preliminary, audited, forecast and management-plan states separately.
    - Do not infer a named customer or supplier relationship from product-category exposure.
    - Do not add Kioxia and Sandisk joint-venture wafer capacity as two independent factories.
  investment_boundary: >-
    This is research input for portfolio and risk review, not a direct buy or sell instruction.

executive_findings:
  - >-
    The AI-memory market is a three-company DRAM oligopoly: Samsung, SK hynix and
    Micron represented 89.7% of estimated 1Q26 branded DRAM revenue. HBM adds a
    qualification, yield, thermal and packaging moat on top of conventional DRAM.
  - >-
    TSMC is not a memory manufacturer. Its strategic role is manufacturing advanced
    logic and HBM base dies, and providing CoWoS and SoIC-class integration that
    connects accelerators to HBM.
  - >-
    NAND has more suppliers than DRAM, but Kioxia and Sandisk share manufacturing
    through Flash Ventures at Yokkaichi and Kitakami. Their revenue and product
    exposure can be compared, while their wafer capacity must not be double-counted.
  - >-
    The current profit surge is not a normalized run rate. 1Q26 conventional DRAM
    contract prices were estimated up 90-95% quarter over quarter and 2Q26 NAND
    contract prices up 70-75%, making revenue and margins unusually price-sensitive.
  - >-
    The most difficult HBM bottlenecks extend beyond DRAM wafers: EUV and high-aspect-
    ratio process steps, known-good-die testing, wafer thinning, TSV and bonding,
    base-die logic, interposers, substrates and advanced packaging all matter.
  - >-
    For Brian, SK hynix operating exposure, direct or ETF semiconductor exposure and
    employment income can move together. A strong company thesis can therefore still
    create an overly concentrated household cash-flow and portfolio outcome.

