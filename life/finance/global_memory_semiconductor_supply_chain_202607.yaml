scenario_framework:
  bull:
    conditions:
      - AI_training_and_inference_memory_demand_stays_ahead_of_supply_through_2027
      - HBM4_and_enterprise_SSD_qualification_remain_tight
      - new_fab_and_packaging_capacity_ramps_gradually_with_disciplined_bit_growth
    likely_beneficiaries: [SK_hynix, Samsung, Micron, TSMC, ASML, Applied_Materials, Lam_Research, KLA, Advantest, bonding_and_packaging_suppliers]
  base:
    conditions:
      - HBM_grows_but_conventional_memory_prices_begin_to_normalize
      - supplier_capex_expands_2027_output_without_immediate_glut
      - product_mix_and_yield_separate_company_results_more_than_spot_pricing
    interpretation: Prefer execution, qualification, balance sheet and household diversification over simple revenue extrapolation.
  bear:
    conditions:
      - hyperscaler_or_accelerator_deployment_slows
      - customer_inventory_rebuild_turns_into_double_ordering_correction
      - Samsung_Micron_and_Chinese_capacity_ramp_faster_than_demand
      - export_controls_or_geopolitical_events_disrupt_tools_customers_or_fabs
    most_exposed: [commodity_memory_IDMs, subscale_memory_fabs, late_cycle_equipment_orders, highly_levered_or_single_customer_suppliers]

brian_portfolio_and_cash_flow_lens:
  known_correlation_channels:
    - SK_hynix_employment_income_and_bonus
    - direct_SK_hynix_or_semiconductor_equity_exposure
    - Korean_and_global_semiconductor_or_AI_ETFs
    - NVIDIA_Google_and_data_center_supply_chain_exposure
  decision_rule: >-
    Evaluate new semiconductor exposure against the combined household factor,
    not as an isolated ticker. A diversified ETF can still be concentrated in the
    same AI-capex and memory-price factor already driving salary and bonus.
  cash_flow_priority: >-
    Preserve monthly free cash flow and emergency liquidity before increasing a
    cyclical semiconductor position. This is compatible with holding a long-term
    thesis without reacting to every quarterly price move.
  review_questions:
    - What share of household income, bonus and investable assets rises or falls with the same memory cycle?
    - Is the proposed exposure adding a new value-chain factor or duplicating SK hynix and AI-capex beta?
    - Does the thesis survive a 30-50% memory ASP correction and two years of heavy capex?
    - Is the expected return coming from durable process or qualification advantage, or from extrapolating current prices?

