  - id: task_ai_agent_codex_ontology_development_plugin
    title: Codex용 ontology 기반 개발 플러그인 설계/구현
    area: CAREER
    secondary_areas:
      - MIND
      - FUN
    status: in_progress
    priority: high
    energy: creative_deep_work
    estimated_minutes: null
    due_date: null
    tracking_level: detailed
    project_ref: project_ai_agent
    repository_ref: repo_ontology_ip_agent
    progress_percent: null
    tags:
      - codex
      - ontology
      - plugin
      - oag
      - hardware_ip_agent
      - productization
      - advanced_ontology
      - operational_layer
      - palantir_platform_mapping
      - foundry_like
      - aip_like
      - gotham_like
      - operational_decision_system
      - cognitive_load
      - output_protocol
    origin_context:
      - Previous TODO-based implementation was strong for task execution, but not enough for a proper ontology-based implementation design.
      - Server integration and many-user usage exposed design gaps.
      - Missed executive/division-head demos created pressure and showed the need for a reliable demo slice.
      - On 2026-06-17, Brian identified subsystem-level ontology as a key improvement area for the hardware IP agent.
      - On 2026-06-17, Brian clarified the broader destination as SoC on top of ontology.
      - Brian also wants to think about how VDS documents can be written from the SoC ontology perspective.
      - On 2026-06-19, Brian decided to immediately apply the Palantir-style advanced ontology framing: semantic objects/links, kinetic actions/functions, and dynamic state/permission/feedback.
      - On 2026-06-19, Brian clarified the Palantir product mapping for SoC development: build Foundry-like local data/ontology and AIP-like agent workflows first, then consider a Gotham-like SoC operation cockpit later.
      - On 2026-06-20, Brian refined the deeper Palantir lesson: the core is an operational decision system that turns customer/work data into real-world objects, supports judgment/action, and feeds evidence back into the next decision; AIP-like agents amplify that loop.
      - On 2026-06-20, Brian identified AI information overload as a practical bottleneck and liked the framing that ontology digests AI output into usable knowledge.
    platform_stack_mapping:
      foundry_like:
        purpose: Connect local engineering data, notes, logs, reports, tasks, decisions, and evidence into the canonical ontology.
        near_term_priority: high
      ontology:
        purpose: Model engineering objects, relationships, decisions, actions, current state, and evidence.
        near_term_priority: high
      aip_like:
        purpose: Let Codex, Solution RAG, LLM Wiki, and debug/checklist agents reason over and act through the ontology.
        near_term_priority: high
      apollo_like:
        purpose: Package stable workflows, validation, monitoring, and runtime operations after local loops mature.
        near_term_priority: medium
      gotham_like:
        purpose: Provide a later SoC debug/signoff operation cockpit generated from ontology records.
        near_term_priority: later
    operational_decision_loop:
      priority: foundational
      stages:
        - raw engineering data
        - ontology objects
        - current state
        - decision context
        - human or agent-assisted judgment
        - action or writeback
        - evidence and audit
        - feedback to next decision
      design_boundary:
        - Do not start with a generic chatbot.
        - Do not start with a manually maintained dashboard.
        - Make Codex/AIP-like agents and Gotham-like cockpit views operate over ontology records.
    cognitive_load_output_protocol:
      priority: default_assistant_behavior
      purpose: Reduce Brian's cognitive load by turning large AI output into decision/action/memory shape.
      default_shape:
        - one-liner
        - mental model
        - key points max 3
        - next action 1
        - archive optional
      triage_buckets:
        - now
        - save
        - archive
        - discard
    advanced_ontology_model:
      semantic_layer:
        purpose: Define the nouns of Brian's work and hardware domain.
        examples:
          - Project
          - Task
          - WorkSession
          - Subsystem
          - IP
          - Interface
          - Requirement
          - Issue
          - Evidence
          - Decision
      kinetic_layer:
        purpose: Define the verbs that change state or move work forward.
        examples:
          - Action records
          - run/check workflows
          - config changes
          - issue creation
          - decision capture
          - note promotion into ontology
          - validation execution
      dynamic_layer:
        purpose: Track current operational state and decision context.
        examples:
          - status
          - owner
          - blocker
          - confidence
          - needs_user_review
          - pass/fail result
          - evidence freshness
          - feedback from completed workflow
    expected_outputs:
      - Codex-compatible ontology development plugin
      - explicit ontology object and link model for development workflows
      - workflow gates that are more than TODO state
      - evidence/decision ledger for implementation progress and demo readiness
      - small reliable demo path before broader rollout
      - subsystem-level ontology model covering subsystem, IP block, interface, requirement, integration, verification, evidence, and owner links
      - SoC-level ontology layer that connects SoC intent to subsystem/IP/interface requirements, implementation tasks, verification evidence, owners, and decisions
      - VDS document model or drafting flow that can use SoC ontology objects as its source structure
      - advanced operational ontology slice that separates semantic, kinetic, and dynamic elements in the local YAML schema
      - first operational example showing a decision/action loop, such as NVMe VIP setup or SDC cleanup, with state, action, evidence, and feedback
      - Palantir-style platform map for the seminar and architecture notes: Foundry-like base, AIP-like agent layer, Apollo-like operations, Gotham-like SoC cockpit
      - operational decision loop explanation showing why ontology/action/evidence/feedback must come before chatbot or dashboard UX
      - cognitive-load-aware answer protocol that separates immediate answer, durable ontology memory, and archive detail
    next_actions:
      - Define the minimum ontology object model needed for a real development plugin.
      - Separate TODO execution state from ontology truth, evidence, and decision records.
      - Define demo-readiness criteria before scheduling future executive demos.
      - Choose one narrow vertical slice that can run reliably end to end.
      - Use the common_ai_agent history to decide what to preserve and what to replace with Codex-native/plugin-native behavior.
      - Define the first subsystem-level ontology slice and use it as the seminar/demo ontology story.
      - Define one SoC-on-ontology slice that traces from SoC-level intent to concrete IP work and evidence.
      - Map one SoC-on-ontology slice into a candidate VDS document outline.
      - Add a minimal Advanced Ontology layer map: semantic nouns, kinetic verbs, dynamic state/feedback.
      - Use one live Milano case to model Decision -> Action -> Evidence -> Feedback, then back-propagate the pattern into the ontology schema.
      - Keep Gotham-like cockpit work as a generated view over ontology records; do not make it the first implementation target.
      - For each pilot slice, identify raw data, operational objects, decision context, action/writeback, evidence, and feedback before adding agent automation.
      - Define response templates that default to "one-liner, mental model, 3 key points, 1 action, optional archive" for complex concept explanations.
    evidence_refs:
      - source_ai_agent_conversation_20260614_server_multiuser_demo_ontology_turning_point
