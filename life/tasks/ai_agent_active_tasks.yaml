summary:
  current_state:
    - Brian is continuing AI Agent development while tired from work, but the activity feels fun.
    - common_ai_agent is being ported toward a Codex-based workflow.
    - Brian expects to help with a company-wide Codex rollout around two weeks after 2026-06-14.
    - The original long-running common_ai_agent repo is /Users/brian/Desktop/Project/brian_hw/common_ai_agent.
    - Local git history for common_ai_agent spans 2025-10-31 through 2026-06-14 with 4446 observed commits, supporting Brian's "about eight months" assessment.
    - The original intent was to build a zero-dependency Python AI agent usable on company Linux servers and connected to the company's internal LLM.
    - The implementation referenced several open-source coding-agent ideas, including OpenCode-style patterns.
    - The history shows a progression from zero-dependency Python brian_coder/common_ai_agent engine work into TUI and Atlas UI, and later Codex bridge work.
    - Atlas was also a SOC group project context where Brian owned RTL implementation and invested two to three months in UI development to support that work.
    - The Atlas period was difficult and produced important lessons that should be captured later as explicit learning records.
    - Brian later clarified that while building an RTL generator in the Atlas context, he decided to step back from the Atlas project and stopped attending related meetings afterward.
    - Server integration and broader multi-user usage exposed limits in the previous TODO-based implementation approach.
    - Brian felt confident in TODO-based implementation, but realized the system was not yet a proper ontology-based implementation design.
    - Brian is now developing a Codex-oriented ontology-based development plugin.
    - Earlier executive and division-head demos were scheduled, but no successful demo was delivered.
    - While stressed because things were not going as expected, Brian was asked by 조승덕 팀장님 to run a Cursor-based seminar.
    - Brian successfully ran the Cursor seminar on 2026-06-12.
    - Brian expects to run a Codex seminar as a next step.
    - The Codex seminar is now planned for the week of 2026-06-22 to 2026-06-28.
    - The planned Codex seminar package includes rule distribution, skill distribution, a demo, and guide document distribution.
    - On 2026-06-17, Brian felt pressure to show AI value properly to stakeholders and worried that teammates might perceive him as doing only AI work rather than normal engineering work.
    - Brian reports that he is still fully handling normal work while spending significant time on AI enablement.
    - Brian considers the successful Cursor seminar a reputation asset: coworkers already know he uses AI well.
    - Brian is personally testing Claude and Codex, about 200 USD each and 400 USD total, which is now tracked as a career-capability tool trial.
    - Codex has a two-month unlimited-use period; the exact start date and operational scope still need confirmation.
    - Brian identified that subsystem-level ontology should be improved for the hardware IP agent direction.
    - Brian further clarified the longer-term direction as SoC on top of ontology: SoC-level structure and reasoning should be built above the ontology layer.
    - Brian wants to accelerate Codex seminar preparation and connect the seminar to SoC-level ontology and VDS document thinking.
    - The active local implementation repo is /Users/brian/Desktop/Project/ontology_ip_agent.
    - ontology_ip_agent is a .codex-first OAG test pack with hardware IP examples and ontology/knowledge ledger workflows.
  active_threads:
    - common_ai_agent Codex-based porting
    - common_ai_agent source history analysis and migration into Codex/OAG workflows
    - Atlas SOC project experience and lessons from UI-assisted RTL implementation
    - Atlas RTL-generator step-back memory and its possible link to current AI-demo pressure
    - Codex ontology-based development plugin design
    - recovery from missed demos and server/multi-user scaling lessons
    - Cursor seminar success and Codex seminar preparation
    - company Codex adoption support preparation
    - AI reputation management: show AI as work accelerator while keeping Milano/RTL execution visible
    - next-week Codex seminar package with rules, skills, demo, and guide docs
    - subsystem-level ontology improvement for hardware IP workflows
    - SoC-on-ontology hardware IP agent direction
    - VDS document design as a possible projection of SoC-level ontology
    - Brian's personal ontology-backed life agent development
    - ontology_ip_agent development as the concrete OAG/Codex hardware IP agent implementation
    - ontology-first conversation memory for Brian's evolving knowledge interests
    - OKF-compatible export layer as a future read-only view over canonical YAML ontology
  positive_signals:
    - This work appears to combine CAREER, MIND, and FUN rather than being only obligation-driven work.
    - The company rollout creates a near-term opportunity for Brian to turn personal experimentation into practical support.
    - A successful Cursor seminar shows that Brian can translate the hard-earned agent workflow experience into useful enablement for others.
    - Brian's personal Claude/Codex testing spend shows serious commitment to learning the tools, but should be reviewed against concrete outputs rather than emotional pressure alone.
    - A two-month unlimited-use period creates a window for real adoption experiments, not just one-time seminar exposure.
