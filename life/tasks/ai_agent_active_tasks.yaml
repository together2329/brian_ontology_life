        estimated_company_codex_users_range: [70, 80]
        tone: practical_engineering_enablement
      core_messages:
        - "AI Agent를 업무에 도입한다는 것은 프롬프트를 잘 쓰는 문제가 아니라, 원하는 품질에 도달하는지 평가하고, 그 품질에 도달하는 비용을 지속적으로 줄이는 시스템을 만드는 일이다."
        - "LLM Wiki는 설명을 잘한다. Ontology는 일을 굴린다."
        - "Codex는 주요 구성요소를 공개 repo에서 볼 수 있다. 다만 Codex 전체/모델/웹 제품이 모두 오픈소스라는 뜻은 아니므로 범위를 정확히 말한다."
        - "Sub System Level Ontology는 SoC-on-ontology로 가기 위한 실무 브리지다."
        - "Foundry는 데이터를 Ontology로 운영 가능하게 만들고, AIP는 Agent가 그 위에서 돕는 계층이며, Gotham은 특정 도메인의 작전 상황판이다. SoC 개발에서는 처음부터 Gotham을 만들기보다 Ontology 기반 운영 루프를 먼저 만든다."
        - "Palantir의 핵심은 AI 챗봇이나 대시보드가 아니라, 고객 데이터를 현실 업무 객체로 만들고 그 위에서 판단, 액션, write-back, feedback을 반복하는 운영 의사결정 시스템이다."
        - "AI 시대의 병목은 정보 생산이 아니라 정보 소화다. 좋은 AI 비서는 많이 말하는 존재가 아니라, 지금 판단할 3개와 다음 액션 1개로 줄여주는 존재다."
        - "OKF는 AI가 읽는 지식 포맷이고, Obsidian은 사람이 보는 지식 UI이며, Interactive HTML은 복잡한 관계를 이해하는 시각화 도구다."
        - "Codex Skill과 문서/발표자료 생성 flow를 붙이면 지식 정리에서 보고서와 발표자료 작성까지 반복 가능한 업무 flow가 된다."
        - "좋은 skill은 추상적으로 먼저 만드는 것이 아니라, 작은 실제 task 하나를 잘하게 만든 뒤 그 workflow를 정제해서 만든다."
        - "대화와 시행착오가 ontology에 남아야 다음 실행에서 같은 실수를 반복하지 않는다."
        - "Plan mode, one-shot/two-shot examples, git worktree, and thread handoff are the practical controls that keep Codex work scoped, reproducible, and continuous."
        - "Subagent TOML 설정은 병렬 agent를 아무렇게나 늘리는 기능이 아니라, reviewer/explorer/RTL checker 같은 전문 agent의 역할, 모델, reasoning, sandbox, limits를 명시하는 운영 장치다."
