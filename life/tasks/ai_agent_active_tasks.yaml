        ontology_llm_wiki_obsidian_note_taking:
          purpose: Show participants how to record seminar/work notes in Obsidian while keeping an ontology/LLM Wiki path for future agent use.
          note_flow:
            - Capture raw note or daily work log first.
            - Add lightweight frontmatter such as date, project, area, people, task refs, and source refs.
            - Link notes to concepts, tasks, issues, evidence, and decisions.
            - Use Obsidian graph/Bases to inspect human-readable notes.
            - Promote stable repeated structures into ontology YAML or OKF-style exports when they become reusable.
          caution: Do not force every note into perfect schema on day one; preserve raw notes and promote only stable patterns.
        palantir_platform_mapping_for_soc:
          purpose: Use Palantir terminology as an explanatory analogy for why Brian Ontology Agent should separate data substrate, ontology, agent action, operations, and cockpit views.
          mapping:
            Foundry: local engineering data and ontology substrate
            Ontology: SoC/IP/task/issue/evidence/decision/action/state model
            AIP: Codex, Solution RAG, LLM Wiki, and validation agents over ontology
            Apollo: future repeatable workflow packaging, deployment, validation, and monitoring
            Gotham: later SoC debug/signoff operation cockpit generated from ontology
          simple_layer_model:
            Semantic: what exists
            Kinetic: what can be done
            Dynamic: what is true now
          deeper_operational_loop:
            - raw engineering data
            - real-world operational objects
            - current state and decision context
            - human or agent-assisted judgment
            - action or writeback
            - evidence and audit
            - feedback to next decision
        cognitive_load_aware_ai_usage:
          purpose: Explain why AI output needs filtering and why ontology/LLM Wiki should not become another source of overload.
          one_liner: AI 시대의 병목은 정보 생산이 아니라 정보 소화다.
          answer_shape:
            - one-liner
            - mental model
            - 3 key points
            - next action 1
            - archive optional
          triage:
            now: current decision or action
            save: concept, relation, decision, action, or evidence
            archive: background detail
            discard: low-value expansion
