          focus: Convert seminar Q&A, failures, and examples into ontology/OKF records so the rollout keeps improving.
          output: post_seminar_capture_loop
      workflow_building_method:
        title: From one real task to reusable skill
        origin_story:
          - common_ai_agent accumulated practical lessons from zero-dependency Python engine work, TUI/UI work, Atlas-related workflows, and Codex bridge work.
          - The TODO-based implementation was useful for execution, but multi-user/server/demo pressure exposed the need for explicit ontology, evidence, decisions, owners, and gates.
          - ontology_ip_agent / OAG is the current concrete place where those lessons become Codex-native hardware-IP workflow patterns.
        steps:
          - step: start_in_plan_mode
            description: For broad, risky, or unclear tasks, first ask Codex to plan, identify scope, likely files, risks, validation, and questions before allowing edits.
          - step: seed_with_one_or_two_examples
            description: Give one concrete example when the target format is simple; give two examples when Codex must infer contrast, style, or edge cases.
          - step: isolate_experiments_with_git_worktree
            description: Use separate git worktrees and branches for parallel Codex attempts so candidates can be compared without contaminating the main workspace.
          - step: inventory_existing_threads
            description: Ask Codex, or use App Server thread/list when appropriate, to list current project threads by cwd, status, source, branch, preview, and updated time before starting duplicate work.
          - step: choose_one_small_real_task
            description: Pick one bounded task that matters, such as SDC cleanup, lint triage, one requirement draft, one evidence review, or one PPT/guide artifact.
          - step: run_with_codex_manually
            description: Use Codex interactively and record prompts, files, tool calls, corrections, context, and validation outputs.
          - step: define_quality_threshold
            description: Decide what good enough means before optimizing for speed or token/tool-call reduction.
          - step: capture_failure_and_correction
            description: Record mistakes, missed context, bad assumptions, and successful corrections as ontology source/evidence records.
          - step: stabilize_workflow
            description: Repeat until the small task reaches the target result consistently with acceptable resource cost.
          - step: distill_to_skill
            description: Convert the stabilized workflow into instructions, examples, required context, tool boundaries, checks, and stop conditions.
          - step: add_handoff_skill
            description: Define how a subagent passes task state, evidence, blockers, decisions, and next actions to another subagent.
          - step: configure_custom_subagents_with_toml
            description: Define narrow custom agent TOML profiles for repeatable roles such as reviewer, explorer, RTL/lint checker, documentation writer, or evidence reviewer; keep global thread/depth limits conservative.
          - step: dispatch_worker_threads_with_worktrees
            description: For independent subtasks, ask Codex to create or use separate background threads in separate worktrees, then require each worker to return branch/worktree, changed files, validation, blockers, and next actions.
          - step: collect_and_organize_thread_results
            description: Have the coordinator thread summarize active, pinned, archived, blocked, and complete threads so the human can decide what to merge, continue, or clean up.
          - step: link_threads_with_handoff_summary
            description: When moving to a new Codex thread, pass a compact summary with stable object IDs, branch/worktree, current status, evidence refs, decisions, blockers, and next actions.
          - step: use_skill_creation_skill
            description: Use a meta-skill to help extract, review, and maintain new skills from proven workflows.
          - step: monitor_and_iterate
            description: Track quality, tool calls, tokens, time, failure cases, and user corrections; update the skill when repeated patterns appear.
        reusable_skill_types:
          - task_execution_skill
          - evidence_review_skill
          - handoff_skill
          - custom_subagent_profile
          - thread_orchestration_skill
          - worktree_dispatch_skill
          - skill_creation_skill
          - failure_learning_skill
          - report_or_ppt_generation_skill
        feedback_loop:
          - Conversation creates raw source records.
          - Source records become ontology objects, understandings, decisions, and task updates.
          - Evaluation identifies whether the result reached quality threshold.
          - Monitoring identifies resource cost and repeated failures.
          - Repeated successful workflows become skills.
          - Repeated failures become skill cautions, checks, or stop conditions.
          - Future runs consult these objects so the same mistake is less likely to recur.
        practical_operating_patterns:
          plan_mode:
            purpose: Separate planning and scope alignment from execution so Codex does not edit or run broad commands before the target is clear.
            when_to_use:
              - broad or ambiguous request
              - risky repository change
              - seminar/demo planning
              - multi-step workflow design
              - before converting a workflow into a skill
            expected_output:
              - target outcome
              - files or objects likely to change
              - risks and assumptions
              - validation plan
              - open questions
              - proposed execution steps
          one_shot_two_shot:
            purpose: Steer Codex with examples instead of only abstract instructions.
            one_shot_use: Give one good example when the desired output shape is stable, such as a status-update format or a short review template.
            two_shot_use: Give two contrasting examples when Codex must infer style, boundaries, edge cases, or what good and bad output look like.
            seminar_examples:
              - one SDC cleanup report example
              - two task-summary examples showing too vague vs useful
              - one skill instruction example and one handoff summary example
          git_worktree_with_codex:
            purpose: Keep experiments isolated while multiple Codex attempts explore different fixes, demos, or generated artifacts.
            pattern:
              - Create a separate worktree per candidate branch.
              - Run Codex inside that worktree.
              - Compare diff, tests, quality score, and resource cost.
              - Promote only the winning patch back to the main branch.
            caution: Avoid running multiple agents in the same dirty working tree unless the work is deliberately coordinated.
          thread_linking:
            purpose: Continue work across Codex threads, subagents, or days without depending on memory alone.
            minimum_handoff_fields:
              - objective
              - repo/path
              - git branch or worktree
              - ontology object IDs and refs
              - current status
              - important decisions
              - evidence/source refs
              - blockers
              - next actions
              - validation already run
            ontology_link_pattern: Thread -> SourceRecord -> Task/Project/Concept -> Evidence/Decision -> NextAction.
          coordinator_thread_management:
            purpose: Use one Codex thread as a coordinator when manual thread management becomes tiring or error-prone.
            when_to_use:
              - many similar Codex threads exist for the same repository
              - several attempts are running or archived across worktrees
              - the user wants to resume the right prior thread instead of starting from scratch
              - the user wants a status board of active, pinned, archived, blocked, and complete work
            app_capabilities_to_teach:
              - search related threads by project, branch, or conversation content
              - continue an existing thread when it already has the right context
              - name, pin, archive, resume, or fork threads
              - ask for a separate background thread in a worktree for independent work
              - use the coordinator thread to summarize worker results and next actions
            app_server_probe_result:
              observed_locally_on: 2026-06-20
              method: one-shot stdio run of `codex app-server`, not a long-running daemon
              available_thread_methods:
                - thread/list
                - thread/read
                - thread/loaded/list
                - thread/start
                - thread/resume
                - thread/fork
                - thread/archive
                - thread/delete
                - thread/name/set
                - thread/metadata/update
              observed_thread_list_fields:
                - id
                - sessionId
                - preview
                - createdAt
                - updatedAt
                - status
                - path
                - cwd
                - cliVersion
                - source
                - threadSource
                - agentNickname
                - agentRole
                - gitInfo
                - name
                - turns
            prompt_examples:
              - "이 repo의 최근 Codex thread를 찾아서 active/pinned/archive 후보로 나누고, 이어서 쓸 thread와 새로 만들 thread를 제안해줘."
              - "이 작업은 독립 실험이니까 별도 worktree의 background thread로 보내고, 끝나면 diff, test, blocker, next action만 요약해서 돌아와."
              - "현재 프로젝트 thread들을 검색해서 같은 문제를 이미 다룬 thread가 있으면 이어서 진행하고, 없으면 새 thread를 만들어."
            cautions:
              - Treat App Server APIs as advanced/internal operating surface for demos; prefer natural-language App usage for most participants.
              - Do not let multiple writer agents edit the same dirty checkout unless the merge plan is explicit.
              - Require every worker thread to report worktree, branch, changed files, validation, blockers, and handoff summary.
          custom_subagent_toml:
            purpose: Configure repeatable specialist agents instead of relying only on ad hoc prompts.
            global_controls:
              - "[agents].max_threads controls the concurrent open agent thread cap."
              - "[agents].max_depth controls how deeply spawned agents can create more agents; keep this conservative unless recursive delegation is intentional."
              - "[agents].job_max_runtime_seconds can set a default worker timeout for CSV-style subagent jobs."
            custom_agent_file_locations:
              - .codex/agents/
              - ~/.codex/agents/
            minimum_custom_agent_fields:
              - name
              - description
              - developer_instructions
            optional_custom_agent_fields:
              - nickname_candidates
              - model
              - model_reasoning_effort
              - sandbox_mode
              - mcp_servers
              - skills.config
            canonical_setup_steps:
              - Put personal agents in `~/.codex/agents/` when the role is useful across projects.
              - Put project-scoped agents in `.codex/agents/` when the role depends on the repository's domain, tools, or AGENTS.md.
              - Give each custom agent a narrow role, a clear output contract, and explicit validation or handoff requirements.
              - Keep `[agents].max_depth` at 1 unless nested delegation is intentional.
              - Start with read-heavy agents, then allow write-heavy agents only after the handoff and validation pattern is stable.
            example_global_config_file: ~/.codex/config.toml
            example_global_config_toml: |
              [agents]
              max_threads = 6
              max_depth = 1
              job_max_runtime_seconds = 1800
            example_project_agent_file: .codex/agents/rtl_lint_checker.toml
            example_project_agent_toml: |
              name = "rtl_lint_checker"
              description = "Read-heavy RTL lint, compile, and evidence triage agent."
              model_reasoning_effort = "medium"
              sandbox_mode = "read-only"
              developer_instructions = """
              Inspect RTL/SystemVerilog, lint logs, compile logs, and local test scripts.
              Prioritize concrete failures, likely root causes, changed files, and validation commands.
              Do not edit files unless the coordinator explicitly asks for a patch.
              Return: summary, evidence refs, suspected root cause, proposed fix, validation already checked, and next action.
              """
              nickname_candidates = ["Lint", "Wave", "Gate"]
            lazycodex_inspired_role_mapping:
              explorer: read-heavy repository scan and context map before edits
              librarian: source/evidence/reference collector for docs and ontology
              planner: plan-before-edit workflow designer
              reviewer: correctness, regression, security, and missing-test review
              evidence_reviewer: checks whether claims have logs, tests, source refs, or artifacts
              rtl_lint_checker: Brian-specific hardware/IP lint and compile triage role
            validation_checks:
              - Run `codex features list` to confirm multi_agent is available in the local Codex build.
              - Check `~/.codex/agents/` and `.codex/agents/` for actual installed custom agent TOML files before promising a live demo.
              - Use one small read-heavy custom agent demo before attempting multiple write-capable worker agents.
            seminar_example_agents:
              - reviewer: correctness, security, regressions, and missing tests.
              - explorer: read-heavy repo/context scan with distilled summary output.
              - rtl_lint_checker: Verilog/SystemVerilog lint, compile, and evidence triage.
              - doc_writer: guide, report, and PPT source-outline generation.
              - evidence_reviewer: checks whether claims have source, test, log, or artifact evidence.
            cautions:
              - Subagents should be explicitly requested and cost more tokens than a single-agent run.
              - Start with read-heavy review, exploration, triage, test, and summarization roles before parallel write-heavy workflows.
              - Subagents inherit parent sandbox and runtime choices unless a custom agent profile or live runtime override changes the behavior.
              - LazyCodex roles are useful inspiration, but they are third-party harness conventions, not official Codex defaults.
