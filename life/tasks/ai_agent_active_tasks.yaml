        - "대화와 시행착오가 ontology에 남아야 다음 실행에서 같은 실수를 반복하지 않는다."
      scope_estimate_one_hour_per_day:
        compressed_intro:
          days: 3
          description: 핵심 메시지와 간단한 setup/demo만 보여주는 압축판.
        realistic_seminar_series:
          days_range: [10, 12]
          description: Brian이 이야기한 주제를 대부분 담고, 실무 데모와 Q&A까지 가능한 1시간 세션 묶음.
        full_asset_capture_backlog:
          days_range: [15, 18]
          description: 세미나, common_ai_agent/ontology_ip_agent 노하우, task-to-skill, handoff skill, feedback learning loop, OKF/Obsidian 샘플, Interactive HTML, Word/PPT 산출물, 평가/모니터링 설계, SoC Knowledge Graph 초안까지 자산으로 남기는 분량.
