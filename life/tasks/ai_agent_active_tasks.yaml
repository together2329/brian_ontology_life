          purpose: Translate LazyCodex-style harness ideas into a lightweight Brian/Codex seminar pattern without making LazyCodex a required dependency.
          mapping:
            "$init-deep": AGENTS.md, repo context map, ontology refs, and project memory setup
            "$ulw-plan": Plan mode plus explicit files, risks, validation, and stop conditions
            "$start-work --worktree": Codex App background thread or CLI run in a separate worktree
