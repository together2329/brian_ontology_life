    official_context:
      - domain: entry_tdac
        summary: All non-Thai nationals entering Thailand must submit the Thailand Digital Arrival Card online before entry; the official guide says submission is required within 3 days before arrival and needs passport, personal, travel, accommodation, and health declaration information.
        source_url: https://tdac.immigration.go.th/manual/en/index.html
      - domain: tdac_fee_warning
        summary: 주태국 대한민국 대사관은 TDAC가 무료이며, 공식 홈페이지 외 유료 대행/사칭 사이트에 주의하라고 안내함.
        source_url: https://tha.mofa.go.kr/th-ko/brd/m_25795/view.do?seq=1347255
      - domain: visa_policy_korean_passport_context
        summary: 주한태국대사관 관광비자 안내는 2026-06-16 기준 한국 국적은 무비자 협정으로 최대 90일 체류 가능하므로 관광비자 없이 입국 가능하다고 안내함. 단, 국적/여권종류/체류목적/정책변경 여부는 출국 전 재확인 필요.
        source_url: https://seoul.thaiembassy.org/kr/publicservice/%EA%B4%80%EA%B4%91%EB%B9%84%EC%9E%90-tourist-visa
      - domain: visa_policy_change_context
        summary: 태국 외교부는 2026-05-19 브리핑에서 비자면제/도착비자 제도 개정을 승인했다고 발표했으며, 60일 비자면제 제도 폐지 등 세부사항은 Royal Gazette 공표 후 발효된다고 안내함.
        source_url: https://www.mfa.go.th/en/content/summary-press-briefing-190526
      - domain: korea_mofa_safety
        summary: 외교부 해외안전여행은 태국 일반 지역은 여행유의로 두고, 말레이시아 접경 남부 일부와 태국-캄보디아 국경 50km 이내는 출국권고, 일부 국경 지역은 특별여행주의보로 안내함.
        source_url: https://0404.go.kr/ntnSafetyInfo/260/detail
      - domain: travel_health
        summary: CDC Thailand traveler view recommends checking routine vaccines, Hepatitis A, Hepatitis B, typhoid, and activity/region-dependent vaccines or malaria prevention; mosquito-bite prevention is important for dengue, Zika, and other vector risks.
        source_url: https://wwwnc.cdc.gov/travel/destinations/traveler/none/thailand
    privacy_note: No personal passport, booking, medical, payment, or itinerary details were sent to external services.

