        intent: Confirm driver's license 적성검사/갱신 period and schedule renewal if needed.
        needs_personal_lookup: true
    official_context_checked_at: 2026-07-02
    official_context:
      - domain: civil_defense
        summary: 2026 민방위 교육은 연차별로 1~4시간이며, 일반 안내상 본교육은 3~6월, 보충교육은 8~11월 흐름임. 정확한 개인 일정은 전자통지서/지역 교육일정 확인 필요.
        source_url: https://www.safekorea.go.kr/safekorea-kor/edtr/clns/edgu/educationGuide.do?menuSn=59
      - domain: vehicle_inspection
        summary: 자동차 검사유효기간은 TS 사이버검사소에서 자동차 등록번호로 조회하며, 정기/종합검사는 만료일 전 90일~후 31일 이내 수검 안내가 있음.
        source_url: https://www.cyberts.kr/is/pvi/pvi/readIsPviPrsecValidityInqireView.do
      - domain: driver_license_renewal
        summary: 운전면허 적성검사/갱신은 2026-01-01 시행 변경으로 생일 전후 6개월 기준 안내가 있으며, 정확한 개인 기간은 안전운전 통합민원 마이페이지 또는 경찰청 교통민원24에서 확인 필요.
