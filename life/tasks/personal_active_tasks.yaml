        intent: Confirm 2026 민방위 대상/일정 and plan completion.
        related_prior_source_ref: obsidian_daily_20250624_section_three_important_goal
        needs_personal_lookup: true
      - topic: vehicle_inspection_and_maintenance
        intent: Confirm legal vehicle inspection validity and July vehicle maintenance timing.
        related_prior_source_ref: obsidian_daily_20260105_timeblock_006
        needs_personal_lookup: true
