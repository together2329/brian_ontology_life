decisions:
  - id: decision_milano_mps_limit_temporary_workaround_20260623
    object_type: Decision
    date: 2026-06-23
    project_ref: project_milano
    component_ref: component_milano_pcie
    issue_ref: issue_milano_pcie_tlp_axi_split_bus_downsizing_20260623
    title: Use MPS limiting as temporary workaround while waiting for bus fix
    status: selected_temporary_workaround
    decision: Limit MPS as a temporary simulation/debug workaround while waiting for the bus fix; do not treat MPS limiting as final closure for the PCIe TLP-to-AXI split.
    rationale:
      - Brian reports the likely root cause is unnecessary bus unsizing/downsizing and a bus fix is already planned.
      - MPS limiting may hide the split symptom, but it can also mask the real bus-width/conversion bug.
      - Brian decided to use the temporary limit and wait for the bus fix.
      - The post-bus-fix test must be rerun without the workaround.
    conditions_for_use:
      - Record the exact MPS value used.
      - Mark the run as workaround-enabled.
      - Keep a no-workaround rerun as the acceptance target after the bus fix.
      - Do not base final area/timing/simulation confidence on the workaround-only result.
    alternatives:
      - Wait only for the bus fix without changing MPS.
      - Debug the split with current MPS and no workaround.
      - Limit MPS permanently, which is not recommended unless it becomes a reviewed requirement.
    consequences:
      - Temporary MPS limiting can keep simulation moving while the bus fix is pending.
      - It adds one more configuration variable that must be removed or explicitly justified before closure.
      - The exact MPS value still needs to be recorded.
    source_refs:
      - source_milano_conversation_20260623_pcie_tlp_axi_split_bus_downsizing_mps_limit
      - source_milano_conversation_20260623_bus_downsizing_mps_limit_wait_bus_fix
    confidence: medium
    needs_user_review: false

  - id: decision_milano_nvme_vip_setup_ib_ob_only_20260619
    object_type: Decision
    date: 2026-06-19
    project_ref: project_milano
    component_ref: component_milano_pcie
    title: NVMe VIP setup scope limited to PCIe IB/OB
    decision: Enable/open only PCIe IB and PCIe OB for the Milano NVMe VIP setup; disable all other paths/features/ports unless a reviewed exception is documented.
    rationale:
      - Brian explicitly requested PCIe IB and OB only for this setup.
      - Keeping unrelated paths disabled reduces simulation/debug contamination risk.
      - This provides a clean first Advanced Operational Ontology pilot because the decision maps directly to action, intended state, and feedback.
    alternatives:
      - Enable broader PCIe/NVMe paths for convenience.
      - Leave default VIP configuration unchanged.
    consequences:
      - Need an explicit enable list for PCIe IB and PCIe OB.
      - Need an explicit disable list for non-IB/OB paths/features/ports.
      - Any exception must be tracked before the setup is trusted.
    source_refs:
      - source_milano_conversation_20260619_nvme_vip_setup_ib_ob_only
    confidence: high
    needs_user_review: false

