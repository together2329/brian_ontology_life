operating_rules:
  - id: operating_rule_20260629_overnight_codex_bounded_pipeline
    object_type: OperatingRule
    statement: When using unlimited Codex all day or overnight, convert the run into a bounded pipeline with explicit input, expected artifacts, stop condition, logs, and morning human review.
    applies_when:
      - Brian wants Codex to run overnight or all day
      - Codex unlimited-use window is active
      - task involves RTL, DVS, TB/TC, verification, guide generation, rule/skill generation, or asset capture
    recommended_actions:
      - Choose one worktree or branch for the run.
      - Write the queue before starting: objective, allowed files, forbidden actions, expected artifacts, max attempts, and stop conditions.
      - Require an output bundle: summary, diffs, logs, evidence, blockers, and recommended next action.
      - Review in the morning before merge, publish, share, signoff, or verification closure claims.
      - Keep at least one protected sleep block; do not use nighttime wakeups as the default control loop.
    derived_from:
      - mood_20260629_codex_full_throttle_activation
      - observation_20260629_full_capacity_codex_needs_asset_pipeline
      - pattern_candidate_20260617_reputation_anxiety_overwork
      - pattern_candidate_20260627_deep_focus_erosion_under_ai_work_pressure
    confidence: high
    needs_user_review: false
  - id: operating_rule_20260627_protect_deep_focus_before_tool_exploration
    object_type: OperatingRule
    statement: When Brian is concerned that deep thinking time is shrinking, protect one uninterrupted thinking block before opening tool exploration, chat threads, or broad implementation work.
    applies_when:
      - Brian says deep thinking or immersion time is decreasing
      - AI/Codex/Milano tasks feel fragmented
      - many small tests or tool explorations are competing for attention
    recommended_actions:
      - Reserve one 45-90 minute no-notification deep thinking block.
      - Start with one handwritten question or one plain text thinking note.
      - Define the thinking output before coding or tool use: decision, model, plan, or evidence checklist.
      - Batch shallow tool checks after the deep block instead of letting them start the day.
    derived_from:
      - mood_20260627_deep_focus_decline_concern
      - observation_20260627_deep_focus_is_primary_mind_need
