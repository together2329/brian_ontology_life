schema_version: 1
status: draft
purpose: >
  Semantic object catalog for linking historical review records to ontology
  objects. This is the bridge from raw strings such as "아름", "지구",
  "SR", or "제품 포장" into stable object IDs.

review_policy:
  - Links generated from this catalog are semantic link candidates.
  - Use `needs_user_review` when a mapping may be personal, ambiguous, or historically sensitive.
  - Keep raw historical records unchanged; write semantic links to a derived index.
  - Prefer stable IDs over display names.

