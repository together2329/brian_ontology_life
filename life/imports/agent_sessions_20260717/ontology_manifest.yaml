object_model:
  - ConversationCorpus contains the complete local direct-input and session indexes.
  - UserInputRecord points to raw text without duplicating it into YAML.
  - ConversationSession aggregates time, workspace, topic, intent, significance, and promoted objects.
  - MemoryPromotion records why source inputs support a thought, understanding, direction, decision, pattern, rule, or knowledge interest.
  - EvidenceLink makes each promotion reversible and traceable to the exact direct input.

session_significance_policy:
  meaningful_when_any:
    - The session contains at least one input promoted as ontology evidence.
    - The session contains ten or more direct inputs.
    - The session contains three or more topic-classified inputs.
  contextual_otherwise: Short or unclear sessions remain indexed for chronology and neighboring context rather than being discarded.
  interpretation_boundary: Meaningful is a retrieval heuristic, not a judgment of personal importance or successful outcome.

privacy:
  processing: local_only
  external_services_used: false
  private_records_sent_externally: false
  raw_text_policy: Raw direct text stays in the tool-specific local JSONL indexes.
  authorship_policy: Assistant, tool, subagent, and automated transcript rows are not treated as Brian's direct authorship.

outcome_boundary:
  audit_status: not_audited
  rule: A request, approval, plan, or test instruction is evidence of intent and activity, not proof that the requested result succeeded.

