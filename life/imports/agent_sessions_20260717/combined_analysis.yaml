confirmed_or_strongly_supported_operating_patterns:
  - id: pattern_mechanism_before_trust
    statement: Brian wants to understand and observe the mechanism before trusting a polished result.
    confidence: high
  - id: pattern_evidence_before_completion
    statement: Completion requires reproducible, fresh, traceable evidence rather than file existence or model confidence.
    confidence: high
  - id: pattern_vague_to_atomic_truth
    statement: Broad intent is repeatedly decomposed into explicit decisions, requirements, obligations, contracts, and reviewable evidence.
    confidence: high
  - id: pattern_controlled_autonomy
    statement: LLMs should exercise judgment from principles while deterministic checks enforce hard truth and closure boundaries.
    confidence: medium_high
    needs_user_review: true
  - id: pattern_expand_then_prune
    statement: Brian explores mechanisms aggressively, then removes scripts, services, fallbacks, or workers that create more maintenance than value.
    confidence: high
  - id: pattern_real_environment_testing
    statement: Real UI, runtime, portability, and user-flow testing carry more weight than isolated synthetic success.
    confidence: high
  - id: pattern_git_as_reasoning_checkpoint
    statement: Small commits are used to preserve decisions and create recoverable experimental baselines.
    confidence: high
  - id: pattern_connected_records_create_control
    statement: Connected records are associated with clarity, positive energy, and a stronger sense of control.
    confidence: high
    causality_claimed: false

combined_open_loops:
  - Canonicalize the short set of operating principles after Brian reviews the candidate wording.
  - Build one cross-tool memory promotion policy separating raw input, repeated pattern, confirmed decision, and identity statement.
  - Audit assistant and tool outputs if actual completion status is needed for old IP, UI, research, or Git tasks.
  - Consolidate the OAG and life-ontology truth model without recreating the over-engineering Brian repeatedly rejected.
  - Finalize the household investment policy independently of temporary historical finance strategies or current AI enthusiasm.
  - Preserve or archive Claude source transcripts before local retention removes more historical main-session files.

limitations:
