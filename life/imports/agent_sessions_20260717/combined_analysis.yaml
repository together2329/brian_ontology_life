  - Exact text overlap is low for meaningful long inputs, but semantic duplication is not deterministically deduplicated.
  - Claude canonical history and current project transcript retention do not cover exactly the same sessions.
  - The analysis describes Brian's inputs and activity intent, not verified assistant outcomes.
  - All identity-level interpretations remain revisable by Brian.
