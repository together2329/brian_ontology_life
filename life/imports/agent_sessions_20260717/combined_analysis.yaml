combined_executive_read:
  - >-
    Claude and Codex were used as two parts of one long experiment. Claude contains more of the early construction,
    UI, runtime, compatibility, model-routing, and rapid product-debugging history. Codex contains more of the later
    formalization into contracts, evidence gates, ontology, reusable skills, and personal operating records.
  - >-
    The deepest recurring objective is trustworthy autonomy. Brian does not want a rigid script-only system, but he
    also does not accept an LLM's confidence as completion. The desired balance is LLM judgment inside explicit
    truth, ownership, validation, freshness, and evidence boundaries.
  - >-
    The primary output of this history is a design philosophy: preserve meaning; expose state; decompose vague intent;
    test in the real environment; reject fake closure; parallelize only bounded work; record why decisions were made;
    and keep the overall mechanism lightweight enough to maintain.
  - >-
    The life ontology is not a separate hobby. It is the personal application of the same model used for IP
    engineering: connected facts, decisions, actions, evidence, review, and identity that can evolve without losing
    the raw record.

tool_role_comparison:
  claude:
    strongest_period: 2026-03_to_2026-05
    characteristic_use:
      - Rapid builder and debugger for Common AI Agent and Atlas.
      - UI screenshots, pasted runtime errors, short corrective turns, model configuration, portability, and real product-flow testing.
      - Early memory, compression, session, todo, orchestration, and multi-user design.
      - Historical finance-strategy work and the first personal-ontology setup.
  codex:
    strongest_period: 2026-05_to_2026-07
    characteristic_use:
      - Deep source inspection, architecture explanation, OAG and IP-development implementation.
      - Requirement, obligation, contract, evidence, validation, closure, and wavefront formalization.
      - Cross-model and subagent experimentation with stronger emphasis on proof and result recovery.
      - July expansion into current health, mood, relations, household finance, investing, travel, and identity records.
  common_ground:
    - Both tools show the same short steering style and explore -> fix -> test -> verify -> Git loop.
    - Both contain repeated challenges to premature completion and over-complicated mechanisms.
    - Both were used to transfer successful ideas between agent frameworks rather than treating one vendor as the permanent architecture.

