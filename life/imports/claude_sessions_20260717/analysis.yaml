executive_read:
  - >-
    Claude history supplies the missing early half of Brian's agent-development story. It begins with hardware and
    Brian Coder use, quickly moves into persistent history, token-aware compression, memory, and iteration control,
    and then expands into a full Common AI Agent and Atlas product.
  - >-
    The archive is intensely product- and mechanism-oriented. Brian repeatedly tests streaming, Linux/Windows
    compatibility, session state, UI rendering, approval visibility, multi-user behavior, model routing, database
    latency, orchestration, and real browser usage.
  - >-
    By June, Claude inputs contain the same Requirement -> Obligation -> Contract -> Evidence -> Validation model
    later developed more formally in Codex. This shows continuity across tools rather than independent experiments.
  - >-
    Claude was often used as a rapid interactive builder and debugger. Brian's prompts are even shorter than in
    Codex, but they form dense steering chains in which explanation, implementation, testing, rejection, and Git
    checkpoints happen repeatedly.

