interaction_operating_model:
  dominant_loop:
    - inspect_or_try_a_feature
    - report_the_observed_failure_or_friction
    - ask_for_the_mechanism_or_root_cause
    - authorize_a_bounded_fix
    - test_again_in_the_UI_or_runtime
    - demand_deeper_testing_or_quality_review
    - checkpoint_with_Git
  repeated_input_examples:
    usage_command: 179
    quit: 163
    compact_command: 136
    model_command: 80
    keep_going_case_variants: 94
    git_push: 48
    go_ahead: 43
    git_add_commit_push: 34
    status: 34
    git_commit_push: 29
  style_candidates:
    - The median prompt is only 23 characters; context is built through rapid iterative turns.
    - Brian frequently tests immediately and reports visible behavior with images or pasted logs.
    - Root-cause explanations are valued, but they are expected to lead into an implementation or verification action.
    - Completion claims are challenged when the UI, runtime, or evidence does not match them.
    - Brian regularly moves between conceptual architecture and tiny product details without treating them as separate concerns.
    - Git commits are used as recoverable reasoning checkpoints throughout experimentation.

