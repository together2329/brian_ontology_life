interaction_operating_model:
  dominant_loop:
    - explore_the_system_or_problem
    - ask_why_and_expose_the_mechanism
    - challenge_complexity_or_weak_assumptions
    - select_a_direction
    - implement_incrementally
    - test_then_deep_test
    - inspect_status_and_evidence
    - commit_and_push_a_checkpoint
  repeated_exact_input_examples:
    git_commit_push: 27
    git_add_commit_push: 14
    commit_push: 13
    git_push: 11
    keep_going_case_sensitive_variant: 11
    status_question: 10
    implement_the_plan: 9
    deep_test: 6
    fix_all: 4
    merge_into_main: 4
  style_candidates:
    - Brian commonly uses very short steering turns after establishing context; the median input is 26 characters.
    - Korean and English technical shorthand are mixed fluidly.
    - Brian often begins with a broad intuition, then sharpens it through repeated counterexamples and boundary questions.
    - He prefers seeing the mechanism, state, or artifact rather than accepting a polished narrative alone.
    - He frequently authorizes continuation quickly once the direction is understood, then returns to challenge weak evidence or excess complexity.
    - Git checkpoints are part of the thinking loop, not merely release administration.
    - Visual clarity, natural interaction, and visible approval/rejection state are recurring product-quality concerns.
  interpretation_boundary: These are observed interaction patterns, not fixed personality traits.

recurring_principle_candidates:
  - id: principle_evidence_before_completion
    statement: Never treat generated files or a completion claim as sufficient; require reproducible and fresh evidence.
    status: strongly_supported_candidate
    confidence: high
  - id: principle_truth_should_be_atomic_and_traceable
    statement: Decompose intent into requirement, obligation, contract, evidence, validation, and decision links at a useful granularity.
    status: strongly_supported_candidate
    confidence: high
  - id: principle_ontology_should_enable_action
    statement: Ontology should support decisions and execution, not only store structured facts.
    status: strongly_supported_candidate
    confidence: high
  - id: principle_llm_judgment_with_deterministic_boundaries
    statement: Give the LLM principles and room to reason while deterministic checks enforce truth, safety, ownership, and closure boundaries.
    status: inferred_from_repeated_design_choices
    confidence: medium_high
    needs_user_review: true
  - id: principle_test_in_real_environment
    statement: Validate continuously in the same environment in which the system will actually be used.
    status: explicit
    confidence: high
  - id: principle_prefer_lightweight_mechanisms
    statement: Prefer docs, local files, skills, or scripts when they solve the problem without an additional MCP or service failure surface.
    status: explicit_but_context_dependent
    confidence: high
  - id: principle_parallelism_needs_boundaries
    statement: Parallelize only where dependency, ownership, integration, and evidence boundaries are clear.
    status: strongly_supported_candidate
    confidence: high
  - id: principle_ask_the_most_important_question_first
    statement: Resolve the highest-impact decision first and ask one focused question at a time.
    status: explicit
    confidence: high
  - id: principle_preserve_identity_without_overclaiming
    statement: Use long-running records to inform identity while keeping raw history, interpretation, and confirmed identity separate.
    status: inferred_from_ontology_requests
    confidence: medium_high
    needs_user_review: true

