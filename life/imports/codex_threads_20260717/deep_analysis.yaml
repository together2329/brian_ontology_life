retrieval_guidance:
  - Use user_message_index.jsonl for the exact raw input and timestamp.
  - Use input_analysis.jsonl to filter by candidate origin, topic, intent, session, or time.
  - Use session_metadata.jsonl to join a history session to its working directory and runtime metadata.
  - Treat deep_analysis_report.json as reproducible counts and this file as the human-readable interpretation layer.
  - Prefer canonical BODY, FINANCE, MIND, RELATION, and CAREER logs for confirmed present-state facts.

limitations:
  - The topic and intent rules are keyword-based and overlap by design.
  - The 4174 unclassified topic candidates are mostly short context-dependent steering turns, not evidence that the content lacks meaning.
  - Pasted assistant text can resemble Brian-authored statements; origin candidates reduce but do not eliminate this ambiguity.
  - Workspace counts show where conversations occurred, not how much code or successful output each workspace produced.
  - The archive begins sparsely and is not a complete record of Brian's life or all agent activity.
  - All interpretations remain revisable when Brian supplies corrections or confirms identity-level statements.
