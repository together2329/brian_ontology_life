thought_evolution:
  - phase: 1_agent_limitations
    period: 2025-11_to_2025-12
    shift: From using an agent to questioning why it feels mechanical.
    themes:
      - Important context can be lost through mechanical compression.
      - Restart persistence is not the same as learning from prior behavior.
      - Fixed iteration stops and rigid ReAct steps lack human judgment and intuition.
    evidence_refs:
      - codex_user_message_019ad4de-6903-7d40-93b1-51e513d96ffa_000010
    confidence: high

  - phase: 2_persistent_operational_agent
    period: 2026-05
    shift: From agent critique to designing a persistent engineering environment.
    themes:
      - Sessions and learned context should survive restarts.
      - UI should expose state, progress, decisions, approvals, and evidence clearly.
      - Documentation and a maintained LLM wiki should reduce repeated rediscovery.
      - Tests should run in the same environment users actually operate.
    evidence_refs:
      - codex_user_message_019e18d8-5339-7343-85e2-d84d6a5d1b81_001084
      - codex_user_message_019e18d8-5339-7343-85e2-d84d6a5d1b81_001121
      - codex_user_message_019e18d8-5339-7343-85e2-d84d6a5d1b81_001227
    confidence: high

  - phase: 3_evidence_first_completion
    period: 2026-05_to_2026-06
    shift: From workflow stages to proof that every required behavior is actually closed.
    themes:
      - Evidence should be the default for pipeline, CI, and interactive chat.
      - File existence or an assistant summary is not completion.
      - Correctness and evidence freshness both matter.
      - RTL version, simulation, lint, coverage, and validation history should be traceable.
    evidence_refs:
      - codex_user_message_019e18d8-5339-7343-85e2-d84d6a5d1b81_001084
      - codex_user_message_019e8b3d-eb18-7c21-83d3-c959d41844ae_003005
    confidence: high

  - phase: 4_truth_decomposition_and_locking
    period: 2026-06
    shift: From one large SSOT document to granular, testable truth objects.
    themes:
      - Requirements should decompose into obligations, contracts, and evidence.
      - Lock state should exist per requirement; all-lock means every required unit is truly locked.
      - Contracts must be strong enough to decide implementation correctness through observable signals, simulation, formal checks, or other evidence.
      - Completion requires every required obligation to be passed, waived with visibility, or explicitly blocked by a human decision.
    evidence_refs:
      - codex_user_message_019e8b3d-eb18-7c21-83d3-c959d41844ae_003296
      - codex_user_message_019e8b3d-eb18-7c21-83d3-c959d41844ae_003362
      - codex_user_message_019f4408-5eb4-7c20-b8f9-d2a64c2a306a_006120
    confidence: high

  - phase: 5_ontology_for_decision_and_action
    period: 2026-06_to_2026-07
    shift: From ontology as structured storage to ontology as an operating and decision layer.
    themes:
      - Ontology should connect intent, state, decisions, actions, and evidence.
      - Work execution should be supported, not merely documented.
      - Historical emotional and work records should contribute to an evolving but evidence-linked sense of identity.
    evidence_refs:
      - codex_user_message_019ebfad-1f51-7fc0-8ff4-9ea4142dbfaa_003884
      - codex_user_message_019efb57-5dad-7010-aaf9-02f3b97b45dd_005493
    confidence: high

  - phase: 6_bounded_autonomy_and_simplicity
    period: 2026-05_to_2026-07
    shift: From adding mechanisms to pruning mechanisms and preserving useful LLM judgment.
    themes:
      - Too much script-level control can constrain the agent and increase maintenance.
      - A default agent reading local docs/wiki may work better than an over-engineered controller.
      - A local skill or script is preferable to MCP when it solves the problem with fewer failure modes.
      - Parallelism should follow dependency, ownership, and evidence boundaries; more workers are not automatically better.
    evidence_refs:
      - codex_user_message_019e58b9-2c3b-7451-a2b9-2e18d7bbd006_001896
      - codex_user_message_019e58b9-2c3b-7451-a2b9-2e18d7bbd006_001902
      - codex_user_message_019ee503-dedf-70b1-ab61-71c4183bcba2_005144
      - codex_user_message_019f077f-300f-75f0-b8c4-df642c58058d_005578
    confidence: high

  - phase: 7_full_power_and_decision_quality
    period: 2026-06_to_2026-07
    shift: From optimizing the agent to asking how the agent can extend Brian's own thinking.
    themes:
      - Research, books, visual thinking, and neuroscience are candidate tools for expanding thought.
      - Deep Interview should begin with the most important unresolved decision and proceed one question at a time.
      - The desired system should improve judgment, not merely produce more output.
    evidence_refs:
      - codex_user_message_019f0bbf-68b5-7f90-a587-772743e75a62_005673
      - codex_user_message_019f077f-3ac3-7b10-bc51-3588b55a08d5_005749
