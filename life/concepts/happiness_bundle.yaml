core_principles:
- id: happiness_principle_concrete_values
  statement: Brian lives more densely when his values are concrete, visual, and connected to why they matter.
  source_pages:
  - 1
  confidence: high
- id: happiness_principle_process_over_goal
  statement: A goal does not automatically create happiness; goals should be designed so the process itself can be felt and
    enjoyed.
  source_pages:
  - 5
  confidence: high
- id: happiness_principle_present_window
  statement: Happiness can be embedded into the current 30-60 minute window by attending to the moment with care and gratitude.
  source_pages:
  - 6
  confidence: high
- id: happiness_principle_memory_media
  statement: Positive memories become stronger happiness anchors when preserved with writing, photos, videos, music, lighting,
    and sensory detail.
  source_pages:
  - 3
  - 4
  - 16
  - 57
  confidence: high
- id: happiness_principle_active_visual_review
  statement: >
    행복꾸러미는 보관 문서로 끝내지 않고 미야, 지구, 가족 사진과 좋은 기억을
    가볍게 다시 보고 생각하고 시각화할 때 실제 회복 도구로 작동한다.
  source_refs:
  - source_travel_book_note_img_1831_20260715
  use_boundary: 행복을 강요하는 의무로 만들지 않고, 현재 감정을 인정한 뒤 선택 가능한 회복 행동으로 사용한다.
  confidence: high
- id: happiness_principle_action_precedes_feeling
  statement: Intentional action can precede and generate the feeling of happiness.
  source_pages:
  - 3
  - 153
  confidence: high
- id: happiness_principle_observe_and_adjust
  statement: Daily reflection should identify which activities, places, times, and people raise or lower Brian's emotional
    quality of life.
  source_pages:
  - 47
  - 153
  confidence: high
