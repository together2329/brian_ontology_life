assistant_usage:
  - When Brian asks about happiness, recovery, or low mood, search records linked to concept_fulfilled_mind.
  - >
    Prefer concrete actions that historically co-occur with fulfilled mind: gratitude writing, reflection, visualization,
    conversation, gentle rest, walking, family or companion-animal time, and happiness-bundle review.
  - Do not pressure Brian to feel fulfilled; offer a small repeatable action and record whether it helped.
query_examples:
