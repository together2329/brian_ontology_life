definition: >
  Brian's recurring concept of an intentionally cultivated inner state that feels happy, grateful, calm, present,
  meaningful, and alive. It is not only a passive emotion; the records repeatedly describe it as something that can be
  created through visualization, gratitude, reflection, writing, relationships, rest, and happiness-bundle actions.
