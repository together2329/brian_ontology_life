mission_intent: >
  Continue the existing MCTP IP development thread as a Jarvis-style adaptive
  loop. Generate the best next prompt from prior results, send it to the target
  thread, save the response and controller evaluation, learn from each turn, and
  move the mission forward without crossing permission boundaries.
current_technical_hypothesis: >
  The current APB CSR CDC RTL handoff is source/dispatch/receipt consistent,
  but closure evidence for CON_APB_CSR_CDC predates the RTL handoff and is stale
  until a fresh verification dispatch is approved and executed.
turn_budget:
  planned: 100
  completed: 2
  stop_early_if:
    - explicit Brian approval required for write/test/commit/closure
    - same blocker repeats 3 times
    - target thread becomes unavailable
    - marginal value remains low for 3 consecutive turns
prompt_generation:
  primary: local_controller
  external_generators:
    claude_p:
      status: disabled_by_default
      reason: >
        Do not send private IP or personal ontology context to external services
        unless Brian explicitly approves a sanitized-input prompt generator run.
      allowed_input_if_enabled:
        - mission intent summary
        - prior turn receipt summaries
        - permission boundaries
        - no source code
        - no raw private transcript
permissions:
  automatic:
    - read target thread result
    - generate next prompt locally from saved receipts
    - send read-only prompts to target thread
    - save run receipts, prompt logs, summaries, lessons
    - ask for approval when required
  requires_brian_approval:
    - create or edit files in /Users/brian/Desktop/Project/new_ip_dev3
    - create OAG dispatch/receipt artifacts in target repo
    - run UVM, formal, simulation, compile, or long verification
    - git stage, commit, push, closure, signoff, or oag.decide in target repo
quality_rubric:
  max_score: 10
  dimensions:
    - name: mission_progress
      points: 2
      description: Moves closer to the mission rather than repeating prior conclusions.
    - name: evidence_grounding
      points: 2
      description: Grounds claims in concrete prior receipts or target-thread evidence.
    - name: prompt_adaptation
      points: 2
      description: Uses the prior result to generate a sharper next objective.
    - name: permission_safety
      points: 2
      description: Keeps read-only/write/test/commit/closure boundaries clear.
    - name: learning_quality
      points: 2
      description: Extracts a reusable lesson or controller rule from the turn.
