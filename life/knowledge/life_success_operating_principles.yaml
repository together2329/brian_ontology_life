core_concepts:
  - id: concept_life_energy_power_plant
    display_name: 삶의 에너지 발전소
    area_refs: [MIND, BODY, RELATION, FINANCE, FUN]
    definition: >
      사람은 물질적 에너지와 정신적 에너지를 생산/소비/주고/받는
      생체 시스템을 가지고 있으며, 삶의 질은 시간 위에서 이 에너지를
      어떻게 만들고 배치하고 나누는지에 의해 크게 좌우된다는 Brian의 기준.
    evidence_refs:
      - source_obsidian_life_standard_20260626
    assistant_usage:
      - 하루 계획에서 BODY, MIND, RELATION, FUN을 productivity와 함께 보호한다.
      - 에너지 저하 시 행동/감사/운동/수면/정리 중 가장 작은 회복 액션을 제안한다.
  - id: concept_action_as_primary_fuel
    display_name: 행동이 최고 연료
    area_refs: [MIND, CAREER]
    definition: 독서, 사람, 생각, 강의도 연료지만 에너지를 실제로 태워 결과로 바꾸는 것은 행동이라는 원칙.
    evidence_refs:
      - source_obsidian_life_standard_20260626
      - source_obsidian_sam_altman_success_20260626
  - id: concept_compound_growth
    display_name: 복리 성장
    area_refs: [CAREER, FINANCE, MIND]
    definition: 작은 성과가 반복되고 누적되면서 선형이 아닌 큰 결과가 생긴다는 원칙.
    evidence_refs:
      - source_obsidian_sam_altman_success_20260626
      - source_obsidian_morningglory_10b_20260626
  - id: concept_evidence_based_work_closure
    display_name: 증거 기반 업무 closure
    area_refs: [CAREER]
    definition: 과정 하나하나를 매듭짓고, 기록/더블체크/객관 데이터/결론 우선 보고로 한 번에 결과를 만드는 업무 원칙.
    evidence_refs:
      - source_obsidian_work_well_20260626

operating_principles:
  - id: principle_body_before_mind
    title: BODY가 먼저다
    area_refs: [BODY, MIND]
    rule: 좋은 수면, 음식, 운동이 물질 에너지의 기반이고, 물질 에너지가 없으면 정신 에너지도 잘 작동하지 않는다.
    practice:
      - 수면/운동/식사 상태를 일정 계획보다 먼저 확인한다.
      - 정신적으로 막히면 먼저 산책, 단백질, 수분, 샤워, 정리 중 하나를 실행한다.
    confidence: high
  - id: principle_goal_rule_feedback
    title: 명확한 목표, 정확한 규칙, 빠른 피드백
    area_refs: [MIND, CAREER, BODY, FINANCE]
    rule: 몰입과 에너지는 목표가 선명하고, 규칙이 정확하며, 피드백이 빠를 때 생긴다.
    practice:
      - 작업 시작 전에 완료 기준과 evidence path를 정한다.
      - 수치화 가능한 것은 수치화하고, 오늘 갱신할 한계를 정한다.
    confidence: high
  - id: principle_act_before_overthinking
    title: 과잉 사고보다 제어 가능한 행동
    area_refs: [MIND, CAREER]
    rule: 확실하게 조절할 수 있는 것부터 차근차근 하나씩 행동한다.
    practice:
      - 막힌 작업은 15분 안에 가능한 첫 action으로 쪼갠다.
      - 질문하기 전에 가설/안/예상 리스크를 먼저 적는다.
    confidence: high
  - id: principle_gratitude_and_visualization
    title: 감사와 시각화는 에너지 증폭 장치
    area_refs: [MIND, RELATION]
    rule: 감사, 경건한 받기, 미래 사건을 이미 받은 것처럼 느끼는 시각화가 정신 에너지를 올린다.
    practice:
      - 아침 또는 밤에 감사 3개를 기록한다.
      - 오늘 얻고 싶은 상태를 감정까지 포함해 짧게 시각화한다.
    confidence: high
  - id: principle_reduce_energy_leaks
    title: 에너지 누수를 줄인다
    area_refs: [MIND, BODY, MAINTENANCE]
    rule: 두려움, 방치, 집중 대상 없음, 과식, 술, 통제 불가능한 목표, 정리되지 않은 공간은 에너지를 낮춘다.
    practice:
      - 책상/이불/설거지 같은 작은 정리로 무의식의 마찰을 낮춘다.
      - 불확실한 큰 목표는 오늘 제어 가능한 증거 하나로 낮춘다.
    confidence: high
  - id: principle_give_energy_systematically
    title: 에너지를 주는 시스템을 만든다
    area_refs: [RELATION, FINANCE, CAREER]
    rule: 돈과 사업은 다른 사람에게 제공한 에너지의 합으로 볼 수 있으며, 장기적으로 에너지를 주는 통로를 많이 만드는 것이 중요하다.
    practice:
      - 주변 사람의 목표를 명확하게 해주는 질문을 한다.
      - 감사 표현과 도움을 기록하고 반복 가능한 시스템으로 만든다.
    confidence: medium
  - id: principle_internal_standard
    title: 남의 기준보다 자기 기준
    area_refs: [MIND, CAREER, FINANCE]
    rule: 외부 인정이 아니라 자신에게 중요한 분야에서 탁월한 일을 하는 것이 장기 성공의 기준이다.
    practice:
      - 오늘 할 일의 우선순위를 "내 기준에서 장기 복리인가?"로 재정렬한다.
      - 대체 가능한 일보다 차별화되는 일에 시간을 배정한다.
    confidence: high
  - id: principle_conclusion_first_reporting
    title: 결론부터, 얇게, 객관적으로 보고한다
    area_refs: [CAREER]
    rule: 보고는 결론/결과/중요사항을 먼저 말하고, 필요한 데이터만 붙여서 상대가 즉시 판단할 수 있게 한다.
    practice:
      - 보고 형식: 결론, 근거, 리스크, next action, 필요한 결정.
      - 긴 자료는 요점과 evidence path만 남긴다.
    confidence: high

routine_templates:
  - id: routine_daily_energy_operating_loop
    title: Daily energy operating loop
    cadence: daily
    area_refs: [MIND, BODY, CAREER, RELATION, FUN]
    steps:
      - 아침에 수면/몸/기분 상태를 체크한다.
      - 감사 3개를 기록한다.
      - 오늘의 제어 가능한 목표 1개와 evidence 기준을 정한다.
      - 가장 중요한 행동 1개를 먼저 실행한다.
      - 밤에 하루를 정리하고 배운 점/감사/내일 첫 행동을 남긴다.
  - id: routine_work_closure_loop
    title: Work closure loop
    cadence: per_work_item
    area_refs: [CAREER]
    steps:
      - 왜 이 일을 해야 하는지 한 문장으로 쓴다.
      - 완료 기준과 report/log/path를 먼저 정한다.
      - 진행 중 발견한 이슈와 의사결정을 기록한다.
      - 스스로 더블체크한다.
      - 결론부터 보고하고 residual risk를 남긴다.
  - id: routine_investment_information_loop
    title: Investment information loop
    cadence: weekly_or_daily_by_energy
    area_refs: [FINANCE, MIND]
    steps:
      - 보유/관심 회사의 뉴스와 홈페이지 변화를 확인한다.
      - 투자 커뮤니티/전문가/채널의 새 정보를 훑는다.
      - 채용/제품/사업 변화처럼 시장보다 먼저 볼 수 있는 signal을 모은다.
      - 정보 수집 시간을 제한하고 thesis update가 있는 것만 기록한다.
    caution: 원천 노트의 루틴은 매우 무겁기 때문에 Brian의 에너지와 시간에 맞춰 축소 적용이 필요함.

