assistant_usage:
  planning:
    - 오늘 계획에서 먼저 BODY energy, 감사, 제어 가능한 목표를 확인한다.
    - CAREER task는 evidence path와 closure 기준을 같이 제안한다.
    - FINANCE 루틴은 정보 수집 과잉을 막기 위해 timebox와 thesis update 중심으로 제안한다.
  review:
    - Brian이 두려움, 과식, 방치, 정리 안 됨, 목적 없음 패턴으로 흐르면 에너지 누수로 표시한다.
    - 성과 리뷰에서는 복리 성장, 차별화, 자산화, 네트워크에 연결되는 항목을 따로 표시한다.

