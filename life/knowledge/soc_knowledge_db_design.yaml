architecture_directions:
  - id: architecture_direction_20260617_soc_knowledge_db_firenze_to_milano
    object_type: ArchitectureDirection
    date: 2026-06-17
    area: CAREER
    secondary_areas:
      - MIND
    project_ref: project_ai_agent
    title: SoC Knowledge DB pilot sequence and format
    statement: "Build a shared SoC Knowledge DB by defining a canonical ontology format first, piloting it on Firenze, then expanding it to Milano."
    implementation_direction:
      pilot_sequence:
        - phase: 0_format_draft
          goal: Define the minimal object/edge/source/evidence/review format before ingesting many records.
        - phase: 1_firenze_pilot
          project_ref: project_firenze
          goal: Model known Firenze knowledge, lessons, source metadata, failure modes, and reusable patterns to stabilize the schema.
        - phase: 2_milano_expansion
          project_ref: project_milano
          goal: Apply the schema to live Milano tasks, evidence, ownership, decisions, and issue history.
      canonical_object_format:
        required_fields:
          - id
          - object_type
          - title
          - project_ref
          - soc_context
          - owner_ref
          - status
          - summary
          - source_refs
          - evidence_refs
          - related_object_refs
          - review_state
          - access_policy
        core_object_types:
          - SoC
          - Subsystem
          - IPBlock
          - Interface
          - Requirement
          - Constraint
          - DesignDecision
          - ImplementationTask
          - Issue
          - Resolution
          - VerificationCase
          - Evidence
          - Document
          - Owner
          - Lesson
        core_edge_types:
          - belongs_to_project
          - decomposes_to
          - implements
          - verifies
          - constrained_by
          - depends_on
          - blocked_by
          - resolved_by
          - evidenced_by
          - owned_by
          - reviewed_by
          - derived_from_source
      db_representation:
        initial_source_of_truth: YAML in Git for schema review and small pilots
        query_db_candidate: SQLite generated from YAML once the format stabilizes
        future_company_db_candidate: permission-preserving company-hosted DB or search index, only after security/legal/tooling approval
        minimum_tables:
          - knowledge_objects
          - knowledge_edges
          - source_records
          - evidence_records
          - review_records
          - access_policies
          - change_log
      drm_aware_ingestion_policy:
        - Do not bypass, remove, decrypt, or work around DRM.
        - Use approved exports, APIs, document-management connectors, or admin-approved ingestion only.
        - Preserve original document permissions in any shared DB or search system.
        - If raw content cannot be stored, create metadata-only SourceRecord stubs with document id/path/title/owner/access scope.
        - Store human-authored distilled knowledge as new reviewed objects, linked back to source metadata and owner/reviewer refs.
        - Separate company-shareable SoC Knowledge from Brian's private life ontology.
      first_firenze_slice_candidate:
        project_ref: project_firenze
        scope: PCIe-related prior knowledge that can explain a known design, SDC, power, handler, or BAR0/MSE lesson without exposing restricted raw content.
        output: 5-10 reviewed SoC Knowledge objects plus edges and source metadata stubs.
      milano_followup_candidate:
        project_ref: project_milano
        scope: Apply the same format to current SDC cleanup, lint/sim evidence, R001 IP Diff, handler reflection, and PF BAR0/MSE overlap prevention.
    tradeoffs:
      - Starting with YAML keeps the schema reviewable, but a generated SQLite or approved company DB will be needed for multi-user query at scale.
      - Firenze is safer for schema stabilization because it is prior knowledge, while Milano will reveal live workflow and ownership requirements.
      - DRM limits raw ingestion, but metadata stubs plus reviewed distilled knowledge can still make the knowledge graph useful.
      - Over-modeling the whole SoC upfront will slow adoption; the first slice should be narrow and concrete.
    source_refs:
      - source_knowledge_conversation_20260617_soc_knowledge_collective_asset
      - source_knowledge_conversation_20260617_soc_knowledge_format_db_need
      - source_knowledge_conversation_20260617_soc_knowledge_firenze_then_milano
      - source_knowledge_conversation_20260617_soc_knowledge_drm_blocker
    follow_up_task_refs:
