usage_playbooks:
  - id: function_insane_search_threads_recent_posts_playbook
    object_type: FunctionDefinition
    title: Retrieve recent public Threads posts
    area: CAREER
    project_ref: project_ai_agent
    function_type: usage_playbook
    capability_ref: function_insane_search_public_page_retrieval
    inputs:
      - Public Threads handle or profile URL.
      - Desired count, date range, timezone, and optional topic filter.
    outputs:
      - Recent posts grouped into original post plus numbered thread replies where applicable.
      - KST timestamps, concise summaries, and direct Threads permalinks.
    logic_summary:
      - Resolve the canonical public profile URL.
      - Try ordinary web search for discovery, but do not assume its index is current.
      - If freshness or direct access is inadequate, fetch the public profile with insane-search.
      - Parse embedded application/json SSR preload data when visible article elements are absent.
      - Select posts whose user.username matches the requested handle.
      - Deduplicate by post pk, sort by taken_at descending, and group numbered thread segments.
      - Return direct links built from the public post code.
    validation_policy:
      - Re-fetch once when the account is actively posting to check for newly added thread segments.
      - Confirm timestamps in Asia/Seoul unless the user requests another timezone.
      - Call out validator false positives when login-related JavaScript exists but structured public post data is present.
      - Do not infer that pinned, quoted, or reply content is the newest post without comparing taken_at.
    owner_ref: person_brian
    source_refs:
      - source_agent_tool_conversation_20260715_insane_search_suggestion
    confidence: high
    needs_user_review: false

