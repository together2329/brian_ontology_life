  - id: candidate_five_fulfillment_dimensions_20260718
    object_type: Concept
    status: proposed_from_ontology_review
    dimensions:
      vitality: BODY 기반 에너지와 회복.
      mastery_and_contribution: CAREER와 MIND의 깊은 이해, 창작, 문제 해결, 설명, 가치 제공.
      connection_and_care: RELATION의 배우자, 가족, 반려견, 친구, 동료와의 연결과 돌봄.
      presence_and_savoring: MIND와 FUN의 음악, 햇살, 자연, 음식, 사진, 여행, 현재 순간 음미.
      security_and_order: FINANCE와 MAINTENANCE의 현금흐름, 정돈, 방치한 일의 closure.
    interpretation_boundary: 각 영역의 시간을 똑같이 나누라는 모델이 아니라, 중요한 축이 장기간 0이 되지 않게 보는 렌즈다.
    confidence: medium_high
    needs_user_review: true

improvement_candidates:
  status: proposed_not_committed
  priority_order:
    - id: improvement_reduce_open_loops
      direction: 모든 관심사와 task를 동시에 active로 느끼지 않고 visible Now를 작게 유지한다.
    - id: improvement_protect_recovery
      direction: 높은 CAREER·AI·운동 output과 함께 수면, 회복, 마음의 여유를 보호한다.
    - id: improvement_restore_deep_focus
      direction: 탐색과 도구 전환 전에 한 질문을 깊게 생각하고 bounded closure를 남긴다.
    - id: improvement_activate_relation_and_savoring
      direction: 배우자, 지구·해이, 식사, 음악, 자연, 사진과 좋은 기억을 남는 시간으로만 미루지 않는다.
    - id: improvement_collect_outcomes
      direction: 한 번에 한 intervention만 시험하고 실제 수용 여부와 결과를 회수한다.
    - id: improvement_normalize_cashflow
      direction: 실제 월 지출을 확인한 뒤 건강·관계·지속 가능한 일을 해치지 않는 저축 여력을 만든다.
    - id: improvement_integrate_english
      direction: 영어를 별도 과목으로만 두지 않고 실제 일, 생각, 운동, 관계와 행복 장면을 표현하는 언어로 사용한다.
  confidence: medium_high
  needs_user_review: true

