proposed_review_template:
  id: routine_better_state_daily_review_20260718
  object_type: RoutineTemplate
  status: proposed_not_committed
  cadence: daily_or_when_useful
  questions:
    - 오늘 나는 더 좋은 상태로 살았는가?
    - 무엇이 나를 더 좋은 상태로 만들었는가?
    - 내일 하나만 바꾼다면 무엇인가?
  non_pressure_boundary:
    - 매일 기록해야 하는 의무로 만들지 않는다.
    - 점수 하나로 삶 전체를 판정하지 않는다.
    - 힘든 감정을 실패로 취급하지 않는다.
  related_principle_ref: principle_better_state_over_more_output_20260718
  confidence: medium_high
  needs_user_review: true

assistant_usage:
  - Brian의 day/week review에서 principle_better_state_over_more_output_20260718을 핵심 질문으로 사용한다.
  - Brian이 의미 있는 삶의 상태, 선택, 어려움, 완료한 행동을 공유하면 다시 요청하지 않아도 더 좋은 상태의 관점에서 짧게 피드백한다.
  - 피드백은 현재 상태, 원하는 삶과의 거리, 줄이거나 보호할 것, 가장 작은 다음 선택, 선택 후 실제 상태를 필요에 따라 점검한다.
  - 무관한 기술 요청이나 사소한 메시지에는 이 관점을 억지로 끼워 넣지 않고, 잔소리나 강제된 긍정으로 만들지 않는다.
  - 개선안을 한꺼번에 활성화하지 말고, 가장 작은 실험 하나와 outcome check를 연결한다.
  - 영어 사용은 자연스러운 대화 기반 연습으로 지원하되 한국어 전환을 실패로 해석하지 않는다.
  - raw user statements, confirmed principle, assistant synthesis candidate를 계속 분리한다.

privacy_boundary:
  - 이 기록과 연결된 개인 생애 기록은 로컬에 유지한다.
  - Brian의 명시적 요청 없이 외부 서비스로 전송하지 않는다.
