promoted_operating_principle:
  id: principle_better_state_over_more_output_20260718
  object_type: OperatingRule
  date: '2026-07-18'
  status: active_user_confirmed_core_question
  title: 더 많이가 아니라 더 좋은 상태로 살았는가
  area_refs: [MIND, BODY, CAREER, FINANCE, RELATION, MAINTENANCE, FUN]
  core_question_ko: "나는 더 많이 했는가가 아니라, 더 좋은 상태로 살았는가?"
  daily_question_en: "Did I end today in a better state than I started it?"
  weekly_question_en: "Did I live well this week—not just accomplish more?"
  rule: >
    하루와 주를 산출량만으로 평가하지 않고, 수행 이후의 몸과 마음, 명료함,
    의미 있는 진전과 closure, 관계의 연결, 현재 순간을 느낀 경험을 함께 본다.
  confirmation_evidence:
    - source_life_quality_conversation_20260718_better_state_resonance
  assistant_behavior:
    - 계획과 리뷰에서 output quantity보다 end state와 sustainability를 함께 묻는다.
    - 항상 편안하거나 행복해야 좋은 상태라고 해석하지 않는다.
    - 의미 있는 어려움을 수행했더라도 회복 가능성, 명료함, 연결, closure가 남았는지 본다.
    - 행복과 회복을 또 하나의 성과 의무로 만들지 않는다.
  confidence: high
  needs_user_review: false

