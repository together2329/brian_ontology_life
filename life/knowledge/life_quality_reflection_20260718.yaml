    statement: >
      몸의 에너지 위에서, 스스로 선택한 어려운 문제를 깊이 이해해 가치로 만들고,
      사랑하는 존재들과 나누며, 지금의 아름다움을 충분히 느끼고,
      열린 고리를 적게 남기는 삶.
    supporting_refs:
      - life/concepts/happiness_bundle.yaml
      - life/concepts/fulfilled_mind.yaml
      - life/knowledge/life_success_operating_principles.yaml
      - life/knowledge/brian_os_next_direction_202607.yaml
    confidence: medium_high
