  - id: architecture_engineering_metadata_reuse_layer
    object_type: ArchitectureDirection
    title: Engineering source metadata와 reuse layer
    status: active_direction
    area_refs: [CAREER, MIND]
    project_refs:
      - project_ai_agent
      - project_milano
      - project_firenze
    statement: >
      Confluence, Jira, Solution RAG, Perforce, GitLab과 분야별 Markdown을
      하나로 복사해 새 저장소를 만드는 대신, 각 원본의 stable identity,
      version, permission, context, evidence를 공통 metadata layer로 연결해 재사용한다.
    source_systems:
      - name: Confluence
        likely_role: 문서, 설명, 결정 배경
      - name: Jira
        likely_role: issue, status, owner, workflow
      - name: Solution RAG
        likely_role: solved case, context, attempt, resolution, evidence
      - name: Perforce
        likely_role: RTL와 회사 코드 version
      - name: GitLab
        likely_role: Git code, merge, CI, version metadata
      - name: local_markdown_yaml
        likely_role: Brian의 정제 지식, ontology, 가이드, lesson
    minimum_metadata:
      - stable_id
      - object_type
      - title
      - source_system
      - source_locator
      - source_version
      - project_and_component_context
      - owner_and_reviewer
      - requirement_or_issue_refs
      - evidence_refs
      - status_and_freshness
      - access_policy
      - last_reviewed
    candidate_knowledge_families:
      domain:
        - PCIe guide
        - PCIe structure
        - PCIe specification
        - Cadence control and PHY notes
      engineering:
        - requirement
        - testbench
        - test case
        - SDC
        - synthesis and implementation
        - lint and CDC
        - interrupt, stream, bus, PMC/SBC, OCP
      operations:
        - issue
        - debugging
        - lesson learned
        - power
        - area
        - PPA flow
    relation_to_agent_loops:
      - Mission, Plan, Action, Review records share the same IDs and context.
      - Requirement, Obligation, Contract, Evidence, Validation records provide traceability and closure.
      - Solution RAG reuses reviewed resolution and evidence records rather than ungrounded summaries.
      - Generated PPTX, dashboard, or agent answer is a view over the same metadata, not a second truth store.
    lightweight_implementation_order:
      - 먼저 YAML에서 minimum metadata와 stable IDs를 검토한다.
      - 기존 source를 복사하지 않고 metadata-only stub과 local distilled note를 연결한다.
      - 한 개의 Firenze 또는 Milano 사례에서 source-to-evidence trace를 시험한다.
      - 반복 가치가 확인된 source에만 connector나 automation을 추가한다.
      - query scale이 실제 병목이 될 때에만 generated SQLite 또는 승인된 DB를 검토한다.
    boundaries:
      - 현재 작업에서 app, service, database를 새로 만들지 않는다.
      - 회사 원본의 권한, DRM, access policy를 우회하지 않는다.
      - 실시간 연동은 metadata model과 permission review가 안정된 뒤의 후보 단계다.
      - 개인 life ontology와 회사 공유 지식을 access scope로 분리한다.
    related_concept_refs:
      - concept_foundry_like_operational_data_layer
      - concept_solution_rag
      - concept_operational_decision_system
      - concept_advanced_operational_ontology
    related_task_refs:
      - task_ai_agent_soc_knowledge_format_db_pilot
      - task_ai_agent_solution_rag_ontology_builder
