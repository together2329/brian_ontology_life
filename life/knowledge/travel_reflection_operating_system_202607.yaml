      - source_travel_book_note_img_1833_20260715
      - source_travel_book_note_img_1826_20260715
      - source_travel_book_note_img_1827_20260715
    confidence: high
    needs_user_review: false

integration_boundaries:
  - 원본 사진은 private raw 경로에만 두고 외부 서비스나 Git에 올리지 않는다.
  - 영어 우선 메모는 검토 후보이며 현재 개인 기록 언어를 바꾸지 않는다.
  - Milano brainstorm은 현재 project status나 active task를 덮어쓰지 않는다.
  - 건강 질문은 research queue이며 처방으로 활성화하지 않는다.
  - 새 DB나 app을 만들지 않고 기존 YAML ontology와 source metadata 구조를 사용한다.
  - 행복꾸러미는 회복 선택지이며 의무나 압박으로 만들지 않는다.
