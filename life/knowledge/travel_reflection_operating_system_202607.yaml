  - id: architecture_markdown_visual_projection
    object_type: ArchitectureDirection
    title: Markdown SSOT에서 PPTX와 engineering visual로 projection
    status: active_direction
    area_refs: [CAREER, MIND]
    project_ref: project_ai_agent
    statement: >
      모든 상세 의미와 출처는 Markdown/YAML에 두고, PPTX, block diagram,
      logic gate, signal line, 설명 문장은 목적별 visual projection으로 생성한다.
    canonical_layer:
      content:
        - detailed explanation
        - component and interface semantics
        - source and evidence links
        - assumptions and unresolved questions
        - version metadata
      formats:
        - Markdown
        - YAML
    projection_layer:
      outputs:
        - PPTX component view
        - block diagram
        - logic gate and signal-line explanation
        - generated image when code-native drawing is insufficient
      rule: projection은 canonical detail을 잃지 않으며 수정 사항은 source layer로 writeback한다.
    validation:
      - diagram node와 source section을 추적할 수 있는가.
      - signal direction과 naming이 source와 일치하는가.
      - PPTX에서 생략된 detail이 Markdown에 남아 있는가.
      - 그림이 설명을 꾸미는가, 실제 판단과 이해를 돕는가.
    source_refs:
      - source_travel_book_note_img_1829_20260715
    confidence: high
    needs_user_review: false

  - id: operating_definition_research
    object_type: KnowledgeInterest
    title: Research를 의사결정 불확실성 감소 루프로 정의
    status: proposed_definition
    area_refs: [MIND, CAREER]
    question_from_note: Research는 무엇인가?
    proposed_definition: >
      Research는 자료를 많이 모으는 활동이 아니라, 명확한 질문과 결정의
      불확실성을 신뢰 가능한 evidence로 줄이고 결론, 남은 불확실성,
      다음 action을 재사용 가능한 기록으로 남기는 bounded loop다.
    proposed_flow:
      - Mission 또는 결정 질문을 한 문장으로 고정한다.
      - 범위, 시간, 필요한 신뢰도, 제외 범위를 정한다.
      - 서로 다른 근거와 반례를 수집한다.
      - Source와 주장, confidence를 연결한다.
      - 결론과 alternatives를 비교한다.
      - 남은 unknown과 invalidation condition을 적는다.
      - next action과 archive record를 남긴다.
    stop_conditions:
      - 현재 결정을 내릴 만큼 핵심 불확실성이 줄었다.
      - 추가 조사 비용이 예상 의사결정 가치보다 커졌다.
      - 필요한 primary evidence가 없어서 명시적으로 blocked 상태가 됐다.
    source_refs:
      - source_travel_book_note_img_1829_20260715
    confidence: medium
    needs_user_review: true

  - id: candidate_english_first_ai_working_language
    object_type: Concept
    title: AI 작업 영어 우선 후보 정책
    status: candidate_not_active
    area_refs: [MIND, CAREER]
    project_ref: project_ai_agent
    handwritten_direction: >
      영어 말하기, 듣기, 쓰기, 읽기를 매일 훈련하고 모든 기록과 정책을
      영어로 만드는 것이 AI 시대의 토큰 효율적인 방법이라는 여행 메모.
    current_system_policy: >
      Brian이 범위를 확인하기 전까지 개인 온톨로지는 한국어 또는 자연스러운 혼합 언어를 유지한다.
      기존 기록과 정책을 일괄 번역하거나 영어 전용으로 바꾸지 않는다.
    narrower_experiment_candidates:
      - 코드 identifier, schema field, contract 이름은 영어를 우선한다.
      - 회사 공유용 기술 artifact는 영어 초안과 한국어 설명을 필요에 따라 병행한다.
      - 하루 한 개의 technical summary만 영어로 다시 써본다.
      - 같은 작업을 한국어와 영어로 수행해 토큰, 정확도, 수정량, 이해도를 비교한다.
    decision_questions:
      - 목표가 영어 능력 향상인가, AI token 효율인가, 회사 협업인가?
      - 개인 감정과 관계 기록까지 영어로 바꿀 필요가 있는가?
      - 영어 우선이 사고의 정밀도와 기록 지속성을 낮추지는 않는가?
    activation_condition: Brian이 적용 범위와 시험 기간을 명시적으로 선택한다.
    source_refs:
      - source_travel_book_note_img_1830_20260715
    confidence: medium
    needs_user_review: true

  - id: principle_happiness_bundle_active_visualization
    object_type: Concept
    title: 행복꾸러미를 사진과 좋은 기억으로 다시 느끼기
    status: active_principle
    area_refs: [MIND, RELATION, FUN]
    activity_ref: activity_happiness_bundle
    statement: >
      행복꾸러미는 읽고 보관하는 문서가 아니라 미야, 지구, 가족 사진과
      좋은 기억을 자주 보고 생각하고 시각화해 충만한 상태를 다시 불러오는 도구다.
    gentle_practice:
      - 에너지가 낮을 때 사진 또는 좋은 기억 하나만 1-3분 본다.
      - 그 장면에서 고마운 점, 느껴지는 감각, 오늘 재현할 수 있는 작은 행동을 하나 적는다.
      - 관계 사진을 볼 때 상대에게 할 수 있는 작은 감사 또는 돌봄 action을 연결할 수 있다.
      - 새 행복 장면이 생기면 사진과 짧은 문장으로 행복꾸러미 evidence 후보에 남긴다.
    non_pressure_boundary:
      - 행복꾸러미를 매일 지켜야 하는 의무로 만들지 않는다.
      - 우울하거나 지친 감정을 억지로 부정하는 용도로 쓰지 않는다.
      - 현재 감정을 인정한 뒤 회복 선택지 중 하나로 가볍게 제안한다.
    related_concept_refs:
      - concept_fulfilled_mind
    source_refs:
      - source_travel_book_note_img_1831_20260715
    confidence: high
