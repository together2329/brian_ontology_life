  - id: architecture_dual_loop_brian_agent_system
    object_type: ArchitectureDirection
    title: Brian Agent dual loop
    status: active_direction
    area_refs: [CAREER, MIND]
    project_ref: project_ai_agent
    statement: >
      Brian의 Agent는 Mission을 계획하고 실행하는 outer loop와,
      각 Action을 requirement부터 validation까지 보증하는 inner loop를 함께 가진다.
    outer_loop:
      name: mission_execution_loop
      flow:
        - Mission
        - Plan
        - Action
        - Review
      role: 큰 의도를 bounded action으로 바꾸고 진행 상태와 다음 action을 관리한다.
    inner_loop:
      name: engineering_assurance_loop
      flow:
        - Human input or spec
        - Requirement
        - Obligation
        - Contract
        - Evidence
        - Validation
        - Review
      semantics:
        requirement: 무엇이 필요한가.
        obligation: 요구를 만족하기 위해 반드시 지켜야 하는 기계가 다룰 수 있는 책임은 무엇인가.
        contract: 입력, 출력, 불변조건, 금지조건, 완료 기준을 어떤 규칙과 약속으로 고정하는가.
        evidence: 구현이나 행동이 contract를 만족한다는 어떤 관측 자료를 남기는가.
        validation: evidence가 충분하고 올바르며 현재 상태를 실제로 증명하는가.
        review: 실패와 빈틈을 requirement, obligation, contract, evidence에 다시 반영하는가.
    action_generation_examples:
      - spec에서 requirement 작성
      - requirement에서 obligation 작성
      - obligation에서 contract 작성
      - RTL/TB 구현
      - formal 또는 simulation 실행
      - evidence 수집과 validator review
    human_boundary:
      - Agent는 Brian의 판단을 제거하지 않는다.
      - Mission 의미, contract rationale, 충분한 evidence, 위험한 action의 승인에는 인간 review가 남는다.
      - 여러 subagent도 같은 stable IDs, contracts, evidence paths, review rules를 공유해야 한다.
    related_concept_refs:
      - concept_operational_decision_system
      - concept_advanced_operational_ontology
      - concept_aip_like_agent_layer
    source_refs:
      - source_travel_book_note_img_1826_20260715
      - source_travel_book_note_img_1827_20260715
      - source_travel_book_note_img_1833_20260715
    confidence: high
    needs_user_review: false

