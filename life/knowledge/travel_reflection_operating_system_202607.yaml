purpose: >
  여행 중 책 여백에 적은 Brian의 개인 운영 원칙, agent/IP 개발 흐름,
  행복꾸러미 사용법, 건강 연구 질문, 엔지니어링 metadata 방향을
  기존 ontology에 중복 없이 연결한다. 확정 원칙, architecture direction,
  연구 질문, 검토 후보를 분리해 이후 대화에서 바로 꺼내 쓸 수 있게 한다.

central_synthesis:
  statement: >
    Brian의 시스템은 더 많은 일을 동시에 처리하는 체계가 아니라,
    한 가지를 깊이 소화하고 Mission을 검증 가능한 Action으로 바꾸며,
    그 결과가 삶 전체의 Energy/Happiness를 높이는지 Review하는 체계다.
  stack:
    - layer: attention_and_digestion
      flow: "Single task → Capture side thought → Explicit connection → Digest → Reuse"
      question: 지금 정보가 많아진 것인가, Brian이 실제로 이해하고 다시 쓸 수 있게 된 것인가?
    - layer: mission_execution
      flow: "Mission → Plan → Action → Review"
      question: 큰 의도가 다음에 실행할 수 있는 bounded action으로 구체화됐는가?
    - layer: engineering_assurance
      flow: "Human input/spec → Requirement → Obligation → Contract → Evidence → Validation → Review"
      question: 무엇을 만들고 지켜야 하며 어떤 증거가 충분한지 기계와 사람이 함께 확인할 수 있는가?
    - layer: life_governance
      flow: "7 Life Areas + Mission + Timeline + Energy/Happiness"
      question: 일정과 성과뿐 아니라 몸, 관계, 마음, 즐거움의 에너지도 좋아지는가?
    - layer: memory_and_reuse
      flow: "Local source → Markdown/YAML → Metadata/Version → Agent/View → Feedback"
      question: 이번 판단과 증거가 다음 작업에서 재사용 가능한 자산으로 남았는가?

assistant_default_use:
  - 과부하 상태에서는 한 번에 하나의 핵심 작업과 옆 생각 capture 공간을 먼저 제안한다.
  - 복잡한 주제에는 why, whole picture, explain/draw, evidence의 네 질문을 사용한다.
  - Agent/업무 설계에는 Mission 실행 루프와 engineering assurance loop를 함께 보여준다.
  - 계획에는 Mission과 Timeline만이 아니라 Energy/Happiness와 7개 life area를 함께 본다.
  - 행복/회복 질문에는 행복꾸러미의 미야·지구·가족 사진과 좋은 기억 시각화를 가볍게 제안한다.
  - 시스템 통합 질문에는 새 DB부터 만들지 않고 source metadata, stable ID, evidence, version, permission을 먼저 정한다.

promoted_records:
  - id: principle_single_task_and_digest_ai
    object_type: Concept
    title: 한 가지 집중과 AI 정보 소화
    status: active_principle
    area_refs: [MIND, CAREER]
    statement: >
      한 번에 한 가지 일에 집중하고, 옆으로 생긴 좋은 생각은 짧게 포착한 뒤
      쓰레드와 명시적 연결을 통해 소화한다. AI 활용의 확장은 출력량이 아니라
      Brian이 이해하고 연결하고 다시 사용할 수 있는 소화 기반 위에서 이루어진다.
    operating_rules:
      - 현재 시간창의 main task는 하나만 둔다.
      - 옆 생각은 버리거나 즉시 전환하지 않고 capture queue에 한 줄로 적는다.
      - 기록을 concept, project, task, evidence 중 적어도 하나와 연결한다.
      - 소화가 끝났다는 기준은 한 문장 설명, 핵심 3개, 다음 action 1개로 다시 표현할 수 있는가이다.
      - 긴 AI 산출물은 지금 필요한 것, 저장할 것, 버릴 것으로 나눈다.
    failure_modes:
      - 좋은 생각이 나올 때마다 main task를 바꾸는 것
      - 연결되지 않은 메모를 계속 쌓는 것
      - 이해하지 못한 AI 출력을 곧바로 정책이나 작업으로 승격하는 것
    related_concept_refs:
      - concept_cognitive_load_aware_ai_output
      - concept_conversation_knowledge_memory
    source_refs:
      - source_travel_book_note_img_1823_20260715
    confidence: high
    needs_user_review: false

  - id: principle_deep_reasoning_whole_picture
    object_type: Concept
    title: Why와 큰 그림을 포함한 deep reasoning
    status: active_principle
    area_refs: [MIND, CAREER]
    statement: >
      reasoning effort는 답을 길게 만들거나 계산을 많이 시키는 일이 아니라,
      한 가지 개념이 왜 필요한지, 큰 시스템에서 어떻게 흐르는지,
      스스로 그리거나 설명할 수 있는지를 끝까지 확인하는 일이다.
    four_question_check:
      - 왜 필요한가?
      - 큰 그림에서 어디에 있고 앞뒤로 무엇과 연결되는가?
      - 내가 직접 그리거나 다른 사람에게 설명할 수 있는가?
      - 어떤 evidence가 내 이해와 결과를 반박하거나 확인하는가?
    use_cases:
      - 새로운 agent architecture 개념을 배울 때
      - RTL/IP requirement와 contract rationale을 만들 때
      - 연구 결과를 의사결정이나 교육 자료로 바꿀 때
    source_refs:
      - source_travel_book_note_img_1825_20260715
      - source_travel_book_note_img_1826_20260715
    confidence: high
    needs_user_review: false

  - id: health_question_definition_dose_reason
    object_type: KnowledgeInterest
    title: 식단·근력·유산소의 정의, 이유, 적정량, 빈도 연구
    status: open_research_question
    area_refs: [BODY, MIND]
    statement: >
      건강 운영 규칙을 만들기 전에 식물성 음식, 근력운동, 유산소운동의
      정의와 목적, Brian에게 맞는 적정량, 빈도, 원리를 근거와 현재 상태에 맞춰 검토한다.
    question_set:
      diet:
        - 식물성 음식과 plant-forward 식단은 무엇을 포함하는가?
        - 현재 식사와 단백질 목표에서 무엇을 늘리고 줄일 것인가?
        - 일주일 또는 끼니 기준의 현실적인 적용량은 어느 정도인가?
      strength:
        - 근력운동이 필요한 이유와 현재 목표는 무엇인가?
        - 주당 빈도, 주요 움직임, 회복 기준은 무엇인가?
      cardio:
        - 유산소를 왜 해야 하며 건강과 회복에서 어떤 역할을 기대하는가?
        - 강도와 주당 시간 또는 빈도를 어떻게 정할 것인가?
      integration:
        - 식단, 근력, 유산소를 현재 수면, 체성분, 일정, 에너지와 어떻게 함께 조절할 것인가?
    activation_boundary:
      - 이 기록 자체는 의료 조언이나 운동 처방이 아니다.
      - 구체 기준을 만들 때는 최신 신뢰 가능한 근거와 Brian의 현재 BODY 기록을 확인한다.
      - 무리한 일괄 변경보다 한 번에 한 변수씩 시험하고 feedback을 기록한다.
