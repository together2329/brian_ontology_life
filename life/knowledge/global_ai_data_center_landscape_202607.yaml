area: FINANCE
secondary_areas:
  - CAREER
  - MIND
title: Global AI data-center landscape
research_question: >-
  Where are the world's data centers, how large are the major AI campuses, how
  many accelerators do they contain, how are they powered and cooled, and which
  companies participate in their supply chains?

scope_and_method:
  location_baseline_ref: life/imports/global_data_centers_20260717/osm_data_center_locations.jsonl
  location_summary_ref: life/imports/global_data_centers_20260717/summary.json
  reproducible_builder_ref: scripts/build_global_data_center_registry.py
  company_financials_ref: life/finance/ai_data_center_supply_chain_financials_202607.yaml
  public_location_records: 4663
  coverage_audit_scope:
    operator_label_registry_ref: life/imports/global_data_centers_20260717/global_data_center_operator_coverage_audit.jsonl
    country_registry_ref: life/imports/global_data_centers_20260717/global_data_center_country_coverage_audit.jsonl
    summary_ref: life/imports/global_data_centers_20260717/global_data_center_coverage_audit_summary.json
    builder_ref: scripts/build_global_data_center_coverage_audit.py
    raw_operator_labels: 822
    iso2_country_records: 112
    reviewed_profile_routed_mapped_objects: 1705
    reviewed_profile_routed_percent_of_operator_tagged_objects: 61.40
    boundary: >-
      Routing an OSM operator label to a reviewed portfolio or company record is
      research coverage, not object-by-object official reconciliation. The audit
      ranks remaining operator work but is neither market share nor a census of
      every physical data center.
  cross_check:
    source: PeeringDB public site
    reported_facilities_on_2026_07_17: 5858
    use_boundary: >-
      Used only as a coverage cross-check. PeeringDB bulk data is not copied into
      this repository because its acceptable-use policy restricts bulk
      redistribution.
  evidence_priority:
    - company_or_operator_primary_source
    - utility_or_regulator_primary_source
    - securities_filing_or_investor_release
    - government_permit_or_public_record
    - reputable_secondary_source_clearly_marked_as_secondary
  disclosure_rules:
    - Never convert campus MW into a GPU count without a disclosed hardware and power model.
    - Never assign a portfolio-level chip count to one campus.
    - Separate operating capacity from announced, contracted, under-development, and aspirational capacity.
    - Preserve whether a power figure means compute capacity, IT load, utility service, or generation capacity.
    - Record exact unknowns as undisclosed rather than filling them with estimates.
    - OSM footprint area is map geometry, not certified gross floor area or IT capacity.
  record_granularity_note: >-
    campus_profiles primarily contains individual campuses, but also preserves
    announced multi-facility programs and regional portfolios when no exact site
    boundary is public. Non-campus records declare record_granularity and must not
    be counted as one physical data center.
  operator_segments_in_scope:
    - hyperscalers_and_big_tech
    - neocloud_and_GPU_cloud_operators
    - colocation_and_hyperscale_build_to_suit_operators
    - data_center_REITs_and_private_developers
    - converted_crypto_and_power_site_hosts
    - utilities_and_power_developers
    - compute_network_electrical_and_cooling_supply_chain
  neocloud_scope:
    disclosure_registry_ref: life/imports/global_data_centers_20260717/neocloud_disclosure_registry.jsonl
    disclosure_summary_ref: life/imports/global_data_centers_20260717/neocloud_disclosure_summary.json
    disclosure_registry_as_of: 2026-07-18
    primary_operator_roster:
      - CoreWeave
      - Nscale
      - Crusoe
      - Lambda
      - Nebius
      - Fluidstack
      - Voltage_Park
      - TensorWave
      - Together_AI
      - Vultr
      - GMI_Cloud
      - RunPod
    linked_capacity_host_roster:
      - Applied_Digital
      - Core_Scientific
      - IREN
      - Galaxy_Digital
      - Cipher_Mining
    classification_boundary: >-
      The linked capacity hosts are not automatically classified as neoclouds.
      They are tracked separately because they may own powered campuses, lease
      capacity to a neocloud, convert crypto infrastructure to AI, or combine a
      hosting business with their own cloud service.
    reconciliation_findings:
      - IREN's approximately 150,000 GPUs are installed or on order, not a current active fleet count.
      - Fluidstack's more than 100,000 GPUs are under management, not disclosed as owned inventory.
      - Together AI's more than 500 MW is future independently capitalized compute commitment, not active load.
      - Voltage Park says six data centers but publishes seven location labels; the source inconsistency remains unresolved.
      - Vultr's 33 and RunPod's 31 Regions are provider service scopes, not owned physical-building counts.
      - Cipher Barber Lake separates 168 MW phase I, 39 MW phase II and 244 MW phase-I gross support capacity.
    comparison_boundary: >-
      The registry deliberately does not publish a cross-company MW or GPU sum.
      A comparison must first choose one lifecycle, one power metric, one hardware
      ownership state, and one accounting period; otherwise the result is false precision.
    required_metrics:
      infrastructure:
        - physical_data_centers_and_service_AZs_with_scope_reconciliation
        - active_contracted_and_pipeline_power_kept_separate
        - owned_leased_colocated_and_customer_supplied_capacity_kept_separate
        - GPU_or_accelerator_model_count_ownership_delivery_and_site_allocation
        - rack_density_liquid_cooling_grid_and_backup_power
      commercial:
        - customer_contract_value_term_acceptance_and_revenue_commencement
        - customer_and_accelerator_supplier_concentration
        - utilization_and_revenue_per_active_MW_or_GPU_only_when_comparable
        - backlog_RPO_and_pipeline_kept_separate
      financial:
        - revenue_GAAP_operating_income_net_income_and_adjusted_EBITDA
        - capex_debt_interest_lease_obligations_and_free_cash_flow
        - equity_debt_asset_backed_and_vendor_financing_structure
        - liquidity_dilution_refinancing_and_accelerator_residual_value_risk
    disclosure_rules:
      - Never count a service availability zone as one physical building without evidence.
      - Never count contracted or pipeline MW as active, energized, accepted, utilized, or billed MW.
      - Never assign a fleet GPU count to a campus or host landlord without site-level evidence.
      - Separate operator-owned, financed, leased, and customer-supplied accelerators.
      - Keep adjusted EBITDA distinct from GAAP operating profit and cash generation.
      - Treat private-company funding and project investment as financing, not revenue.
  physical_operator_scope:
    disclosure_registry_ref: life/imports/global_data_centers_20260717/physical_operator_disclosure_registry.jsonl
    disclosure_summary_ref: life/imports/global_data_centers_20260717/physical_operator_disclosure_summary.json
    disclosure_registry_as_of: 2026-07-19
    operator_records: 54
    machine_generated_page_registry_operators: [CyrusOne, QTS, NEXTDC, Flexential, Lumen_Technologies, Csquare, CDC_Data_Centres, Switch, atNorth, NorthC, Telehouse, Sabey_Data_Centers, Cologix, CloudHQ, Global_Switch, OVHcloud, Bouygues_Telecom, UltraEdge_SFR_legacy, Verizon, Datacenter_United, Ark_Data_Centres, Orange_Group_and_Orange_Business, Pulsant, KIO_Data_Centers, Kumo_Networks, OPCORE, SoftBank_inherited_IDCF_data_centers, VIRTUS_Data_Centres, DigiCo_Infrastructure_REIT]
    comparison_gate:
      - choose_one_physical_granularity
      - choose_one_lifecycle_date_and_state
      - choose_one_power_denominator
      - choose_one_financial_reporting_boundary
    boundary: >-
      Facility identifiers, physical buildings, campuses, markets, service Regions,
      design capacity, utility service, critical IT load, contracted load and
      utilized load are not interchangeable. The crosswalk validates evidence
      links but deliberately publishes no cross-operator capacity sum or fleet ranking.
  power_cooling_supply_chain_scope:
    disclosure_registry_ref: life/imports/global_data_centers_20260717/power_cooling_supply_chain_registry.jsonl
    disclosure_summary_ref: life/imports/global_data_centers_20260717/power_cooling_supply_chain_summary.json
    disclosure_registry_as_of: 2026-07-18
    company_records: 25
    primary_categories:
      critical_power_and_electrical: 7
      onsite_and_backup_generation: 4
      cooling_and_thermal: 4
      cable_and_connectivity: 2
      utilities_and_generation: 8
    comparison_gate:
      - choose_one_accounting_and_currency_basis
      - choose_one_product_or_utility_value_pool
      - choose_one_commercial_and_delivery_lifecycle
      - require_site_or_segment_allocation_for_data_center_economics
    boundary: >-
      Group revenue, segment revenue, orders, backlog, MOU, service agreement,
      equipment nameplate, utility supply, critical IT load, utilized load and
      billed demand are not interchangeable. The crosswalk preserves these
      boundaries and publishes no cross-company financial or capacity total.
  accelerator_disclosure_scope:
    ledger_ref: life/imports/global_data_centers_20260717/accelerator_disclosure_ledger.jsonl
    summary_ref: life/imports/global_data_centers_20260717/accelerator_disclosure_summary.json
    ledger_as_of: 2026-07-19
    atomic_claim_records: 52
    reviewed_source_records: 30
    comparison_gate:
      - choose_one_accelerator_unit_and_model
      - choose_one_physicality_and_delivery_lifecycle
      - choose_one_ownership_and_site_scope
      - resolve_overlap_before_any_sum
    boundary: >-
      Physical GPU, TPU, accelerator card, delivered chip, H100-equivalent,
      managed hardware, design accommodation and supported architecture are
      different units and states. The ledger keeps every claim non-additive and
      deliberately publishes no cross-company accelerator total.

global_market_baseline:
  - id: global_supply_jll_2026
    metric_type: installed_and_forecast_supply
    source_scope: global_all_data_center_segments
    values:
      supply_2025_gw: 103
      supply_2030_gw: 200
      new_supply_2026_2030_gw_approximate: 100
      five_year_cagr_percent: 14
      tenant_gpu_and_network_fitout_usd_trillion_range: [1, 2]
      real_estate_asset_value_creation_usd_trillion: 1.2
      new_debt_financing_usd_billion_approximate: 870
      total_expenditure_through_2030_usd_trillion_up_to: 3
    interpretation: >-
      The fit-out spend is separate from building shell and real-estate value, so
      the economic exposure extends from chips and networking through electrical,
      cooling, construction, financing, and utilities.
    source:
      publisher: JLL
      title: 2026 Global Data Center Outlook
      date: 2026-01
      url: https://www.jll.com/content/dam/jllcom/en/global/documents/reports/research-reports/26-research-global-data-center-outlook-new.pdf

  - id: global_electricity_iea_2025
    metric_type: electricity_consumption_forecast
    values:
      global_data_center_electricity_2030_twh: 945
      share_of_global_electricity_2030_percent: just_under_3
      cagr_2024_2030_percent_approximate: 15
      accelerated_server_electricity_cagr_percent_approximate: 30
      accelerated_server_share_of_net_load_growth: almost_half
    interpretation: >-
      The bottleneck is not only generation. Transmission, substations,
      transformers, switchgear, UPS, backup generation, cooling, and grid
      interconnection lead times determine how quickly announced compute can run.
    source:
      publisher: International Energy Agency
      title: Energy demand from AI
      date: 2025
      url: https://www.iea.org/reports/energy-and-ai/energy-demand-from-ai

  - id: global_hyperscale_count_synergy_2024
    metric_type: operating_site_count
    values:
      hyperscale_data_centers_end_2024: 1136
      us_share_of_total_hyperscale_capacity_percent: 54
      capacity_doubling_horizon: less_than_four_years
    source:
      publisher: Synergy Research Group
      title: Hyperscale Data Center Count Hits 1,136
      date: 2025-03-19
      url: https://www.srgresearch.com/articles/hyperscale-data-center-count-hits-1136-average-size-increases-us-accounts-for-54-of-total-capacity

