schema_version: 1
status: active_research
updated_at: 2026-07-18
area: FINANCE
secondary_areas:
  - CAREER
  - MIND
title: Global AI data-center landscape
research_question: >-
  Where are the world's data centers, how large are the major AI campuses, how
  many accelerators do they contain, how are they powered and cooled, and which
  companies participate in their supply chains?

scope_and_method:
  location_baseline_ref: life/imports/global_data_centers_20260717/osm_data_center_locations.jsonl
  location_summary_ref: life/imports/global_data_centers_20260717/summary.json
  reproducible_builder_ref: scripts/build_global_data_center_registry.py
  company_financials_ref: life/finance/ai_data_center_supply_chain_financials_202607.yaml
  public_location_records: 4663
  cross_check:
    source: PeeringDB public site
    reported_facilities_on_2026_07_17: 5858
    use_boundary: >-
      Used only as a coverage cross-check. PeeringDB bulk data is not copied into
      this repository because its acceptable-use policy restricts bulk
      redistribution.
  evidence_priority:
    - company_or_operator_primary_source
    - utility_or_regulator_primary_source
    - securities_filing_or_investor_release
    - government_permit_or_public_record
    - reputable_secondary_source_clearly_marked_as_secondary
  disclosure_rules:
    - Never convert campus MW into a GPU count without a disclosed hardware and power model.
    - Never assign a portfolio-level chip count to one campus.
    - Separate operating capacity from announced, contracted, under-development, and aspirational capacity.
    - Preserve whether a power figure means compute capacity, IT load, utility service, or generation capacity.
    - Record exact unknowns as undisclosed rather than filling them with estimates.
    - OSM footprint area is map geometry, not certified gross floor area or IT capacity.
  record_granularity_note: >-
    campus_profiles primarily contains individual campuses, but also preserves
    announced multi-facility programs and regional portfolios when no exact site
    boundary is public. Non-campus records declare record_granularity and must not
    be counted as one physical data center.

global_market_baseline:
  - id: global_supply_jll_2026
    metric_type: installed_and_forecast_supply
    source_scope: global_all_data_center_segments
    values:
      supply_2025_gw: 103
      supply_2030_gw: 200
      new_supply_2026_2030_gw_approximate: 100
      five_year_cagr_percent: 14
      tenant_gpu_and_network_fitout_usd_trillion_range: [1, 2]
      real_estate_asset_value_creation_usd_trillion: 1.2
      new_debt_financing_usd_billion_approximate: 870
      total_expenditure_through_2030_usd_trillion_up_to: 3
    interpretation: >-
      The fit-out spend is separate from building shell and real-estate value, so
      the economic exposure extends from chips and networking through electrical,
      cooling, construction, financing, and utilities.
    source:
      publisher: JLL
      title: 2026 Global Data Center Outlook
      date: 2026-01
      url: https://www.jll.com/content/dam/jllcom/en/global/documents/reports/research-reports/26-research-global-data-center-outlook-new.pdf

  - id: global_electricity_iea_2025
    metric_type: electricity_consumption_forecast
    values:
      global_data_center_electricity_2030_twh: 945
      share_of_global_electricity_2030_percent: just_under_3
      cagr_2024_2030_percent_approximate: 15
      accelerated_server_electricity_cagr_percent_approximate: 30
      accelerated_server_share_of_net_load_growth: almost_half
    interpretation: >-
      The bottleneck is not only generation. Transmission, substations,
      transformers, switchgear, UPS, backup generation, cooling, and grid
      interconnection lead times determine how quickly announced compute can run.
    source:
      publisher: International Energy Agency
      title: Energy demand from AI
      date: 2025
      url: https://www.iea.org/reports/energy-and-ai/energy-demand-from-ai

  - id: global_hyperscale_count_synergy_2024
    metric_type: operating_site_count
    values:
      hyperscale_data_centers_end_2024: 1136
      us_share_of_total_hyperscale_capacity_percent: 54
      capacity_doubling_horizon: less_than_four_years
    source:
      publisher: Synergy Research Group
      title: Hyperscale Data Center Count Hits 1,136
      date: 2025-03-19
      url: https://www.srgresearch.com/articles/hyperscale-data-center-count-hits-1136-average-size-increases-us-accounts-for-54-of-total-capacity

