deep_diagnosis:
  - id: diagnosis_capture_is_no_longer_the_main_constraint
    statement: 기록을 잃는 문제가 완전히 끝난 것은 아니지만, 17,856개 입력과 세션 인덱스가 생긴 현재는 더 많이 저장하는 것보다 정확히 꺼내 판단에 쓰는 능력이 더 중요한 제약이다.
    evidence_refs:
      - life/imports/agent_sessions_20260717/ontology_manifest.yaml
      - life/imports/agent_sessions_20260717/direction_analysis_report.json
    confidence: high

  - id: diagnosis_exploration_strength_can_create_convergence_debt
    statement: 깊고 반복적인 탐색은 Brian의 강점이지만, 장기 세션이 합성·결정·폐기 기준 없이 이어지면 convergence debt와 유지 비용을 만들 수 있다.
    evidence_refs:
      - life/imports/agent_sessions_20260717/direction_analysis_report.json
      - pattern_mechanism_before_trust
    confidence: medium_high
    needs_user_review: true

  - id: diagnosis_evidence_model_is_ahead_of_outcome_evidence
    statement: evidence와 validation을 설계하는 언어는 충분히 성숙했지만, 과거 요청의 실제 성공·실패·재사용 효과는 아직 전수 audit되지 않았다.
    evidence_refs:
      - understanding_completion_requires_fresh_traceable_evidence
      - life/imports/agent_sessions_20260717/combined_analysis.yaml
    confidence: high

  - id: diagnosis_one_kernel_is_valid_but_domain_cycles_differ
    statement: Work와 Life가 같은 증거 원칙을 공유하는 것은 유효하지만, 업무의 contract closure와 삶의 느리고 확률적인 outcome을 같은 속도와 판정 기준으로 강제하면 안 된다.
    evidence_refs:
      - architecture_direction_one_ontology_work_and_life_surfaces
      - life/imports/agent_sessions_20260717/direction_analysis_report.json
    confidence: medium_high
    needs_user_review: true

critical_tensions:
  - id: tension_autonomy_vs_assurance
    false_choice: LLM에 많이 맡기거나 모든 것을 script로 통제하는 양자택일
    synthesis: reasoning은 LLM에 맡기고 permission, provenance, freshness, required closure만 결정적으로 검증한다.
    direction_ref: architecture_direction_llm_judgment_with_deterministic_boundaries

  - id: tension_expansion_vs_convergence
    false_choice: 계속 탐색하거나 너무 일찍 하나로 고정하는 양자택일
    synthesis: 일정 시간은 넓게 탐색하되 synthesis gate에서 keep, merge, reject, test를 명시하고 다음 wave를 연다.

  - id: tension_memory_vs_identity
    false_choice: 모든 기록을 정체성으로 만들거나 아무 해석도 하지 않는 양자택일
    synthesis: raw history, pattern candidate, confirmed principle, current identity를 단계적으로 분리하고 counterevidence와 review date를 둔다.

  - id: tension_work_power_vs_life_balance
    false_choice: CAREER 집중을 줄이거나 삶 전체를 같은 양으로 기록하는 양자택일
    synthesis: 대화량이 아니라 decision importance와 feedback cycle에 따라 각 Area의 최소 관측 수준을 정한다.

  - id: tension_ai_leverage_vs_cognitive_load
    false_choice: AI 출력을 최대화하거나 활용을 제한하는 양자택일
    synthesis: AI는 선택지를 넓히되 Brian에게 전달되는 기본 출력은 핵심 3개, 결정 1개, 다음 행동 1개로 압축한다.

architecture_directions:
  - id: architecture_direction_closed_loop_pilots_before_platform_expansion
    object_type: ArchitectureDirection
    date: '2026-07-17'
    area: MIND
    secondary_areas: [CAREER, BODY, FINANCE]
    project_ref: project_ai_agent
    title: 플랫폼 확장보다 두 개의 폐루프 pilot 우선
    statement: >-
      새 app, DB, service, 범용 UI를 늘리기 전에 한 개의 Work pilot과 한 개의 Life pilot에서
      Memory → State → Decision → Action → Evidence → Feedback → Promotion 루프를 끝까지 검증한다.
    rationale:
      - capture와 architecture 탐색은 이미 충분한 규모에 도달했다.
      - 장기 세션 집중과 미감사 outcome은 consolidation과 feedback 회수가 다음 병목일 가능성을 보여준다.
      - 두 vertical slice는 공통 커널의 실제 재사용성과 도메인별 차이를 동시에 드러낸다.
    implementation_direction:
      - 최근 의미 세션 20개를 표본 audit해 request와 verified outcome의 차이를 측정한다.
      - Work pilot은 requirement-to-evidence closure가 명확한 단일 IP feature로 제한한다.
      - Life pilot은 짧은 feedback cycle과 낮은 비가역성을 가진 BODY 주간 의사결정으로 시작한다.
      - FINANCE는 실제 거래 자동화 없이 thesis-review shadow mode로 병행할 수 있다.
      - 매주 keep, merge, reject, test 결정을 남겨 ontology와 rule 수를 의도적으로 줄인다.
    tradeoffs:
      - 범용 플랫폼 진척은 잠시 느려 보일 수 있다.
      - 작은 pilot 결과가 모든 업무와 삶에 일반화되지 않을 수 있다.
      - 수동 feedback 기록이 초기에는 번거로울 수 있다.
    follow_up_task_refs:
      - task_brian_os_recent_session_outcome_audit
      - task_brian_os_select_two_pilots
      - task_brian_os_define_pilot_scorecard
    source_refs:
      - codex_user_message_019e18d8-5339-7343-85e2-d84d6a5d1b81_001227
      - claude_user_message_fb9fcc45-d9af-4c68-844a-cb142ff66f54_010211
      - codex_user_message_019efb57-5dad-7010-aaf9-02f3b97b45dd_005493
      - codex_user_message_019f0bbf-68b5-7f90-a587-772743e75a62_005673
      - codex_user_message_019f6583-9650-7ef0-99da-ed24b839f571_006471
    status: proposed_for_validation
    confidence: medium_high
    needs_user_review: true

closed_loop_kernel:
  memory_and_meaning_loop:
    flow: RawInput -> SessionContext -> CandidateMeaning -> EvidenceReview -> PromotedObject -> RetrievalTest
    success_condition: 새 질문에서 정확한 원문과 현재 의미를 빠르게 찾고 오래된 해석을 구분한다.
  decision_and_feedback_loop:
    flow: CurrentState -> DecisionQuestion -> Options -> Decision -> Action -> Outcome -> FeedbackRecord -> RuleUpdate
    success_condition: 판단 이유와 실제 결과가 연결되고 다음 유사 결정이 달라진다.
  assurance_loop:
    flow: Intent -> Requirement -> Obligation -> Contract -> Evidence -> Validation -> ClosureOrExplicitBlock
    success_condition: 필요한 항목이 fresh evidence로 닫히거나 사람의 명시적 block/waiver로 남는다.
  synthesis_gate:
    cadence: end_of_significant_session_or_weekly_review
    decisions: [keep, merge, reject, test, archive]
    required_output:
      - 가장 중요한 새 이해 1개
      - 실제로 바뀐 결정 또는 상태 1개
      - 검증되지 않은 가설 1개 이하
      - 다음 bounded action 1개
      - 버리거나 합칠 기록

