pilot_scorecard:
  status: proposed_thresholds_need_baseline
  measures:
    - id: metric_source_retrieval_hit_rate
      question: 표본 질문 20개에서 정확한 source와 current object를 찾을 수 있는가?
      proposed_target: at_least_90_percent
    - id: metric_decision_trace_completeness
      question: 중요한 결정에 state, alternatives, rationale, action, evidence가 연결되는가?
      proposed_target: at_least_80_percent
    - id: metric_feedback_coverage
      question: 실행한 pilot action에 실제 outcome 또는 explicit pending이 남는가?
      proposed_target: at_least_70_percent
    - id: metric_critical_stale_state
      question: 의사결정에 사용한 critical state가 오래되었는데 표시되지 않은 경우가 있는가?
      proposed_target: zero
    - id: metric_evidence_freshness
      question: Work pilot closure의 required evidence가 현재 implementation version과 일치하는가?
      proposed_target: 100_percent_for_required_contracts
    - id: metric_weekly_maintenance_cost
      question: Life pilot의 수동 정리 비용이 지속 가능한가?
      proposed_target: no_more_than_30_minutes_per_week
    - id: metric_cognitive_load_change
      question: 중요한 다음 행동을 정하는 주관적 부담이 baseline보다 줄었는가?
      proposed_target: improve_by_at_least_one_on_five_point_scale
    - id: metric_reuse_event
      question: 과거 decision, evidence, lesson이 실제 새 판단을 한 번 이상 바꾸었는가?
      proposed_target: at_least_one_verified_reuse_per_pilot

decision_gates:
  - gate: day_14_start
    pass_when: 두 pilot, baseline, success/stop criteria, owner와 review cadence가 명확하다.
    fail_action: 범위를 하나의 pilot로 줄인다.
  - gate: day_45_loop_closure
    pass_when: 두 pilot 모두 decision-action-feedback 한 주기를 실제 evidence로 닫았다.
    fail_action: 새 기능을 중단하고 누락 링크와 기록 부담의 root cause만 수정한다.
  - gate: day_75_value
    pass_when: retrieval, trace, feedback, maintenance 지표가 baseline보다 실질적으로 개선됐다.
    fail_action: 사용되지 않은 schema와 automation을 제거하고 수동 최소 루프로 축소한다.
  - gate: day_90_scale
    pass_when: 두 도메인에서 재사용 사건이 있고 유지 비용이 허용 범위다.
