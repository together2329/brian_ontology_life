title: 파일과 사진 저장 및 검색 원칙
summary: >
  최정윤 폴더의 이미지 자료 2개에서 추출한 파일/사진 저장 규칙.
  핵심은 저장 시점에 미래 검색을 설계하는 것이다. 파일 내부 제목,
  작성일, 파일명, 폴더 트리, 이벤트 키워드가 서로 맞아야 10년 뒤에도
  몇 초 안에 자료를 찾을 수 있다.

