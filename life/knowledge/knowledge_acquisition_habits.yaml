  - id: concept_embodied_learning_habit
    display_name: 체화된 학습 습관
    definition: 학습은 암기나 이해가 아니라 지속적인 실제 행동으로 몸에 붙은 습관이라는 관점.
    area_refs: [MIND, CAREER]
    evidence_refs:
      - source_user_pasted_knowledge_acquisition_habits_20260626
  - id: concept_knowledge_management_person
    display_name: 지식경영인
    definition: 필요한 정보를 혼자만의 지식이 아니라 사람, 조직, 도서관, 온라인, 대화, 기록 시스템을 통해 빠르게 찾아내고 실행하는 사람.
    area_refs: [MIND, CAREER, RELATION]
    evidence_refs:
      - source_user_pasted_knowledge_acquisition_habits_20260626
  - id: concept_network_as_personal_system
    display_name: 인맥을 개인 시스템으로 만든다
    definition: 단순히 사람을 많이 아는 것이 아니라, 필요한 지식과 단서를 최소 비용으로 얻을 수 있는 체계화된 정보 네트워크를 만드는 것.
    area_refs: [RELATION, CAREER, MIND]
    evidence_refs:
      - source_user_pasted_knowledge_acquisition_habits_20260626

operating_principles:
  - id: principle_first_know_what_you_do_not_know
    title: 내가 무엇을 모르는지 먼저 안다
    rule: 가장 위험한 상태는 모르는 것이 아니라, 내가 무엇을 모르는지 모르는 상태다.
    practice:
      - 질문 전에 모르는 것을 한 문장으로 적는다.
      - 그 답을 알 사람/알 것 같은 사람/아는 사람을 아는 사람을 종이에 나열한다.
      - 정리된 결과만 디지털에 저장한다.
    area_refs: [MIND, CAREER]
    confidence: high
  - id: principle_ask_people_directly
    title: 붙잡고 물어본다
    rule: 정보는 주변 사람에게서 빠르게 나온다. 쪽팔림보다 질문하지 않아 생기는 장기 손실이 크다.
    practice:
      - 적어도 한 명에게 직접 질문한다.
      - 답을 모르면 다른 정보원을 알려달라고 요청한다.
      - 나이, 직위, 전문성에 대한 선입견 없이 단서를 뽑는다.
    area_refs: [RELATION, MIND, CAREER]
    confidence: high
  - id: principle_call_before_giving_up
    title: 전화를 건다
    rule: 모르는 사람이나 기관에도 전화해서 자신을 소개하고 상태와 질문을 설명한다.
    practice:
      - 관련 기관/사람 전화번호를 찾는다.
      - 최소 13개 번호에 전화해 단서 하나를 얻는 것을 기준으로 삼는다.
      - 거절당하면 다른 번호로 넘어간다.
    area_refs: [CAREER, RELATION]
    confidence: high
  - id: principle_use_organizations_as_tools
    title: 조직과 제도를 도구로 쓴다
    rule: 현대 사회의 일은 조직과 제도, 시스템의 상호작용으로 움직이므로 조직 기능을 이용하면 개인의 효율이 증폭된다.
    practice:
      - 필요한 결과와 관련된 조직을 3개 이상 찾는다.
      - 각 조직이 연결된 다른 조직을 추적한다.
      - 조직의 절차, 담당자, 신청/문의 채널을 기록한다.
    area_refs: [CAREER, MIND]
    confidence: high
  - id: principle_use_libraries_as_information_networks
    title: 도서관을 정보 네트워크로 쓴다
    rule: 도서관은 책만 있는 곳이 아니라 출처, 생성 과정, 연계 인물, 전문가 정보가 모인 정보망이다.
    practice:
      - 책 제목뿐 아니라 저자, 참고문헌, 기관, 관련 전문가를 추출한다.
      - 사서나 담당자에게 자료 접근 방법을 묻는다.
      - 텍스트 바깥의 사람과 조직까지 정보원으로 본다.
    area_refs: [MIND, CAREER]
    confidence: high
  - id: principle_turn_conversation_into_data
    title: 대화를 데이터로 만든다
    rule: 만나는 모든 사람과의 대화는 정보 수집 기회이며, 복기를 통해 화술과 정보 감도가 개선된다.
    practice:
      - 안부 인사 사이에 내 목적과 관련된 질문이나 뉘앙스를 넣는다.
      - 자기 전에 백지에 대화 내용을 복기한다.
      - 알아낸 정보, 상대의 상태, 반응, 내 표현, 개선점을 적는다.
    area_refs: [RELATION, MIND, CAREER]
    confidence: high
  - id: principle_ask_online_with_thick_skin
    title: 온라인에서도 철판 깔고 묻는다
    rule: 온라인에는 의외로 고수가 많고, 질문해서 잃는 것은 거의 없다.
    practice:
      - 질문을 명확히 적는다.
      - 내가 시도한 것과 막힌 지점을 같이 적는다.
      - 답이 없으면 질문을 개선해 다시 묻는다.
    area_refs: [MIND, CAREER]
    confidence: high
  - id: principle_build_personal_information_network
    title: 자신만을 위한 정보 인맥을 체계화한다
    rule: 위 습관들이 궤도에 오르면 개인은 하나의 시스템/조직처럼 원하는 정보를 최소 비용으로 얻을 수 있다.
    practice:
      - 사람/기관/온라인 커뮤니티/도서관/전문가를 주제별로 기록한다.
      - 누가 무엇을 알고 누구와 연결되는지 업데이트한다.
      - 도움을 받은 뒤 감사와 피드백을 남겨 관계를 유지한다.
    area_refs: [RELATION, CAREER, MIND]
    confidence: high

routine_templates:
  - id: routine_21_day_conversation_review
    title: 21일 대화 복기 훈련
    cadence: daily_for_21_days
    purpose: 말하기, 질문하기, 정보 추출 능력을 실제 대화와 복기로 체화한다.
    steps:
      - 오늘 만난 사람과 일대일 대화를 최소 1번 한다.
      - 내 목적과 관련된 질문이나 뉘앙스를 대화에 넣는다.
      - 자기 전에 백지에 대화를 복기한다.
      - 알아낸 정보, 상대 반응, 내 표현, 개선점을 기록한다.
      - 다음 날 한 가지 표현을 개선해 다시 시도한다.
    success_metric:
      - 21일 연속 기록
      - 질문 회피 감소
      - 대화 후 얻은 단서 수 증가
  - id: routine_information_source_map
    title: 모르는 것 정보원 지도 만들기
    cadence: per_question
    purpose: 모르는 것을 사람/조직/자료/온라인 정보원으로 확장한다.
    steps:
      - 내가 모르는 것을 한 문장으로 쓴다.
      - 그 답을 아는 사람을 적는다.
      - 알 것 같은 사람을 적는다.
      - 아는 사람을 아는 사람을 적는다.
      - 관련 조직과 도서관/자료원을 적는다.
      - 온라인 질문 후보지를 적는다.
      - 접촉 결과와 다음 단서를 업데이트한다.
  - id: routine_13_call_probe
    title: 13개 전화 단서 찾기
    cadence: as_needed
    purpose: 전화 회피를 깨고 실제 기관/사람 접촉으로 단서를 얻는다.
    steps:
      - 관련 전화번호 후보를 13개 수집한다.
      - 20초 자기소개와 질문을 준비한다.
      - 전화하고 답/거절/다음 단서를 기록한다.
      - 거절당하면 감정 평가 없이 다음 번호로 넘어간다.
      - 최소 하나의 다음 정보원을 얻을 때까지 반복한다.

brian_adaptation:
  use_cases:
    - Milano 업무에서 모르는 tool/report/owner를 찾을 때 사람/조직/전화/온라인 질문 지도를 만든다.
    - AI agent/Codex skill 학습에서 문서만 읽지 말고 실제 질문, 테스트, 복기로 체화한다.
    - 투자/생활 행정에서도 기관 전화와 담당자 연결을 회피하지 않는다.
  lightweight_default:
    - 모르는 것 1문장
    - 물어볼 사람 3명
    - 관련 조직 3개
    - 온라인 질문 후보 1곳
    - 오늘 실제 접촉 1회

assistant_usage:
  - Brian이 막힌 문제를 말하면 먼저 "무엇을 모르는지"를 한 문장으로 정리한다.
  - 정보원 후보를 사람/조직/도서관/온라인/전화로 나눠 제안한다.
  - 질문 템플릿, 전화 스크립트, 대화 복기 양식을 만들어 줄 수 있다.
  - 단순 지식 요약보다 실제 접촉 action을 우선 제안한다.

open_questions:
  - id: oq_original_author_source_unknown
    question: 원문 작성자/출처를 별도로 기록할지 여부.
    status: source_unknown_from_current_message
  - id: oq_apply_to_daily_briefing
    question: 평일 아침 브리핑에 "오늘 물어볼 사람/기관 1개" 항목을 추가할지 여부.
    status: needs_user_review

confidence: high
needs_user_review: false
