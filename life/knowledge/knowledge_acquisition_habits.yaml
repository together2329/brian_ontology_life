title: 지식 습득 효율을 높이는 기본 습관
summary: >
  사용자가 붙여넣은 "20대이하 청년과 소년들에게" 글을 Brian의
  life ontology에서 재사용할 수 있게 정리한 지식 파일. 핵심은
  지식을 책상 위 이해로 끝내지 않고, 질문, 전화, 조직 활용, 도서관,
  대화, 온라인 질문, 인맥 체계화라는 행동 습관으로 체화하는 것이다.

source_records:
  - id: source_user_pasted_knowledge_acquisition_habits_20260626
    title: 20대이하 청년과 소년들에게 - 지식습득효율을 늘리기 위한 기본적 습관
    source_type: user_pasted_text
    captured_at: 2026-06-26
    parse_status: summarized
    area_refs:
      - MIND
      - CAREER
      - RELATION
    summary: >
      사회에서 무언가를 빠르게 알아내고 실행하기 위한 기반 덕목은
      암기나 이해가 아니라 반복 행동 습관이라는 글. 모르는 것을 알고,
      사람에게 묻고, 전화하고, 조직/도서관/대화/온라인 질문을 이용해
      정보원을 확장하며, 최종적으로 자신만의 인맥 시스템을 만든다는 내용.
    raw_text_preservation_note: >
      원문은 사용자 메시지로 제공됨. 이 YAML에는 verbatim 전문이 아니라
      ontology 사용을 위한 구조화 요약과 실행 루틴을 저장함.

