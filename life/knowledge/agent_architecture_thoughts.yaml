  - id: thought_thread_20260625_obsidian_okf_readable_management
    object_type: ThoughtThread
    date: 2026-06-25
    area: MIND
    secondary_areas:
      - CAREER
    topic: Managing BRIAN_ONTOLOGY_AGENT on Obsidian via OKF for readability
    summary:
      - Brian wants to manage the BRIAN_ONTOLOGY_AGENT system on top of Obsidian using Google Open Knowledge Format (OKF).
      - YAML is fine structurally, but its readability and viewing experience is hard for Brian (가독성 pain point).
      - Target format is an OKF-style file = YAML frontmatter on top (structured, formatter-written) plus a readable Markdown body below.
      - The Markdown body should let Brian follow a record's history easily.
      - Graph connections should come from Obsidian backlinks rather than only id refs in YAML.
      - Brian wants to use Obsidian skills, Obsidian Bases, and Obsidian tasks well as the human-facing view layer.
      - Brian also wants to actively use the Obsidian CLI and similar tooling, not only the GUI.
      - The motivation is true trackability - Obsidian CLI plus git (.git) version control over the OKF/Markdown files.
      - The current YAML ontology is already git-tracked; Brian wants to keep that version-control trackability in the Obsidian/OKF setup.
    conversation_flow:
      - Brian restated the OKF-on-Obsidian direction, now driven explicitly by his own readability need, not only interoperability.
      - The canonical ontology can stay structured while OKF gives a portable, human-readable file shape.
      - Frontmatter holds the structured layer; the Markdown body holds the readable narrative and history.
      - Obsidian Bases provide filterable table/card views over frontmatter properties (task lists, etc.).
      - Obsidian backlinks provide the graph view, complementing the id refs in the ontology.
    open_questions:
      - Whether OKF becomes the canonical store or a generated readable view layer over the current YAML ontology.
      - How to keep YAML frontmatter and the Markdown history body in sync without losing raw data.
      - Which records become Bases (tasks, people, issues) versus plain notes.
    related_concept_refs:
      - concept_okf_open_knowledge_format
      - concept_obsidian_bases
      - concept_llm_wiki
      - concept_ontology_first_agent_memory
      - concept_interactive_html_knowledge_viewer
    related_project_refs:
      - project_ai_agent
    related_task_refs:
      - task_ai_agent_okf_export_layer
      - task_ai_agent_codex_ontology_development_plugin
    source_refs:
      - source_knowledge_conversation_20260625_obsidian_okf_readable_management
      - source_knowledge_conversation_20260625_obsidian_cli_git_trackability
      - source_knowledge_conversation_20260625_decision_keep_yaml_agent_query_over_obsidian
    resolution:
      date: 2026-06-25
      decision: Stay with YAML as the canonical store; set aside the Obsidian/OKF management direction for now.
      reason: After the Milano-task Obsidian+OKF POC, Brian found that querying the agent to view and navigate the ontology is much better for him than browsing Obsidian. Making Obsidian more than a read-only view would need a two-way sync, and the readability gain did not justify it.
      kept: YAML canonical store, edited by Codex/Claude, accessed mainly by asking the agent; git history for trackability.
      set_aside: OKF-as-canonical, Obsidian as the management surface, Obsidian CLI workflow, and two-way sync.
      poc_note: Built poc/obsidian_okf_milano to evaluate the approach, then removed after the decision; recoverable from git history.
      status: closed
    confidence: high
    needs_user_review: false

