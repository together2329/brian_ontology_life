  - id: architecture_direction_20260619_advanced_operational_ontology
    object_type: ArchitectureDirection
    date: 2026-06-19
    area: CAREER
    secondary_areas:
      - MIND
    project_ref: project_ai_agent
    title: Advanced operational ontology for Brian Ontology Agent
    statement: "Upgrade Brian Ontology Agent from basic object/link ontology toward an operational ontology that separates semantic nouns, kinetic verbs, and dynamic state/feedback."
    rationale:
      - Palantir's framing makes clear why object/link modeling alone is not enough for decision support.
      - Brian's current ontology already stores many dynamic fields such as status, confidence, needs_user_review, blockers, evidence_refs, and source_refs.
      - Brian's current task records already imply kinetic actions, but actions/functions/writeback are not yet separated as a first-class ontology layer.
      - Applying this model immediately can make Milano and AI-agent work records more useful for decisions, not only recall.
    implementation_direction:
      semantic_layer:
        - stable object types and links
        - project/task/component/subsystem/IP/interface/requirement/issue/evidence/decision concepts
      kinetic_layer:
        - action records
        - function or workflow definitions
        - validation runs
        - config changes
        - note promotion and ontology edit operations
      dynamic_layer:
        - current task/project state
        - owner and review state
        - confidence and needs_user_review
        - pass/fail evidence
        - feedback from completed work
        - scenario or what-if state when available
      first_slice: Model one live Milano workflow as Decision -> Action -> Evidence -> Feedback, starting with either NVMe VIP setup or SDC/GEN7 PHY review.
    tradeoffs:
      - The first implementation should stay YAML/local and should not require a service or graph database.
      - Do not over-schema every note; promote stable patterns from real work sessions and solution cases.
      - Keep raw source records intact so future schema changes can reinterpret old events.
    follow_up_task_refs:
      - task_ai_agent_codex_ontology_development_plugin
      - task_ai_agent_solution_rag_ontology_builder
      - task_ai_agent_codex_seminar_prepare
