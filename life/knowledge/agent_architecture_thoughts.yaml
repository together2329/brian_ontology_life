  - id: source_knowledge_external_reference_20260619_codex_complete_guide_video
    source_type: chat_and_external_video
    original_date: 2026-06-19
    imported_at: 2026-06-19
    parse_status: parsed
    raw_text: "Brian shared a Codex complete-guide YouTube video and said the content is very good."
    external_reference:
      platform: YouTube
      url: https://youtu.be/Z3z93bKMh_I?si=M_XLnSjD4BlLWdTO
      observed_title: "Codex 완벽 가이드 2026: 지금은 코덱스가 최강인 것 같네요."
      observed_at: 2026-06-19
    interpreted_transfer:
      source_role: high_quality_external_codex_usage_reference
      seminar_section: Codex setup and operating surfaces
      principle: Use strong external Codex guide material for basic onboarding, while Brian's seminar adds company-specific RTL/IP workflow, ontology/OKF, evaluation, monitoring, and SoC Knowledge Graph content.
    extracted_content_summary:
      - The video starts by explaining why Codex is gaining attention in comparison with Claude Code, then introduces recent OpenAI model/image-generation context as a reason to revisit Codex CLI.
      - The setup section shows launching Codex CLI and walks through permission modes, including default, auto-review, and full-access style operation.
      - The daily-use section covers statusline/status, prompt queueing, response copy, context clearing, prompt history search, prompt draft handling, session resume, and session fork.
      - The control section covers model selection, reasoning levels, fast mode, Plan mode, shell/IDE integration, review presets, and compacting long sessions.
      - The review section is especially useful for Brian's seminar because it connects local uncommitted review, branch/commit review, custom review instruction, and GitHub PR review.
      - The strongest seminar reuse points are Plan mode, review workflow, context hygiene, session continuity, visible resource/status monitoring, and practical command-level onboarding.
    brian_extraction_notes:
      - Use this video as a pre-watch/reference for Codex command basics.
      - Extract screenshots or examples later only if allowed and needed; otherwise recreate Brian's own examples using local demo material.
      - Do not let this replace Brian's differentiated story: ontology-backed RTL/IP workflows, OKF/Obsidian/HTML views, evaluation/monitoring, and SoC Knowledge Graph assets.
      - Use the video's chapter order as a practical setup/onboarding skeleton, then insert Brian's operating-pattern and hardware-specific layers after the command basics.
    related_task_ref: task_ai_agent_codex_seminar_prepare
