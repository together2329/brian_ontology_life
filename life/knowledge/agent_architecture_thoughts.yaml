    object_type: ArchitectureDirection
    date: 2026-06-15
    area: CAREER
    secondary_areas:
      - MIND
    project_ref: project_ai_agent
    title: Ontology-first memory with OKF as generated export view
    statement: Keep Brian Ontology Agent's canonical memory as structured ontology YAML and later generate OKF-compatible markdown as a read-only export layer.
    rationale:
      - The current YAML ontology already captures stable IDs, object types, task state, source records, evidence refs, and semantic links.
      - OKF export is useful for interoperability with LLM Wiki-like tools, but it is not the source of truth.
      - Ontology quality determines whether the personal agent can answer, continue, and recommend well.
    implementation_direction:
      canonical_store: life/**/*.yaml plus derived jsonl indexes
      future_export: okf/**/*.md generated by tools/export_okf.py
      sync_policy: one_way_read_only_export_initially
    tradeoffs:
      - YAML ontology is less portable than OKF markdown but better for precise structured queries.
      - OKF markdown is easier for external agents and humans to browse but weaker as the canonical state model.
      - Bidirectional sync should be avoided initially because it can create source-of-truth conflicts.
    follow_up_task_refs:
