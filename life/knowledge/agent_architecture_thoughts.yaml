architecture_directions:
  - id: architecture_direction_20260615_ontology_first_okf_export
    object_type: ArchitectureDirection
    date: 2026-06-15
    area: CAREER
    secondary_areas:
      - MIND
    project_ref: project_ai_agent
    title: Ontology-first memory with OKF as generated export view
    statement: Keep Brian Ontology Agent's canonical memory as structured ontology YAML and later generate OKF-compatible markdown as a read-only export layer.
    rationale:
      - The current YAML ontology already captures stable IDs, object types, task state, source records, evidence refs, and semantic links.
      - OKF export is useful for interoperability with LLM Wiki-like tools, but it is not the source of truth.
      - Ontology quality determines whether the personal agent can answer, continue, and recommend well.
    implementation_direction:
      canonical_store: life/**/*.yaml plus derived jsonl indexes
      future_export: okf/**/*.md generated by tools/export_okf.py
      sync_policy: one_way_read_only_export_initially
    tradeoffs:
      - YAML ontology is less portable than OKF markdown but better for precise structured queries.
      - OKF markdown is easier for external agents and humans to browse but weaker as the canonical state model.
      - Bidirectional sync should be avoided initially because it can create source-of-truth conflicts.
    follow_up_task_refs:
      - task_ai_agent_okf_export_layer
    source_refs:
      - source_knowledge_conversation_20260615_okf_export_easy
      - source_knowledge_conversation_20260615_ontology_more_important
    status: active_direction
    confidence: high
    needs_user_review: false
  - id: architecture_direction_20260616_agentic_retrieval_substrate
    object_type: ArchitectureDirection
    date: 2026-06-16
    area: CAREER
    secondary_areas:
      - MIND
    project_ref: project_ai_agent
    title: Local ontology-first agentic retrieval substrate
    statement: Treat Brian Ontology Agent's local YAML ontology and day_graph traversal as the retrieval substrate for a personal Agentic RAG / lightweight GraphRAG system.
    rationale:
      - The ontology already holds source records, stable object IDs, dates, areas, tasks, meals, workouts, concepts, people, and semantic refs.
      - Day graph traversal now retrieves connected current objects across BODY, CAREER, and MIND for a date.
      - This gives Brian a grounded personal memory layer before adding cloud tools, vector search, or external export formats.
    implementation_direction:
      canonical_store: life/**/*.yaml plus imported jsonl indexes
      current_retrieval: tools/query_life.py daily day_graph traversal
      next_retrieval_layer: question-specific retrieval planner over date, area, entity, task, concept, and source refs
      optional_future_retrieval: vector search for fuzzy recall over raw imported records
      future_tool_surface: MCP tool and OKF export as generated views over the canonical ontology
      answer_policy: include source_ref/evidence_ref when answers depend on recorded facts
    tradeoffs:
      - Local YAML is transparent and git-reviewable, but query planning must be coded explicitly.
      - Graph traversal gives precise linked context, but fuzzy memory may still need vector search later.
      - Cloud Agentic RAG products are more scalable, but the local ontology better matches Brian's privacy and personal memory needs right now.
    follow_up_task_refs:
      - task_ai_agent_agentic_retrieval_planner
      - task_ai_agent_okf_export_layer
    source_refs:
      - source_knowledge_conversation_20260616_agentic_rag_similarity_question
      - source_knowledge_conversation_20260616_agentic_rag_mapping_answer
      - source_knowledge_conversation_20260616_record_agentic_rag_flow
    status: active_direction
    confidence: high
    needs_user_review: false
  - id: architecture_direction_20260617_soc_on_ontology_layer
    object_type: ArchitectureDirection
    date: 2026-06-17
    area: CAREER
    secondary_areas:
      - MIND
    project_ref: project_ai_agent
    title: SoC-level hardware workflow on top of ontology
    statement: "Build the hardware IP agent toward a SoC-on-ontology architecture: ontology is the semantic substrate, and SoC-level workflow/reasoning is the layer above it."
    rationale:
      - Hardware design work becomes valuable when the agent understands relationships across SoC, subsystem, IP block, interface, requirement, implementation, verification, evidence, owner, and decision objects.
      - Subsystem-level ontology is a necessary intermediate step, but the broader destination is SoC-level reasoning and workflow support.
      - A SoC-on-ontology demo can show why this is more powerful than a TODO tracker, file search tool, or fixed-script planner.
    implementation_direction:
      ontology_substrate:
        - SoC
        - subsystem
        - IP block
        - interface
        - clock/reset/power domain
        - requirement
        - integration constraint
        - RTL artifact
        - verification case
        - evidence
        - owner
        - decision
      reasoning_layer:
        - trace SoC intent to subsystem/IP implementation work
        - find ownership and evidence gaps
        - explain why a design change is needed
        - connect lint/simulation/synthesis evidence back to requirements
        - prepare demoable workflow slices for RTL/IP engineers
      first_slice_candidate: Model one concrete path from SoC requirement to subsystem/IP/interface object, implementation task, verification evidence, owner, and current status.
    tradeoffs:
      - SoC-level ontology gives stronger reasoning, but the first slice must stay narrow enough to demo reliably.
      - Too much schema upfront can slow implementation, so the model should grow from concrete Milano/OAG examples.
      - The agent should keep ontology as semantic truth and use tools/scripts as execution aids, not as the core model.
    follow_up_task_refs:
      - task_ai_agent_codex_ontology_development_plugin
      - task_ai_agent_codex_seminar_prepare
      - task_ai_agent_company_codex_rollout_support
    source_refs:
      - source_knowledge_conversation_20260617_soc_on_ontology_direction
    status: active_direction
    confidence: high
    needs_user_review: false

