    title: Foundry/AIP/Gotham boundary for SoC ontology work
    statement: "Build Brian's SoC ontology platform as a Foundry-like local data and ontology substrate plus AIP-like Codex agents first; defer Gotham-like cockpit UX until repeated operational slices prove the needed status, risk, owner, and next-action views."
    rationale:
      - Foundry-like ontology work is foundational because SoC debug/signoff views need stable objects, links, current state, and evidence.
      - AIP-like agent workflows become useful as soon as tasks, issues, evidence, decisions, and actions are queryable.
      - Gotham-like UX is valuable for daily operations, but it should be a projection over the ontology rather than a separate source of truth.
      - SoC development has a natural operational cockpit shape: regression fail triage, SDC/timing status, VIP setup validation, SFR/handler investigation, subsystem blockers, owners, and signoff evidence.
    implementation_direction:
      phase_1_foundry_like_base:
        - keep YAML ontology as canonical source
        - link RTL/spec/filelist/SDC/log/report/task/issue/evidence records
        - model semantic objects and links first enough for useful retrieval
      phase_2_aip_like_agent_layer:
        - use Codex and Solution RAG to query, summarize, validate, and propose next actions
        - model kinetic actions and feedback records for live Milano work
        - attach evidence and confidence to agent outputs
      phase_3_gotham_like_soc_cockpit:
        - build status boards only after multiple live workflows share common state fields
        - show blocker/risk/owner/evidence/next-action views for Milano and future SoC work
        - keep cockpit views generated from ontology records, not manually maintained
      apollo_like_future_layer:
        - package repeatable workflows as skills/plugins only when the local loop is stable
        - add validation/monitoring around repeated execution
    first_slice_candidates:
