  - id: architecture_direction_20260620_cognitive_load_aware_assistant_output
    object_type: ArchitectureDirection
    date: 2026-06-20
    area: CAREER
    secondary_areas:
      - MIND
    project_ref: project_ai_agent
    title: Cognitive-load-aware assistant output protocol
    statement: "Design Brian Ontology Agent to reduce cognitive load: provide the smallest useful answer for the current decision, store durable structure in ontology, and keep optional detail in an archive layer."
    rationale:
      - AI can generate more explanation, alternatives, and examples than Brian can use in one sitting.
      - Excessive output can reduce memory, execution, and energy even when the content is correct.
      - Ontology-first memory allows the assistant to preserve detail without forcing all detail into the immediate answer.
      - This response discipline aligns with the operational decision loop: output should help Brian decide, act, or save durable knowledge.
    default_protocol:
      one_liner: one sentence conclusion
      mental_model: compact memorable structure
      key_points: maximum 3 unless Brian asks for more
      action: one concrete next action
      archive: optional detail, citations, examples, or ontology records
    triage_policy:
      now: answer content needed for the current decision or task
      save: concept, relation, decision, action, evidence, or rule worth preserving
      archive: useful background that should not dominate the main answer
      discard: related but low-value expansion
    implementation_direction:
      - Add response templates for concept questions, decision questions, and ontology-save requests.
      - Use long-form output only when Brian asks for deep research, implementation, seminar material, or a generated artifact.
      - When saving a large concept, store source/distillation in ontology and return a compact confirmation.
      - In Codex seminar material, explain this as the reason ontology is useful: it converts AI output into memory/action, not just more text.
    follow_up_task_refs:
      - task_ai_agent_codex_ontology_development_plugin
      - task_ai_agent_codex_seminar_prepare
      - task_ai_agent_solution_rag_ontology_builder
    source_refs:
      - source_knowledge_conversation_20260620_ai_information_overload_cognitive_bandwidth
    status: active_direction
    confidence: high
    needs_user_review: false

