    object_type: Understanding
    date: 2026-06-20
    area: MIND
    secondary_areas:
      - CAREER
    statement: "The practical bottleneck in modern AI use is often not information scarcity or model capability, but human cognitive bandwidth: AI output must be filtered into a small decision/action/memory shape."
    brian_wording_ko: "AI는 정보를 쏟아내고, 온톨로지는 그것을 소화 가능한 지식으로 바꾼다."
    implications:
