  - id: thought_thread_20260620_ai_information_overload_and_ontology_digest
    object_type: ThoughtThread
    date: 2026-06-20
    area: MIND
    secondary_areas:
      - CAREER
    topic: AI information overload and ontology as digestion layer
    summary:
      - Brian identified a modern AI usage bottleneck: information is no longer scarce, but human attention, memory, judgment, and execution bandwidth are scarce.
      - The failure mode is AI over-output: too much explanation leads to weak digestion, low retention, poor execution, and fatigue.
      - The useful assistant should filter and stage information instead of maximizing completeness in every answer.
      - Ontology becomes the digestion layer: it turns AI output into Concepts, Relations, Actions, Evidence, Decisions, and Archive material.
      - Brian liked the phrase that AI pours out information and ontology converts it into digestible knowledge.
    core_model:
      one_liner_ko: "AI 시대의 병목은 정보 생산이 아니라 정보 소화다."
      mental_model:
        - AI is an information generation engine.
        - Human attention and memory are the bottleneck.
        - Ontology is the digestion layer that turns output into usable knowledge, decisions, and actions.
      overload_chain:
        - AI says too much.
        - Brian cannot digest all of it.
        - The material is not remembered.
        - It does not become execution.
        - The user becomes tired.
      output_triage:
        now: current decision or action support
        save: durable Concept, Relation, Action, Decision, or Evidence
        archive: background detail to keep out of the main answer
        discard: low-value expansion
    preferred_answer_shape:
      - One-liner
      - Mental Model
      - 3 Key Points
      - Action
      - Archive
    assistant_design_principles:
      - Default to the smallest useful answer when Brian is exploring or deciding.
      - Use "core 3 + next action 1" unless Brian asks for depth, implementation, or a full artifact.
      - Separate answer content into now/save/archive/discard instead of giving every related idea equal weight.
      - Treat verbosity as a cost when the user's current bottleneck is attention or energy.
      - Preserve detailed material in ontology/archive when it is useful, but keep the working answer digestible.
    seminar_use:
      - This is a strong explanation for why ontology matters in the AI era.
      - LLM Wiki explains, but ontology filters, structures, remembers, and connects to action.
      - A personal AI assistant should reduce cognitive load, not behave like a high-volume search result generator.
    related_concept_refs:
      - concept_cognitive_load_aware_ai_output
      - concept_ontology_first_agent_memory
