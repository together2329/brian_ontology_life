    source_type: web_research
    original_date: 2026-06-20
    imported_at: 2026-06-20
    parse_status: parsed
    raw_text: "앤트로픽의 실험결과. 전문가가 AI 더 잘 쓰더라 / 웹 검색 좀 / 이거 잘 정리해줘 / node !"
    interpreted_direction:
      - Brian shared an Anthropic finding that experts/experienced people use AI more effectively, then asked to research it, summarize it cleanly, and store it as an ontology node.
    study_reference:
      publisher: Anthropic
      title: How AI Is Transforming Work at Anthropic
      observed_published_at: 2025-08
      methodology:
        - surveyed 132 engineers and researchers (August 2025)
        - 53 in-depth interviews
        - analysis of ~200,000 Claude Code transcripts (February-August 2025)
      verification_status: web_fetched_2026_06_20_primary_article_plus_korean_translation
    key_findings:
      - AI does not make expertise worthless; it makes it more valuable because success comes from understanding the problem, and AI rewards that understanding with more leverage.
      - Experienced users salvage troubled agent sessions by steering, while novices abandon them (reported roughly 3-4x more often), so steering/recovery is a core value of expertise.
      - Paradox of supervision -- deep domain knowledge makes humans better at validating and correcting AI output, so skill atrophy is itself a risk to safe AI use.
      - The study does not directly quantify novice-vs-expert productivity gains; its emphasis is on steering and supervision, and it warns that future juniors may not grow skills if they blindly accept model output.
    distilled_claim_ko: "전문가가 AI를 더 잘 쓰는 건 맞지만, 이유는 속도가 아니라 방향을 잡고 결과를 검증하는 판단력 때문이다."
