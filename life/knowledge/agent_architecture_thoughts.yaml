  - id: thought_thread_20260618_codex_seminar_ontology_demo_stack
    object_type: ThoughtThread
    date: 2026-06-18
    area: MIND
    secondary_areas:
      - CAREER
    topic: Codex seminar as ontology/OKF/evaluation demo stack
    summary:
      - Brian reframed the Codex seminar as a multi-session enablement and asset-capture program rather than a single setup talk.
      - The seminar should show Codex setup and usage, but also why precise agent behavior needs rules, hooks, skills, loops, and validation.
      - The knowledge layer should demonstrate LLM Wiki, OKF, ontology, Obsidian graph/Bases, and interactive HTML as connected views over the same work.
      - The engineering layer should use concrete RTL/IP workflows such as SDC cleanup, lint/simulation, UVM/Icarus/Verilator, waveform/MCP, and OAG-style evidence tracking.
      - The management layer should explain evaluation and monitoring: reach quality threshold first, then reduce resource cost to reach the same or better result.
      - The content is large enough to be treated as a 10-12 one-hour seminar series, with 15-18 one-hour sessions if full reusable assets are produced.
      - Brian added a Claude PPT-making reference video as a transferable example for a Codex-based document/deck generation workflow.
      - Brian added another Claude PPT video that demonstrates reference-design-guided generation using a design taken from a website.
      - Brian wants to teach common_ai_agent and ontology_ip_agent know-how as workflow construction methods.
      - Brian identified the central method as refining one small real task until it works, then distilling that workflow into a reusable skill.
      - Brian also identified handoff skills, skill-making skills, and conversation-driven failure learning as patterns for scaling agent workflows.
    conversation_flow:
      - Brian first listed Codex seminar topics from setup through LLM/RAG trends and agent-control primitives.
      - The discussion then moved from tools to knowledge architecture: Knowledge Graph, SoC Knowledge Graph, Agentic RAG, OKF, LLM Wiki, and ontology.
      - Brian asked to include evaluation and monitoring as the reason that agent rollout needs measurable quality and resource tracking.
      - Brian then wanted to show OKF in Obsidian with graph and Base views, plus interactive HTML for understanding connected work.
      - Finally, Brian asked for a one-hour-per-day estimate if every discussed topic is included.
      - Brian later added a Claude PPT workflow video and identified that Codex can likely perform the same kind of structured PPT-generation flow.
      - Brian then added a second PPT video and highlighted that using a concrete reference design from a site can improve generated presentation quality.
      - Brian then connected the seminar to his own common_ai_agent and ontology_ip_agent lessons, asking to teach workflow construction itself.
      - The workflow construction idea evolved into task-to-skill distillation, handoff skills between subagents, and a skill-making skill.
      - Brian then added that conversation and trial-and-error should continuously improve the system so future runs do not repeat known mistakes.
    architecture_layering:
      explanation_layer:
        - LLM Wiki
        - OKF markdown/YAML frontmatter
        - guide docs
      semantic_work_layer:
        - ontology objects
        - SoC Knowledge Graph
        - tasks, issues, evidence, owners, decisions
      human_view_layer:
        - Obsidian graph view
        - Obsidian Bases
        - Interactive HTML graph
        - Word/PPT artifacts
        - presentation-generation workflow examples
        - reference-design-guided document/deck generation
      agent_control_layer:
        - prompt
        - rules
        - hooks
        - skills
        - loop
        - stop condition
      workflow_construction_layer:
        - common_ai_agent lessons
        - ontology_ip_agent lessons
        - one small task
        - stable workflow
        - task-to-skill distillation
        - handoff skill
        - skill creation skill
      evaluation_layer:
        - quality threshold
        - token count
        - tool-call count
        - attempts
        - wall time
        - failure/retry rate
      learning_layer:
        - conversation memory
        - failure records
        - corrections
        - skill updates
        - rule updates
        - avoid repeated mistakes
    related_task_ref: task_ai_agent_codex_seminar_prepare
