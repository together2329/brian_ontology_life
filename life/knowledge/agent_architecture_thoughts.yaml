  - id: thought_thread_20260617_soc_on_ontology_direction
    object_type: ThoughtThread
    date: 2026-06-17
    area: MIND
    secondary_areas:
      - CAREER
    topic: SoC-level hardware design agent on top of ontology
    summary:
      - "Brian moved the hardware IP agent direction from subsystem-level ontology toward a higher target: SoC on top of ontology."
      - The intended layering is not only task/file tracking, but an ontology substrate that can represent SoC, subsystems, IP blocks, interfaces, requirements, integration constraints, verification evidence, ownership, and decisions.
      - This direction makes the ontology the semantic operating layer, with SoC-level design reasoning and workflow support built above it.
    conversation_flow:
      - The discussion first identified that subsystem-level ontology needs to be improved.
      - Brian then summarized the broader destination as "Ontology 위에 SoC".
      - The architecture implication is that a useful hardware agent should reason across SoC structure, not only local RTL files, task lists, or narrow IP objects.
      - "This also gives the Codex seminar/demo a stronger story: show how ontology connects SoC-level intent down to concrete implementation/evidence objects."
      - Brian then connected this direction to Codex seminar preparation and VDS document thinking.
      - The emerging idea is that VDS can be treated as a document layer over SoC ontology, rather than a separate static artifact disconnected from requirements, implementation, and evidence.
    related_concept_refs:
