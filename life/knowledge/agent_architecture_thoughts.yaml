  - id: source_knowledge_conversation_20260620_ai_information_overload_cognitive_bandwidth
    source_type: pasted_note_and_chat
    original_date: 2026-06-20
    imported_at: 2026-06-20
    parse_status: parsed
    raw_text: |-
      맞아요. 이게 요즘 AI 쓰는 사람들의 진짜 병목이에요.
      예전 병목은 정보가 부족함이었는데, 지금 병목은 AI가 너무 많이 말함 -> 내가 소화 못함 -> 기억 안 남 -> 실행으로 안 이어짐 -> 피곤함입니다.
      즉 문제는 AI 성능 부족이 아니라, 인간의 인지 대역폭 부족이에요.
      핵심은 "AI에게 많이 말하게 하지 말고, 걸러서 주게 해야 함".
      내가 지금 의사결정할 수 있게 3개만 줘.
      지금 당장 알아야 할 것 / 나중에 저장할 것 / 버려도 되는 것으로 나누기.
      One-liner, Mental Model, 3 Key Points, Action, Archive.
      개인 AI 비서는 정보를 많이 주는 존재가 아니라, 내 인지 부하를 줄이는 존재여야 해요.
      AI는 정보를 쏟아내고, 온톨로지는 그것을 소화 가능한 지식으로 바꾼다. 이거 좋은데?
    interpreted_direction:
      - Brian identified AI information overload as a practical bottleneck: AI can generate more context than a human can digest, remember, and convert into action.
      - The important design target is not more output, but filtered output that supports memory, decision, and execution.
      - Brian liked the framing that AI emits information while ontology digests it into usable knowledge.
      - Brian's personal assistant should default to cognitive-load-aware responses: one-liner, mental model, three key points, one next action, and archive details only when useful.
      - The output triage should separate what matters now, what should be saved, and what can be discarded.
    preferred_output_contract:
      one_liner: one sentence conclusion
      mental_model: compact structure that can be remembered
      key_points_max: 3
      action_count: 1
      archive: optional details for later storage or review
    related_concept_refs:
      - concept_cognitive_load_aware_ai_output
      - concept_ontology_first_agent_memory
      - concept_operational_decision_system
      - concept_llm_wiki
      - concept_solution_rag
    related_task_refs:
      - task_ai_agent_codex_ontology_development_plugin
      - task_ai_agent_codex_seminar_prepare
