  - id: architecture_direction_20260619_solution_rag_ontology_builder
    object_type: ArchitectureDirection
    date: 2026-06-19
    area: CAREER
    secondary_areas:
      - MIND
    project_ref: project_ai_agent
    title: Solution RAG for ontology construction
    statement: "Build the ontology from retrieved solution cases: use solved problems and validated workflows as evidence-backed seeds for ontology objects, relationships, decisions, patterns, and reusable skills."
    rationale:
      - Solution cases contain higher-signal structure than arbitrary notes because they include problem context, attempted paths, selected resolution, and validation evidence.
      - Brian's existing ontology already supports Issue, Resolution, WorkSession, Artifact, Decision, SourceRecord, evidence refs, and review flags, so the first version can stay local and lightweight.
      - This reduces the risk of inventing an abstract hardware ontology upfront; the ontology grows from real solved cases and keeps evidence attached.
      - The method is especially useful for Sub System Level Ontology because subsystem/IP relationships become clear when traced through actual solved integration, verification, or documentation problems.
    implementation_direction:
      solution_case_index:
        - Problem or question
        - Context and scope
        - Attempts and rejected paths
        - Chosen solution
        - Validation evidence
        - Reusable pattern
        - Candidate ontology objects and links
      retrieval_inputs:
        - source_records
        - issues and resolutions
        - work sessions
        - artifacts and validation logs
        - decisions and status updates
        - concept refs and semantic entity refs
      promotion_policy:
        - preserve raw records
        - keep candidate links reviewable
        - attach source_refs and evidence_refs
        - use confidence and needs_user_review
        - promote only narrow objects or links that survive review
      first_slice_candidate: Use one known solved case, such as AIN-P Multi VF mapping or SpecLoop/OAG elite_merge, to produce a SolutionCase-style record and candidate subsystem ontology objects.
    tradeoffs:
      - Stronger grounding than schema-first modeling, but it depends on having enough well-recorded solution cases.
      - Retrieval can surface similar cases, but promotion still needs human review because solution similarity can hide important context differences.
      - This should complement Agentic RAG/GraphRAG retrieval, not replace the canonical ontology or evidence policy.
    follow_up_task_refs:
      - task_ai_agent_solution_rag_ontology_builder
      - task_ai_agent_agentic_retrieval_planner
      - task_ai_agent_codex_ontology_development_plugin
      - task_ai_agent_soc_ontology_vds_document_design
    source_refs:
      - source_knowledge_conversation_20260619_solution_rag_ontology_build
    status: active_direction_candidate
    confidence: medium
    needs_user_review: true
  - id: architecture_direction_20260617_soc_on_ontology_layer
    object_type: ArchitectureDirection
    date: 2026-06-17
    area: CAREER
    secondary_areas:
      - MIND
    project_ref: project_ai_agent
    title: SoC-level hardware workflow on top of ontology
    statement: "Build the hardware IP agent toward a SoC-on-ontology architecture: ontology is the semantic substrate, and SoC-level workflow/reasoning is the layer above it."
    rationale:
      - Hardware design work becomes valuable when the agent understands relationships across SoC, subsystem, IP block, interface, requirement, implementation, verification, evidence, owner, and decision objects.
      - Subsystem-level ontology is a necessary intermediate step, but the broader destination is SoC-level reasoning and workflow support.
      - Brian explicitly reaffirmed Sub System Level Ontology as very important on 2026-06-19, so the first useful slice should be subsystem-level rather than only low-level files or abstract SoC models.
      - A SoC-on-ontology demo can show why this is more powerful than a TODO tracker, file search tool, or fixed-script planner.
    implementation_direction:
      ontology_substrate:
        - SoC
        - subsystem
        - IP block
        - interface
        - clock/reset/power domain
        - requirement
        - integration constraint
        - RTL artifact
        - verification case
        - evidence
        - owner
        - decision
      reasoning_layer:
        - trace SoC intent to subsystem/IP implementation work
        - find ownership and evidence gaps
        - explain why a design change is needed
        - connect lint/simulation/synthesis evidence back to requirements
        - prepare demoable workflow slices for RTL/IP engineers
      documentation_layer:
        - use VDS as a human-facing view over SoC ontology if the VDS scope is confirmed
        - map requirements, interfaces, integration constraints, verification evidence, and decisions into document sections
        - keep ontology as the semantic source of truth while generating or reviewing VDS text from it
      first_slice_candidate: Model one concrete path from SoC requirement to subsystem/IP/interface object, implementation task, verification evidence, owner, and current status.
      vds_first_slice_candidate: Draft one VDS outline from the same SoC requirement to IP/interface/evidence path.
    tradeoffs:
      - SoC-level ontology gives stronger reasoning, but the first slice must stay narrow enough to demo reliably.
      - Too much schema upfront can slow implementation, so the model should grow from concrete Milano/OAG examples.
      - The agent should keep ontology as semantic truth and use tools/scripts as execution aids, not as the core model.
      - VDS document generation can become useful quickly, but only after the VDS meaning, audience, and expected sections are confirmed.
    follow_up_task_refs:
      - task_ai_agent_codex_ontology_development_plugin
      - task_ai_agent_codex_seminar_prepare
      - task_ai_agent_company_codex_rollout_support
      - task_ai_agent_soc_ontology_vds_document_design
    source_refs:
      - source_knowledge_conversation_20260617_subsystem_level_ontology_need
