      - The comparison established that Google Agentic RAG is about an agent actively planning retrieval and using multiple tools or data sources, while Brian Ontology Agent is doing a local version over ontology objects.
      - The comparison also linked the current day graph to GraphRAG because retrieval follows explicit object relationships, not only keyword or vector similarity.
