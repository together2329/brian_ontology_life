  - id: thought_thread_20260619_palantir_platform_mapping_for_soc
    object_type: ThoughtThread
    date: 2026-06-19
    area: CAREER
    secondary_areas:
      - MIND
    topic: Palantir platform mapping for Brian Ontology Agent and SoC development
    summary:
      - Brian clarified the distinction between Palantir Foundry, AIP, Apollo, and Gotham and asked whether SoC development should be modeled like Gotham.
      - The working conclusion is that Brian should not copy Gotham as a product, but should borrow the idea of a domain-specific operational cockpit after the Foundry-like/Ontology/AIP-like base is mature enough.
      - Foundry-like work is the current priority: connect local engineering data, logs, docs, tasks, decisions, and evidence into a durable ontology.
      - AIP-like work is the agent layer: Codex, Solution RAG, LLM Wiki, and validation/checklist agents operate over the ontology.
      - Gotham-like work becomes useful later as a SoC debug/signoff operation cockpit that shows current blockers, risks, owners, evidence, and next actions.
    platform_mapping:
      foundry:
        brian_interpretation: Operational data and ontology platform.
        brian_equivalent:
          - local YAML ontology records
          - markdown notes and Obsidian views
          - RTL/spec/filelist/SDC/sim/timing/coverage evidence
          - task, issue, decision, action, and evidence records
      ontology:
        brian_interpretation: The business/engineering world model that turns raw data into objects, links, actions, and states.
        brian_equivalent:
          - Project
          - Task
          - Subsystem
          - IP
          - Interface
          - Requirement
          - Issue
          - Evidence
          - Decision
          - OperationalAction
          - OperationalState
      aip:
        brian_interpretation: Agent/LLM layer that uses the ontology to answer, reason, propose actions, run workflows, and collect feedback.
        brian_equivalent:
          - Codex
          - Solution RAG
          - LLM Wiki
          - debug/checklist agents
          - ontology promotion workflows
      apollo:
        brian_interpretation: Runtime/deployment/upgrade/monitoring layer for keeping the platform reliable.
        brian_equivalent:
          - repeatable local workflows
          - validation commands
          - skill/plugin packaging when needed
          - future deployment or automation environment
      gotham:
        brian_interpretation: Domain-specific operational cockpit over the shared ontology, not the required base layer.
        brian_equivalent:
          - Milano debug operation cockpit
          - SDC/timing/signoff status board
          - NVMe/PCIe setup and issue triage board
          - subsystem risk/owner/evidence/next-action dashboard
    semantic_kinetic_dynamic_model:
      semantic:
        definition: What exists; the nouns, properties, links, and stable model.
        simple_metaphor_ko: 지도
        soc_examples:
          - SoC
          - Subsystem
          - IP
          - Interface
          - SFR
          - Clock
          - Reset
          - Requirement
          - Test
          - Issue
          - Evidence
      kinetic:
        definition: What can be done; actions, functions, workflows, and writeback.
        simple_metaphor_ko: 조작 버튼
        soc_examples:
          - run simulation
          - rerun synthesis
          - update SDC
          - disable VIP config path
          - create issue
          - capture decision
          - promote note to ontology
      dynamic:
        definition: What is true now; current state, risk, confidence, permission, feedback, and decision context.
