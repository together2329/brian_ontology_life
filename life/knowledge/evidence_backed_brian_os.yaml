architecture_directions:
  - id: architecture_direction_one_ontology_work_and_life_surfaces
    object_type: ArchitectureDirection
    date: '2026-07-17'
    area: MIND
    secondary_areas: [CAREER, FINANCE, BODY, RELATION, MAINTENANCE, FUN]
    project_ref: project_ai_agent
    title: 하나의 증거 기반 커널과 업무·생활 두 적용면
    statement: 업무와 생활에 별도 기억 시스템을 만들기보다 공통 객체·링크·증거 원칙을 공유하고 도메인별 화면과 규칙을 둔다.
    rationale: 반도체 IP에서 발전한 추적성과 결정-행동 모델이 개인 기록에도 반복적으로 적용되고 있다.
    implementation_direction:
      - UserInputRecord와 ConversationSession을 공통 기억 입구로 사용한다.
      - Work는 requirement-contract-evidence를, Life는 state-pattern-decision-outcome을 중심으로 조회한다.
      - 각 도메인의 확정 현재 상태 파일을 분석 코퍼스보다 우선한다.
    tradeoffs:
      - 공통 커널은 중복을 줄이지만 모든 도메인을 같은 세부 스키마로 강제하면 복잡해질 수 있다.
      - 자동 승격은 편하지만 정체성과 투자 원칙을 과도하게 확정할 위험이 있다.
    source_refs:
      - claude_user_message_d32a382a-77a3-466b-b3f8-42e6f09b7703_010561
      - codex_user_message_019efb57-5dad-7010-aaf9-02f3b97b45dd_005493
      - codex_user_message_019f6583-9650-7ef0-99da-ed24b839f571_006469
    status: active_direction
    confidence: high
    needs_user_review: false

  - id: architecture_direction_llm_judgment_with_deterministic_boundaries
    object_type: ArchitectureDirection
    date: '2026-07-17'
    area: CAREER
    secondary_areas: [MIND]
    project_ref: project_ai_agent
    title: LLM 판단과 결정적 검증 경계의 결합
    statement: 해석과 해결책 탐색은 LLM에 넓게 맡기되 truth, permission, ownership, validation과 completion은 명시적 규칙과 증거로 닫는다.
    rationale: 스크립트가 모든 판단을 통제하면 경직되고, LLM의 자신감만 믿으면 거짓 완료가 생긴다.
    implementation_direction:
      - LLM에는 원칙, 목표, 현재 상태와 도구를 제공한다.
      - validator는 freshness, provenance, contract pass, permission과 required closure를 확인한다.
      - 실패와 불확실성은 숨기지 않고 FeedbackRecord나 open loop로 남긴다.
    tradeoffs:
      - 경계가 너무 많으면 유지 비용이 커지고, 너무 적으면 신뢰성이 떨어진다.
    source_refs:
      - claude_user_message_fb9fcc45-d9af-4c68-844a-cb142ff66f54_010211
      - codex_user_message_019e18d8-5339-7343-85e2-d84d6a5d1b81_001084
    status: active_direction
    confidence: high
    needs_user_review: false

