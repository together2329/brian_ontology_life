definition:
  id: concept_evidence_backed_brian_os
  object_type: Concept
  display_name: Evidence-backed Brian OS
  aliases: [Brian OS, 증거 기반 Brian 운영체계, 개인 온톨로지 운영체계]
  area: MIND
  definition: >-
    Brian의 입력, 경험, 생각, 결정, 행동, 현재 상태와 검증 증거를 서로 연결해
    기억을 보존하고 판단을 돕고 실행과 피드백까지 이어 주는 로컬 개인 운영체계다.
    AI는 Brian의 사고와 실행 범위를 넓히지만, 원칙과 최종 판단의 소유자는 Brian이다.
  primary_links:
    - thought_thread_agent_memory_to_brian_os_202510_202607
    - architecture_direction_one_ontology_work_and_life_surfaces
    - understanding_ai_should_extend_brian_judgment_not_replace_it
    - rule_conversation_memory_preserve_raw_then_promote
    - architecture_direction_closed_loop_pilots_before_platform_expansion
  evidence_refs:
    - claude_user_message_eddcc35b-e675-4e1e-ae7b-31d68ecba709_000152
    - claude_user_message_d32a382a-77a3-466b-b3f8-42e6f09b7703_010561
    - codex_user_message_019efb57-5dad-7010-aaf9-02f3b97b45dd_005493
    - codex_user_message_019f6583-9650-7ef0-99da-ed24b839f571_006469
  assistant_usage:
    - 질문에 답할 때 현재 상태만 보지 말고 관련 생각, 결정 이유, 행동, 증거와 과거 기록을 따라간다.
    - 새 대화 기록은 먼저 원문으로 보존하고, 의미 후보와 확정 객체를 분리한다.
    - Brian의 요청이나 과거 계획을 완료 사실로 바꾸지 않는다.

operating_model:
  flow: UserInputRecord -> ConversationSession -> ThoughtThread -> Understanding_or_Decision -> OperatingRule_or_Action -> Evidence -> Feedback
  two_surfaces:
    work:
      purpose: 신뢰할 수 있는 반도체 IP·AI agent 개발
      truth_chain: Intent -> Requirement -> Obligation -> Contract -> Evidence -> Validation -> Decision -> Action
    life:
      purpose: 몸, 마음, 관계, 재무, 즐거움과 생활 운영을 연결해 더 나은 판단을 지원
      truth_chain: Experience_or_Fact -> CurrentState -> PatternCandidate -> Decision -> Action -> Outcome
  shared_kernel:
    - stable IDs and explicit links
    - raw evidence separated from interpretation
    - current state separated from history
    - human-owned decisions and reviewable AI inference
    - fresh evidence before closure
    - lightweight local files before new infrastructure

