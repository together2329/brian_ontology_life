operating_rules:
  - id: rule_conversation_memory_preserve_raw_then_promote
    object_type: OperatingRule
    statement: 모든 직접 입력과 세션 문맥은 로컬 원문 인덱스로 보존하고, 반복되거나 명확한 의미만 증거 링크와 함께 온톨로지 객체로 승격한다.
    applies_when: [new_agent_input_import, session_history_refresh, memory_promotion]
    recommended_actions:
      - 원문, 분석 후보, 승격 객체를 서로 다른 파일 또는 필드로 분리한다.
      - assistant, tool, subagent 출력을 Brian의 직접 발화로 합치지 않는다.
      - 한 번의 요청을 실제 완료 결과로 해석하지 않는다.
      - 정체성 수준의 해석은 needs_user_review를 유지한다.
    derived_from:
      - decision_promote_agent_session_history_20260717
      - life/imports/agent_sessions_20260717/promotion_map.yaml
    confidence: high

  - id: rule_evidence_before_completion
    object_type: OperatingRule
    statement: 완료를 보고하거나 상태를 닫기 전에 결과와 직접 연결된 최신 증거를 확인한다.
    applies_when: [implementation_completion, test_completion, research_claim, ontology_writeback]
    recommended_actions:
      - expected outcome과 검증 방법을 먼저 적는다.
      - 실제 환경에서 재현 가능한 검증을 실행한다.
      - evidence의 대상 버전과 생성 시점을 확인한다.
      - 검증하지 못한 항목은 완료 대신 pending 또는 blocked로 남긴다.
    derived_from:
      - understanding_completion_requires_fresh_traceable_evidence
    confidence: high

  - id: rule_parallelize_only_with_clear_boundaries
    object_type: OperatingRule
    statement: 병렬 작업은 의존성, 소유 범위, 결과 회수 방법과 각각의 완료 증거가 명확할 때만 사용한다.
    applies_when: [multi_agent_task, parallel_research, parallel_implementation]
    recommended_actions:
      - 공통 선행 조건과 쓰기 충돌을 확인한다.
      - 각 worker에 bounded deliverable과 evidence를 지정한다.
      - main agent가 결과를 회수하고 통합 검증한다.
    derived_from:
      - thought_thread_visible_persistent_agent_environment_202603_202604
      - understanding_vague_intent_should_become_atomic_traceable_truth
    confidence: high

decisions:
  - id: decision_promote_agent_session_history_20260717
    object_type: Decision
    date: '2026-07-17'
    project_ref: project_ai_agent
    component_ref: null
    title: Codex와 Claude 입력·세션 기록을 개인 온톨로지로 승격
    decision: 모든 직접 user input은 의미 인덱스로 연결하고, 유의미한 session data와 반복된 생각·원칙·결정은 검토 가능한 온톨로지 객체로 승격한다.
    rationale: 도구별 기록을 단순 archive로 남기지 않고 Brian의 생각 흐름, 판단 이유와 다음 행동에 재사용하기 위해서다.
    alternatives:
      - 분석 보고서만 보관하고 온톨로지에는 연결하지 않기
      - 모든 원문을 하나의 거대한 YAML로 복제하기
    consequences:
      - 17856개 직접 입력이 UserInputRecord 의미 인덱스로 조회 가능해진다.
      - 445개 도구별 세션이 ConversationSession으로 연결된다.
      - 의미 승격은 promotion policy와 evidence link를 통해 추적된다.
      - 과거 assistant/tool outcome은 별도 audit 전까지 완료 사실로 사용하지 않는다.
    source_refs:
      - codex_user_message_019f6583-9650-7ef0-99da-ed24b839f571_006469

