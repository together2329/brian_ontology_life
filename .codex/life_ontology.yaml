schema_version: 1
status: skeleton
purpose: >
  Lightweight local ontology for connecting time, tasks, emotions, body records,
  finance, relationships, maintenance, fun, concepts, and historical evidence.

areas:
  - id: MIND
    purpose: Thinking, learning, emotion, reflection, attention.
  - id: BODY
    purpose: Sleep, exercise, food, health, body composition, recovery.
  - id: CAREER
    purpose: Work, projects, skills, reputation, knowledge creation.
  - id: FINANCE
    purpose: Assets, spending, investing, portfolio decisions, financial goals.
  - id: RELATION
    purpose: Family, friends, coworkers, social energy, care.
  - id: MAINTENANCE
    purpose: Chores, admin, errands, repairs, documents, recurring operations.
  - id: FUN
    purpose: Play, recovery, creativity, hobbies, entertainment, exploration.

conventions:
  ids: snake_case_stable_ids
  dates: YYYY-MM-DD
  times: HH:MM_24h
  durations: minutes
  score_scale_default: 1_to_10
  valence_score: -5_to_5
  raw_text_policy: preserve_when_available
  causality_policy: use_confidence_and_evidence_do_not_overclaim

operational_layer_model:
  semantic_layer:
    meaning: Stable nouns of the world.
    examples: [Project, Task, Person, Concept, EvidenceLink, Decision]
  kinetic_layer:
    meaning: Verbs that change state or move work forward.
    examples: [OperationalAction, WorkflowRun, action_types]
  dynamic_layer:
    meaning: Current state, review boundaries, scenarios, and feedback.
    examples: [OperationalState, Scenario, FeedbackRecord, StatusUpdate]

core_object_types:
  Area:
    fields: [id, purpose]
  Day:
    fields:
      - date
      - summary
      - happiness_score
      - stress_score
      - energy_score
      - dominant_emotions
      - notes
  TimeBlock:
    purpose: A bounded time period in a day.
    fields:
      - id
      - date
      - start
      - end
      - area
      - mode
      - items
  BlockItem:
    purpose: An item inside a TimeBlock.
    fields:
      - type
      - ref
      - title
      - planned_minutes
      - actual_minutes
      - status
      - session_ref
  Task:
    purpose: A unit of work or life action to complete or track.
    fields:
      - id
      - title
      - area
      - status
      - priority
      - energy
      - estimated_minutes
      - due_date
      - project_ref
      - owner_ref
      - progress_percent
      - tags
  Person:
    purpose: A global person object reused across work, family, and social records.
    fields:
      - id
      - name
      - aliases
      - relationship_types
      - org
      - notes
  Note:
    fields: [id, date, area, title, body, related_entities]
  Concept:
    purpose: A stable personal concept supported by records and evidence.
    fields:
      - id
      - display_name
      - aliases
      - area
      - definition
      - evidence_refs
      - assistant_usage

emotion_and_identity_object_types:
  MoodEntry:
    fields:
      - id
      - date
      - time
      - valence_score
      - arousal_score
      - stress_score
      - energy_score
      - emotions
      - linked_context
      - possible_triggers
      - note
      - raw_text
  GratitudeEntry:
    fields:
      - id
      - date
      - area
      - text
      - emotion_tags
      - theme_tags
      - entity_refs
      - source_ref
      - raw_text_sha256
  Observation:
    fields:
      - id
      - date
      - observation_type
      - area
      - value
      - unit
      - linked_context
      - confidence
  Pattern:
    fields:
      - id
      - statement
      - evidence
      - confidence
      - related_entities
      - last_reviewed
  IdentityStatement:
    fields:
      - id
      - statement
      - evidence
      - confidence
      - status
      - needs_user_review
  OperatingRule:
    fields:
      - id
      - statement
      - applies_when
      - recommended_actions
      - derived_from
      - confidence

knowledge_object_types:
  ThoughtThread:
    fields:
      - id
      - date
      - area
      - topic
      - summary
      - conversation_flow
      - related_concept_refs
      - related_project_refs
      - source_refs
      - confidence
      - needs_user_review
  Understanding:
    fields:
      - id
      - date
      - area
      - statement
      - status
      - related_thread_ref
      - related_concept_refs
      - source_refs
      - confidence
      - needs_user_review
  KnowledgeInterest:
    fields:
      - id
      - date
      - area
      - topic
      - current_interest
      - development_direction
      - status
      - source_refs

operational_object_types:
  OperationalAction:
    layer: kinetic
    fields:
      - id
      - date
      - area
      - project_ref
      - task_ref
      - decision_ref
      - action_type
      - title
      - intent
      - actor_ref
      - target_refs
      - input_refs
      - preconditions
      - expected_effects
      - status
      - evidence_refs
      - confidence
      - needs_user_review
  WorkflowRun:
    layer: kinetic
    fields:
      - id
      - date
      - project_ref
      - task_refs
      - action_refs
      - start
      - end
      - status
      - logs
      - artifact_refs
      - feedback_refs
  OperationalState:
    layer: dynamic
    fields:
      - id
      - date
      - area
      - subject_ref
      - state_type
      - status
      - blocker_refs
      - evidence_refs
      - confidence
      - needs_user_review
  Scenario:
    layer: dynamic
    fields:
      - id
      - date
      - title
      - baseline_state_ref
      - proposed_changes
      - affected_refs
      - expected_outcome
      - risk_notes
      - status
  FeedbackRecord:
    layer: dynamic
    fields:
      - id
      - date
      - task_ref
      - action_ref
      - workflow_run_ref
      - feedback_type
      - result
      - evidence_refs
      - lessons
      - next_action_refs

career_object_types:
  Project:
    fields:
      - id
      - title
      - area
      - project_type
      - status
      - current_phase
      - due_date
      - responsible_person_ref
      - member_refs
      - notes
  WorkSession:
    fields:
      - id
      - date
      - task_ref
      - project_ref
      - start
      - end
      - actual_minutes
      - time_quality
      - focus_level
      - summary
      - findings
      - next_steps
      - artifact_refs
      - mood_refs
      - source_ref
      - needs_user_review
  Issue:
    fields:
      - id
      - project_ref
      - task_ref
      - title
      - status
      - severity
      - discovered_on
      - context
      - evidence_refs
      - confidence
      - needs_user_review
  Resolution:
    fields:
      - id
      - issue_ref
      - resolved_on
      - method
      - root_cause
      - changes
      - verified_by
  Decision:
    fields:
      - id
      - date
      - project_ref
      - title
      - decision
      - rationale
      - alternatives
      - consequences
      - source_refs
  Artifact:
    fields: [id, title, artifact_type, project_ref, path_or_uri, created_on, notes]
  StatusUpdate:
    fields:
      - id
      - date
      - project_ref
      - task_ref
      - status
      - progress_percent
      - summary
      - blockers
      - next_step
      - source_ref
  Meeting:
    fields:
      - id
      - date
      - start
      - end
      - project_ref
      - title
      - participants
      - topics
      - decisions
      - follow_up_tasks
      - notes

body_object_types:
  ExerciseCatalog:
    fields: [id, name, aliases, muscle_groups, equipment, notes]
  WorkoutSession:
    fields:
      - id
      - date
      - start
      - end
      - status
      - title
      - location
      - duration_minutes
      - perceived_energy
      - performance_note
      - exercises
  WorkoutExercise:
    fields: [exercise_ref, variant, equipment, notes, sets]
  SetRecord:
    fields: [set, weight_kg, reps, rpe, rest_seconds, is_warmup, is_pr]
  Meal:
    fields:
      - id
      - date
      - time
      - meal_type
      - items
      - supplements
      - related_workout
      - protein_g_total
      - confidence
      - needs_user_review
      - notes
  FoodItem:
    fields: [name, amount, unit, calories, protein_g, carbs_g, fat_g]
  BodyCompositionRecord:
    fields:
      - id
      - date
      - time
      - source
      - weight_kg
      - skeletal_muscle_mass_kg
      - body_fat_percent
      - notes
  SleepRecord:
    fields: [id, date, sleep_start, sleep_end, duration_minutes, quality_score, notes]

finance_object_types:
  FinanceGoal:
    fields: [id, title, target_amount, currency, target_date, priority, notes]
  Account:
    fields: [id, title, account_type, institution, currency, notes]
  Asset:
    fields: [id, symbol, name, asset_type, market, sector, currency]
  Holding:
    fields:
      - id
      - account_ref
      - asset_ref
      - quantity
      - average_cost
      - currency
      - thesis_ref
      - status
  Transaction:
    fields:
      - id
      - date
      - type
      - account_ref
      - asset_ref
      - quantity
      - price
      - currency
      - fees
      - decision_ref
  InvestmentDecision:
    fields:
      - id
      - date
      - action
      - asset_ref
      - thesis_ref
      - reason
      - risks
      - emotion_at_decision
      - conviction
      - expected_horizon
      - invalidation_conditions
      - review_date
  InvestmentThesis:
    fields:
      - id
      - asset_ref
      - title
      - stance
      - horizon
      - reasons
      - risks
      - source_refs
      - review_triggers
  Source:
    fields: [id, title, source_type, uri, date, reliability, notes]

relation_object_types:
  Relationship:
    fields: [id, from, to, relationship_type, area, status, notes]
  SocialInteraction:
    fields:
      - id
      - date
      - people_refs
      - interaction_type
      - relationship_area
      - quality_score
      - emotion_after
      - follow_up_tasks
      - notes
  CareActivity:
    fields:
      - id
      - date
      - subjects
      - activity_type
      - duration_minutes
      - area
      - notes

maintenance_object_types:
  MaintenanceDomain:
    values: [home, car, documents, health_admin, subscriptions, repairs, errands]
  RecurringTask:
    fields: [id, task_ref, cadence, next_due_date, last_done_date]

fun_object_types:
  EnjoymentActivity:
    fields:
      - id
      - date
      - title
      - area
      - fun_domain
      - people_refs
      - duration_minutes
      - active_or_passive
      - intentionality
      - enjoyment_score
      - recovery_score
      - emotions_after
      - notes

import_object_types:
  SourceRecord:
    fields:
      - id
      - source_name
      - source_type
      - source_path
      - imported_at
      - sha256
      - notes
  ImportedRecord:
    fields:
      - id
      - source_ref
      - original_date
      - imported_at
      - raw_text
      - raw_metadata
      - parse_status
  NormalizedHistoricalRecord:
    fields:
      - id
      - source_ref
      - original_date
      - start_time
      - area
      - observation_type
      - title
      - duration_minutes
      - emotion_tags
      - raw_text_sha256
      - raw_text_excerpt
      - entity_refs
      - semantic_links
      - needs_user_review
  EvidenceLink:
    fields:
      - id
      - source_ref
      - target_ref
      - evidence_type
      - summary
      - confidence
  PatternCandidate:
    fields: [id, statement, evidence_refs, confidence, needs_user_review]
  SemanticEntityCatalog:
    fields:
      - people
      - projects
      - activities
      - link_relations

link_types:
  contains:
    from: TimeBlock
    to: Task | WorkSession | WorkoutSession | Meal | SocialInteraction | EnjoymentActivity
    via: BlockItem.ref
  scheduled_in:
    from: Task
    to: TimeBlock
    via: BlockItem.ref
  belongs_to_area:
    from: any_object
    to: Area
  task_in_project:
    from: Task
    to: Project
    via: project_ref
  work_session_for_task:
    from: WorkSession
    to: Task
    via: task_ref
  issue_resolved_by:
    from: Issue
    to: Resolution
    via: Resolution.issue_ref
  produces_artifact:
    from: WorkSession | Task | Decision
    to: Artifact
  mood_associated_with:
    from: MoodEntry
    to: TimeBlock | Task | WorkSession | WorkoutSession | Meal | SocialInteraction | Person | Project
  meal_before_workout:
    from: Meal
    to: WorkoutSession
    derived_by: meal.time within 0-3 hours before workout.start
  relationship_between:
    from: Person
    to: Person
    via: Relationship
  holding_of_asset:
    from: Holding
    to: Asset
    via: asset_ref
  transaction_for_asset:
    from: Transaction
    to: Asset
    via: asset_ref
  decision_based_on_thesis:
    from: InvestmentDecision
    to: InvestmentThesis
    via: thesis_ref
  evidence_supports_pattern:
    from: EvidenceLink
    to: Pattern | PatternCandidate
  action_updates_state:
    from: OperationalAction
    to: OperationalState
  action_produces_feedback:
    from: OperationalAction
    to: FeedbackRecord

action_types:
  log_day:
    creates: [Day, TimeBlock, MoodEntry]
  plan_day:
    uses: [Task, Project, MoodEntry, OperatingRule]
    creates_or_updates: [Day, TimeBlock]
  log_task:
    creates_or_updates: [Task, StatusUpdate]
  schedule_task:
    creates_or_updates: [TimeBlock, BlockItem]
  log_work_session:
    creates: [WorkSession]
    may_update: [Task, StatusUpdate, Issue, Artifact]
  log_issue_resolution:
    creates: [Issue, Resolution]
    may_update: [Decision, Artifact, Task]
  log_workout:
    creates: [WorkoutSession, WorkoutExercise, SetRecord]
  log_meal:
    creates: [Meal, FoodItem]
  log_body_composition:
    creates: [BodyCompositionRecord]
  log_social_interaction:
    creates: [SocialInteraction]
  log_mood:
    creates: [MoodEntry]
  log_finance_decision:
    creates: [InvestmentDecision]
    may_update: [InvestmentThesis, Holding]
  log_transaction:
    creates: [Transaction]
    may_update: [Holding]
  import_records:
    creates: [SourceRecord, ImportedRecord, NormalizedHistoricalRecord]
  link_semantic_entities:
    uses: [NormalizedHistoricalRecord, SemanticEntityCatalog]
    creates: [EvidenceLink]
  recommend_intervention:
    uses: [MoodEntry, Pattern, OperatingRule, Day, TimeBlock]
  log_operational_action:
    uses: [Task, Decision, OperationalState, Source]
    creates: [OperationalAction]
  record_feedback:
    uses: [OperationalAction, WorkflowRun, Decision, Task, EvidenceLink]
    creates: [FeedbackRecord]

query_types:
  today_plan:
    uses: [Day, TimeBlock, Task, MoodEntry, OperatingRule]
  task_time_invested:
    input: task_ref
    uses: [TimeBlock, BlockItem, WorkSession]
  exercise_history:
    input: exercise_ref
    uses: [ExerciseCatalog, WorkoutSession, WorkoutExercise, SetRecord]
  mood_pattern:
    uses: [MoodEntry, TimeBlock, Pattern, EvidenceLink]
  project_status:
    input: project_ref
    uses: [Project, Task, StatusUpdate, Issue, WorkSession]
  operational_decision_loop:
    input: task_ref | decision_ref | action_ref
    uses: [Decision, OperationalAction, OperationalState, FeedbackRecord, Task, EvidenceLink]
  person_context:
    input: person_ref
    uses: [Person, Relationship, Meeting, SocialInteraction, MoodEntry]
  why_own_asset:
    input: asset_ref
    uses: [Holding, Transaction, InvestmentDecision, InvestmentThesis, Source]
  neglected_area_check:
    uses: [Day, TimeBlock, Area, MoodEntry, Pattern]

