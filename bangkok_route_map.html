<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bangkok Route Map</title>
  <style>
    :root {
      --bg: #eef2f3;
      --surface: #ffffff;
      --ink: #182027;
      --muted: #64707b;
      --line: #d8e0e5;
      --soft: #f5f8f9;
      --teal: #0f766e;
      --red: #ba3e44;
      --amber: #b97012;
      --green: #2f7d4f;
      --blue: #316fa6;
      --plum: #73558f;
      --dark: #25313a;
      --shadow: 0 18px 50px rgba(24, 32, 39, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--bg);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button,
    input {
      font: inherit;
      letter-spacing: 0;
    }

    .app {
      height: 100vh;
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(360px, 430px) minmax(0, 1fr);
      overflow: hidden;
    }

    .sidebar {
      position: relative;
      z-index: 20;
      display: flex;
      flex-direction: column;
      height: 100vh;
      min-height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .header {
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--line);
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--teal);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.05;
      letter-spacing: 0;
      text-wrap: balance;
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
      word-break: keep-all;
    }

    .quick-facts {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 14px;
    }

    .fact {
      min-height: 64px;
      padding: 10px;
      background: var(--soft);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .fact span {
      display: block;
    }

    .fact .label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .fact .value {
      margin-top: 6px;
      font-size: 16px;
      font-weight: 900;
      line-height: 1.15;
    }

    .route-tabs {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
    }

    .route-button {
      min-height: 42px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      background: #fbfcfd;
      cursor: pointer;
      font-size: 13px;
      font-weight: 850;
      text-align: left;
      word-break: keep-all;
      transition: background 160ms ease, border-color 160ms ease, color 160ms ease, transform 160ms ease;
    }

    .route-button:hover {
      border-color: #9fb1bc;
      background: #f3f7f7;
    }

    .route-button.active {
      color: #ffffff;
      border-color: var(--dark);
      background: var(--dark);
    }

    .route-button:active {
      transform: translateY(1px);
    }

    .route-button:focus-visible,
    .tool-button:focus-visible,
    .map-card a:focus-visible,
    .stop-card:focus-visible {
      outline: 3px solid rgba(15, 118, 110, 0.34);
      outline-offset: 2px;
    }

    .content {
      min-height: 0;
      overflow: auto;
      padding: 16px 18px 20px;
    }

    .route-summary {
      padding: 13px;
      background: #f7faf9;
      border: 1px solid var(--line);
      border-left: 5px solid var(--teal);
      border-radius: 8px;
      margin-bottom: 14px;
    }

    .route-summary h2 {
      margin: 0;
      font-size: 17px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .route-summary p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      word-break: keep-all;
    }

    .route-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .tool-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      padding: 7px 10px;
      color: #ffffff;
      background: var(--teal);
      border: 1px solid var(--teal);
      border-radius: 8px;
      text-decoration: none;
      font-size: 12px;
      font-weight: 900;
    }

    .tool-button.secondary {
      color: var(--ink);
      background: #ffffff;
      border-color: var(--line);
    }

    .route-list {
      display: grid;
      gap: 10px;
    }

    .stop-card {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      cursor: pointer;
      transition: background 160ms ease, border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease;
    }

    .stop-card:hover {
      border-color: #9fb1bc;
      background: #fbfcfd;
    }

    .stop-card.selected {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.12);
    }

    .stop-card:active {
      transform: translateY(1px);
    }

    .stop-index {
      width: 34px;
      height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      background: var(--teal);
      border-radius: 8px;
      font-size: 14px;
      font-weight: 900;
    }

    .stop-title {
      display: flex;
      gap: 8px;
      align-items: baseline;
      justify-content: space-between;
      min-width: 0;
    }

    .stop-title h3 {
      min-width: 0;
      margin: 0;
      font-size: 15px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .category {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      min-height: 23px;
      padding: 4px 7px;
      border-radius: 999px;
      color: #ffffff;
      font-size: 11px;
      font-weight: 900;
      white-space: nowrap;
    }

    .category.hotel { background: var(--dark); }
    .category.food { background: var(--red); }
    .category.massage { background: var(--green); }
    .category.bar { background: var(--amber); }
    .category.view { background: var(--blue); }
    .category.activity { background: var(--plum); }
    .category.transfer { background: #4d6470; }

    .stop-note {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.42;
      word-break: keep-all;
    }

    .stop-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 9px;
    }

    .meta-chip {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 4px 7px;
      color: #31404a;
      background: #edf3f4;
      border: 1px solid #d6e2e5;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 850;
      white-space: nowrap;
    }

    .map-wrap {
      position: relative;
      min-width: 0;
      height: 100vh;
      min-height: 100vh;
      overflow: hidden;
      background:
        linear-gradient(120deg, rgba(49, 111, 166, 0.09), transparent 38%),
        linear-gradient(320deg, rgba(15, 118, 110, 0.11), transparent 40%),
        #dce8e8;
    }

    #map {
      position: absolute;
      inset: 0;
      z-index: 1;
      min-height: 100%;
    }

    .schematic {
      width: 100%;
      height: 100%;
      display: block;
    }

    .schematic-bg {
      fill: #e9f0ef;
    }

    .schematic-grid {
      stroke: rgba(86, 103, 112, 0.12);
      stroke-width: 1;
    }

    .schematic-river {
      fill: none;
      stroke: #a7d7e5;
      stroke-width: 58;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .schematic-river-line {
      fill: none;
      stroke: rgba(49, 111, 166, 0.72);
      stroke-width: 5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .schematic-river-edge {
      fill: none;
      stroke: rgba(255, 255, 255, 0.55);
      stroke-width: 64;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .schematic-road {
      fill: none;
      stroke: rgba(96, 111, 119, 0.34);
      stroke-width: 4;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 9 9;
    }

    .schematic-road.solid {
      stroke-dasharray: 0;
      stroke-width: 3;
    }

    .schematic-road-label {
      fill: rgba(24, 32, 39, 0.42);
      font-size: 11px;
      font-weight: 900;
      text-anchor: middle;
      paint-order: stroke;
      stroke: rgba(255, 255, 255, 0.82);
      stroke-width: 4px;
      stroke-linejoin: round;
    }

    .schematic-district ellipse {
      fill: rgba(255, 255, 255, 0.58);
      stroke: rgba(86, 103, 112, 0.2);
      stroke-width: 1;
    }

    .schematic-district text {
      fill: rgba(24, 32, 39, 0.58);
      font-size: 12px;
      font-weight: 900;
      text-anchor: middle;
      dominant-baseline: central;
      paint-order: stroke;
      stroke: rgba(255, 255, 255, 0.82);
      stroke-width: 4px;
      stroke-linejoin: round;
    }

    .schematic-route {
      fill: none;
      stroke-width: 5;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 0;
    }

    .schematic-route.far {
      stroke-dasharray: 9 10;
    }

    .schematic-label {
      fill: rgba(24, 32, 39, 0.5);
      font-size: 13px;
      font-weight: 850;
      paint-order: stroke;
      stroke: rgba(255, 255, 255, 0.72);
      stroke-width: 4px;
      stroke-linejoin: round;
    }

    .schematic-water-label {
      fill: rgba(49, 111, 166, 0.64);
      font-size: 13px;
      font-weight: 950;
      text-anchor: middle;
      paint-order: stroke;
      stroke: rgba(255, 255, 255, 0.74);
      stroke-width: 4px;
      stroke-linejoin: round;
    }

    .schematic-marker {
      cursor: pointer;
    }

    .schematic-marker circle {
      stroke: #ffffff;
      stroke-width: 3;
      filter: drop-shadow(0 7px 10px rgba(24, 32, 39, 0.28));
    }

    .schematic-marker text {
      fill: #ffffff;
      font-size: 12px;
      font-weight: 950;
      text-anchor: middle;
      dominant-baseline: central;
      pointer-events: none;
    }

    .schematic-marker.hotel circle { fill: var(--dark); }
    .schematic-marker.food circle { fill: var(--red); }
    .schematic-marker.massage circle { fill: var(--green); }
    .schematic-marker.bar circle { fill: var(--amber); }
    .schematic-marker.view circle { fill: var(--blue); }
    .schematic-marker.activity circle { fill: var(--plum); }
    .schematic-marker.transfer circle { fill: #4d6470; }

    .schematic-marker.selected circle {
      stroke: #12191f;
      stroke-width: 4;
    }

    .schematic-name {
      fill: #24323a;
      font-size: 12px;
      font-weight: 850;
      paint-order: stroke;
      stroke: rgba(255, 255, 255, 0.88);
      stroke-width: 4px;
      stroke-linejoin: round;
    }

    .map-card {
      position: absolute;
      top: 18px;
      left: 18px;
      z-index: 8;
      width: min(340px, calc(100% - 36px));
      padding: 13px;
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 14px 32px rgba(24, 32, 39, 0.16);
    }

    .map-card h2 {
      margin: 0;
      font-size: 16px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .map-card p {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.42;
      word-break: keep-all;
    }

    .map-card a {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      margin-top: 10px;
      padding: 6px 9px;
      color: #ffffff;
      background: var(--teal);
      border-radius: 8px;
      font-size: 12px;
      font-weight: 900;
      text-decoration: none;
    }

    .map-overlay {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 18px;
      z-index: 10;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: end;
      pointer-events: none;
    }

    .route-note,
    .legend {
      pointer-events: auto;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 12px 28px rgba(24, 32, 39, 0.15);
    }

    .route-note {
      padding: 12px 13px;
      max-width: 720px;
    }

    .route-note strong {
      display: block;
      font-size: 14px;
      line-height: 1.25;
    }

    .route-note span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      word-break: keep-all;
    }

    .legend {
      display: grid;
      grid-template-columns: repeat(2, max-content);
      gap: 7px 10px;
      padding: 10px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #374550;
      font-size: 12px;
      font-weight: 850;
      white-space: nowrap;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--dark);
    }

    .dot.food { background: var(--red); }
    .dot.massage { background: var(--green); }
    .dot.bar { background: var(--amber); }
    .dot.view { background: var(--blue); }
    .dot.activity { background: var(--plum); }
    .dot.transfer { background: #4d6470; }

    .empty-state {
      padding: 20px;
      color: var(--muted);
      text-align: center;
      background: #f8fafb;
      border: 1px dashed #cbd7dc;
      border-radius: 8px;
    }

    @media (max-width: 980px) {
      .app {
        grid-template-columns: 1fr;
        height: auto;
        overflow: visible;
      }

      .sidebar {
        height: auto;
        min-height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .map-wrap {
        height: auto;
        min-height: 64vh;
      }

      .content {
        max-height: 52vh;
      }
    }

    @media (max-width: 620px) {
      .header {
        padding: 15px 14px 12px;
      }

      h1 {
        font-size: 24px;
      }

      .quick-facts,
      .route-tabs {
        grid-template-columns: 1fr;
      }

      .route-tabs,
      .content {
        padding-left: 14px;
        padding-right: 14px;
      }

      .map-overlay {
        left: 10px;
        right: 10px;
        bottom: 10px;
        grid-template-columns: 1fr;
      }

      .legend {
        grid-template-columns: repeat(3, max-content);
        overflow-x: auto;
      }

      .map-card {
        top: 10px;
        left: 10px;
        width: calc(100% - 20px);
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <aside class="sidebar">
      <section class="header">
        <p class="eyebrow">Bangkok Trip</p>
        <h1>방콕 7/11-7/14 동선 지도</h1>
        <p class="subtitle">2026년 7월 11일 토요일부터 7월 14일 화요일 밤까지, 아난타라 리버사이드 숙소 기준 날짜별 동선.</p>
        <div class="quick-facts" aria-label="Trip facts">
          <div class="fact">
            <span class="label">일정</span>
            <span class="value">7/11 토 - 7/14 화 밤</span>
          </div>
          <div class="fact">
            <span class="label">숙소</span>
            <span class="value">Anantara Riverside</span>
          </div>
          <div class="fact">
            <span class="label">예약 필요</span>
            <span class="value">픽업/뷰/스파</span>
          </div>
        </div>
      </section>

      <nav class="route-tabs" aria-label="Route filters">
        <button class="route-button active" type="button" data-route="day1">7/11 토 도착/강변</button>
        <button class="route-button" type="button" data-route="day2">7/12 일 아이콘시암</button>
        <button class="route-button" type="button" data-route="day3">7/13 월 코끼리</button>
        <button class="route-button" type="button" data-route="day4">7/14 화 쏭왓/왓아룬</button>
        <button class="route-button" type="button" data-route="recommended">추천 추가 음식/마사지</button>
        <button class="route-button" type="button" data-route="all">전체 후보</button>
        <button class="route-button" type="button" data-route="riverside">리버사이드 + 아이콘시암</button>
        <button class="route-button" type="button" data-route="phromphong">룽르엉 + 시암</button>
        <button class="route-button" type="button" data-route="oldcity">카오산 + 왓아룬</button>
        <button class="route-button" type="button" data-route="songwat">쏭왓 + 차이나타운</button>
        <button class="route-button" type="button" data-route="elephant">코끼리 보호소</button>
        <button class="route-button" type="button" data-route="airport">공항 픽업</button>
      </nav>

      <section class="content">
        <div class="route-summary" id="routeSummary"></div>
        <div class="route-list" id="routeList"></div>
      </section>
    </aside>

    <section class="map-wrap" aria-label="Bangkok route map">
      <div id="map"></div>
      <div class="map-overlay">
        <div class="route-note" id="mapNote"></div>
        <div class="legend" aria-label="Map legend">
          <span class="legend-item"><i class="dot"></i>숙소</span>
          <span class="legend-item"><i class="dot food"></i>음식</span>
          <span class="legend-item"><i class="dot massage"></i>마사지</span>
          <span class="legend-item"><i class="dot bar"></i>맥주/바</span>
          <span class="legend-item"><i class="dot view"></i>뷰</span>
          <span class="legend-item"><i class="dot activity"></i>액티비티</span>
        </div>
      </div>
    </section>
  </main>

  <noscript>
    <div class="empty-state">JavaScript가 꺼져 있으면 지도와 동선 필터가 표시되지 않습니다.</div>
  </noscript>

  <script>
    const routes = {
      day1: {
        title: "7/11 토요일 - 도착 + 강변 적응",
        subtitle: "도착 시간 미정이므로 첫날은 공항픽업, 체크인, 숙소 근처 맥주/뷰 정도로 가볍게 둔다.",
        note: "추천 흐름: 공항 픽업 - Anantara 체크인 - Longtail River Bar 또는 SEEN - 컨디션 되면 Asiatique.",
        color: "#4d6470",
        order: ["bkk", "dmk", "anantara", "longtail", "seen", "asiatique"]
      },
      day2: {
        title: "7/12 일요일 - 아이콘시암 + 마사지 + 캐주얼 저녁",
        subtitle: "일요일은 멀리 이동하지 않고 리버사이드 쪽에서 쇼핑, 마사지, Have A Zeed, 맥주를 붙인다.",
        note: "기본 길찾기는 Let's Relax 기준. Preme Pavilion은 같은 구역의 대안으로 따로 확인.",
        color: "#0f766e",
        directionsOrder: ["anantara", "iconsiam", "letsrelax_iconsiam", "haveazeed", "hobs"],
        order: ["anantara", "iconsiam", "preme", "letsrelax_iconsiam", "haveazeed", "hobs"]
      },
      day3: {
        title: "7/13 월요일 - 코끼리 보호소 데이",
        subtitle: "코끼리 보호소는 하루를 따로 빼는 게 안전하다. 저녁은 숙소 근처에서 가볍게 마무리.",
        note: "추천 판단: 동물복지 우선이면 Somboon Legacy, 구조센터까지 보면 WFFT, 편의성은 Bangkok Elephant Park.",
        color: "#73558f",
        order: ["anantara", "somboon_legacy", "wfft", "bangkok_elephant", "longtail"]
      },
      day4: {
        title: "7/14 화요일 - 쏭왓 + 올드시티 + 왓아룬 뷰",
        subtitle: "밤까지 일정이 있으니 점심부터 저녁 뷰까지 쓰고, 출국/이동 전에는 숙소 복귀 시간을 남긴다.",

    function getRoutePlaces(routeKey) {

    function routeBounds(routePlaces) {
      const lats = routePlaces.map((place) => place.lat);
      const lngs = routePlaces.map((place) => place.lng);
      let minLat = Math.min(...lats);
      let maxLat = Math.max(...lats);
      let minLng = Math.min(...lngs);
      let maxLng = Math.max(...lngs);
      const latPad = Math.max((maxLat - minLat) * 0.18, 0.018);
      const lngPad = Math.max((maxLng - minLng) * 0.18, 0.018);
      minLat -= latPad;
      maxLat += latPad;
      minLng -= lngPad;
      maxLng += lngPad;
      return { minLat, maxLat, minLng, maxLng };
    }

    function contextForRoute(routeKey, routePlaces) {
      const context = routeKey === "elephant"
        ? []
        : contextIds.map((id) => byId.get(id)).filter(Boolean);
      const riverPoints = routeKey === "elephant" ? [] : chaoPhrayaRiver;
      return [...routePlaces, ...context, ...riverPoints];
    }

    function project(place, bounds) {
      const usableWidth = viewBox.width - viewBox.padding * 2;
      const usableHeight = viewBox.height - viewBox.padding * 2;
      const lngRange = Math.max(bounds.maxLng - bounds.minLng, 0.001);
      const latRange = Math.max(bounds.maxLat - bounds.minLat, 0.001);
      const x = viewBox.padding + ((place.lng - bounds.minLng) / lngRange) * usableWidth;
      const y = viewBox.padding + ((bounds.maxLat - place.lat) / latRange) * usableHeight;
      return { x, y };
    }

    function projectedPlace(place, bounds) {
      const point = project(place, bounds);
      const offset = denseMarkerOffsets[activeRoute]?.[place.id];
      if (!offset) {
        return { place, ...point };
      }
      return {
        place,
        x: Math.min(Math.max(point.x + offset.x, 42), viewBox.width - 42),
        y: Math.min(Math.max(point.y + offset.y, 42), viewBox.height - 42)
      };
    }

    function polylinePoints(geoPoints, bounds) {
      return geoPoints.map((point) => {
        const projected = project(point, bounds);
        return `${projected.x.toFixed(1)},${projected.y.toFixed(1)}`;
      }).join(" ");
    }

    function isInView(point, margin = 110) {
      return point.x >= -margin &&
        point.x <= viewBox.width + margin &&
        point.y >= -margin &&
        point.y <= viewBox.height + margin;
    }

        return `

          : point.indices.map((index) => index + 1).join("/");
        return `
          <g class="schematic-marker ${point.place.category}${selected}" data-place-id="${point.place.id}" role="button" tabindex="0" aria-label="${name} 선택" transform="translate(${point.x.toFixed(1)} ${point.y.toFixed(1)})">
            <title>${name}</title>
            <circle r="17"></circle>
            <text>${displayLabel}</text>
          </g>
          ${label}
        `;
      }).join("");

      mapElement.innerHTML = `
        <svg class="schematic" viewBox="0 0 ${viewBox.width} ${viewBox.height}" role="img" aria-label="${escapeHtml(route.title)} 동선 지도">
          <rect class="schematic-bg" width="${viewBox.width}" height="${viewBox.height}"></rect>
          <g aria-hidden="true">
            ${gridLines()}
            ${renderRiver(bounds)}
            ${renderCorridors(bounds)}
            ${renderDistricts(bounds)}
            <text class="schematic-label" x="38" y="44">Fast local schematic</text>
            <text class="schematic-label" x="38" y="66">River / districts are approximate</text>
          </g>
          ${showRouteLine ? `<polyline class="${routeClass}" points="${linePoints}" stroke="${route.color}" opacity="0.84"></polyline>` : ""}
          <g>${markers}</g>
        </svg>
        ${mapCard(selectedPlace)}
      `;

      mapElement.querySelectorAll("[data-place-id]").forEach((marker) => {
        marker.addEventListener("click", () => selectPlace(marker.dataset.placeId));
        marker.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            selectPlace(marker.dataset.placeId);
          }
        });
      });
    }

    function gridLines() {
      const vertical = Array.from({ length: 8 }, (_, index) => {
        const x = 100 + index * 120;
        return `<line class="schematic-grid" x1="${x}" y1="0" x2="${x}" y2="${viewBox.height}"></line>`;
      }).join("");
      const horizontal = Array.from({ length: 6 }, (_, index) => {
        const y = 90 + index * 110;
        return `<line class="schematic-grid" x1="0" y1="${y}" x2="${viewBox.width}" y2="${y}"></line>`;
      }).join("");
      return vertical + horizontal;
    }

    function routeActionsHtml(route) {
      const directionsPlaces = getDirectionsPlaces(route);
      const searchButton = `<a class="tool-button secondary" href="${searchAreaUrl(route.title)}" target="_blank" rel="noopener">${directionsPlaces.length > 1 ? "지역 검색" : "후보 검색"}</a>`;
      if (directionsPlaces.length <= 1) {
        return `<div class="route-actions">${searchButton}</div>`;
      }
      return `
        <div class="route-actions">
          <a class="tool-button" href="${directionsUrl(directionsPlaces)}" target="_blank" rel="noopener">기본 동선 길찾기</a>
          ${searchButton}
        </div>
      `;
    }

    function renderSidebar() {
      const route = routes[activeRoute];
      const routePlaces = getRoutePlaces(activeRoute);
      routeSummary.style.borderLeftColor = route.color;
      routeSummary.innerHTML = `
        <h2>${escapeHtml(route.title)}</h2>
        <p>${escapeHtml(route.subtitle)}</p>
        ${routeActionsHtml(route)}
      `;

      routeList.innerHTML = "";
      routePlaces.forEach((place, index) => {
        const card = document.createElement("article");
        card.className = "stop-card" + (place.id === selectedId ? " selected" : "");
        card.dataset.placeId = place.id;
        card.tabIndex = 0;
        card.setAttribute("role", "button");
        card.setAttribute("aria-label", `${place.ko} 선택`);
        card.innerHTML = `
          <span class="stop-index" style="background:${route.color}">${escapeHtml(activeRoute === "all" ? markerLabel(place, index) : index + 1)}</span>
          <div>
            <div class="stop-title">
              <h3>${escapeHtml(place.ko)}</h3>
              <span class="category ${place.category}">${escapeHtml(categoryLabel(place.category))}</span>
            </div>
            <p class="stop-note">${escapeHtml(place.note)}</p>
            <div class="stop-meta">
              <span class="meta-chip">${escapeHtml(place.area)}</span>
              <span class="meta-chip">${escapeHtml(place.time)}</span>
            </div>
          </div>
        `;
        card.addEventListener("click", () => selectPlace(place.id, true));
        card.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            selectPlace(place.id, true);
          }
        });
        routeList.appendChild(card);
      });

      if (!routePlaces.length) {
        routeList.innerHTML = '<div class="empty-state">표시할 장소가 없습니다.</div>';
      }

      mapNote.innerHTML = `<strong>${escapeHtml(route.title)}</strong><span>${escapeHtml(route.note)}</span>`;
    }

    function categoryLabel(category) {
      return {
        hotel: "숙소",
        food: "음식",
        massage: "마사지",
        bar: "맥주/바",
        view: "뷰",
        activity: "활동",
        transfer: "이동"
      }[category] || "장소";
    }

    function directionsUrl(routePlaces) {
      if (!routePlaces.length) {
        return "https://www.google.com/maps";
      }
      if (routePlaces.length === 1) {
        return googleMapsUrl(routePlaces[0]);
      }
      const origin = routePlaces[0].query || routePlaces[0].name;
      const destination = routePlaces[routePlaces.length - 1].query || routePlaces[routePlaces.length - 1].name;
      const waypointPlaces = routePlaces.slice(1, -1).map((place) => place.query || place.name);
      const params = new URLSearchParams({
        api: "1",
        origin,
        destination,
        travelmode: "transit"
      });
      if (waypointPlaces.length) {
        params.set("waypoints", waypointPlaces.join("|"));
      }
      return "https://www.google.com/maps/dir/?" + params.toString();
    }

    function searchAreaUrl(title) {
      return "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(`${title} Bangkok`);
    }

    function selectRoute(routeKey) {
      activeRoute = routeKey;
      selectedId = null;
      routeButtons.forEach((button) => {
        button.classList.toggle("active", button.dataset.route === routeKey);
      });
      drawRoute();
      renderSidebar();
    }

    function selectPlace(placeId) {
      selectedId = placeId;
      const place = byId.get(placeId);
      if (!place) return;
      renderSidebar();
      drawRoute();
    }

    routeButtons.forEach((button) => {
      button.addEventListener("click", () => selectRoute(button.dataset.route));
    });

    selectRoute("day1");
  </script>
</body>
</html>
